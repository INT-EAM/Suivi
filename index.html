<style>
:root {
  --green: #00915a; --green-dark: #00643e; --blue: #3b82f6; --purple: #8b5cf6;
  --amber: #f59e0b; --red: #ef4444; --gray: #64748b; --gray-light: #f1f5f9;
  --bg: #f5f7fa; --card: #fff; --border: #e2e8f0; --text: #1a1a2e; --text-light: #94a3b8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
a { color: var(--green); text-decoration: none; }
/* Layout */
.app { display: flex; min-height: 100vh; }
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.sidebar { width: 220px; background: #0f172a; color: #fff; padding: 20px 0; flex-shrink: 0; position: fixed; height: 100vh; overflow-y: auto; }
.sidebar-logo { padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px; }
.sidebar-logo h2 { font-size: 18px; font-weight: 700; }
.sidebar-logo span { font-size: 11px; color: var(--text-light); }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 13.5px; cursor: pointer; transition: background 0.12s; color: rgba(255,255,255,0.7); }
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active { background: rgba(0,145,90,0.2); color: #fff; border-left: 3px solid var(--green); }
.nav-item .icon { font-size: 16px; width: 22px; text-align: center; }
.nav-badge { margin-left: auto; background: var(--green); color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; }
/* Sélecteur de client : options lisibles (texte sombre) quand la liste déroulante s'ouvre */
#client-select { color: #fff; }
#client-select option { color: #1a1a2e; background: #fff; }
.main { margin-left: 220px; flex: 1; padding: 24px 28px; max-width: 1200px; }
/* Cards */
.card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 18px; margin-bottom: 16px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--gray); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
/* KPI Grid */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
.kpi { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 16px; }
.kpi-value { font-size: 32px; font-weight: 800; line-height: 1.1; }
.kpi-label { font-size: 12px; color: var(--gray); margin-top: 4px; }
.kpi-sub { font-size: 11px; color: var(--text-light); margin-top: 2px; }
/* Filters Bar */
.filter-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.filter-bar select, .filter-bar input { padding: 7px 12px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 13px; outline: none; background: #fff; }
.filter-bar input[type=text] { flex: 1; min-width: 180px; }
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--green); }
/* Table */
.table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); background: #fff; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
thead tr { background: var(--gray-light); }
th { padding: 9px 10px; text-align: left; font-weight: 600; white-space: nowrap; user-select: none; font-size: 11.5px; text-transform: uppercase; color: var(--gray); letter-spacing: 0.3px; }
th.sortable { cursor: pointer; }
th.sortable:hover { color: var(--green); }
td { padding: 7px 10px; border-bottom: 1px solid #f8fafc; }
tr.row { cursor: pointer; transition: background 0.1s; }
tr.row:hover { background: #f8fafc !important; }
tr.row.selected { background: #e0f2fe !important; }
tr.urg3 { background: #fef2f2; }
tr.urg2 { background: #fefce8; }
tr.urg1 { background: #f0fdf4; }
tr.clos { opacity: 0.45; }
.rfc-code { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 11px; color: #475569; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; color: #fff; }
.profil-cell { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.org-cell { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--gray); font-size: 11.5px; }
.tri-cell { font-weight: 700; color: var(--green); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
.empty-cell { color: #d1d5db; }
.status-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 10.5px; font-weight: 600; }
.pill-ouvert { background: #dbeafe; color: #1d4ed8; }
.pill-encours { background: #fef3c7; color: #92400e; }
.pill-repondu { background: #fed7aa; color: #9a3412; }
.pill-qualif { background: #ede9fe; color: #6d28d9; }
.pill-demarrage { background: #d1fae5; color: #065f46; }
.pill-clos { background: #f1f5f9; color: #94a3b8; }
.pill-flag-repondu { background: #cffafe; color: #0e7490; border: 1px solid #67e8f9; margin-left: 4px; }
.pill-clos-traite { background: #dbeafe; color: #1e40af; }
th.r { text-align: right; }
td.r { text-align: right; }
/* Detail Panel */
.detail-panel { margin-top: 16px; animation: slideIn 0.15s ease; }
@keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
.detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.detail-codes { font-size: 11px; color: var(--text-light); font-family: monospace; }
.detail-panel h3 { font-size: 15px; font-weight: 700; margin-top: 4px; }
.close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-light); }
.close-btn:hover { color: #333; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px 20px; font-size: 13px; margin-bottom: 16px; }
.info-grid .lbl { font-size: 11px; color: var(--text-light); margin-bottom: 2px; }
.form-section { padding-top: 16px; border-top: 1px solid var(--border); }
.form-section h4 { font-size: 13px; font-weight: 600; color: var(--gray); margin-bottom: 12px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field label { font-size: 11px; color: var(--text-light); font-weight: 500; }
.field input, .field select { padding: 7px 10px; border-radius: 7px; border: 1px solid #d1d5db; font-size: 13px; outline: none; font-family: inherit; }
.field input:focus { border-color: var(--green); }
.field input.tri { text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
.form-actions { display: flex; gap: 8px; margin-top: 14px; }
.btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; font-size: 12.5px; cursor: pointer; font-weight: 500; font-family: inherit; }
.btn:hover { background: #f8fafc; }
.btn-green { background: var(--green); color: #fff; border-color: var(--green); }
.btn-green:hover { background: var(--green-dark); }
.btn-red { color: var(--red); border-color: #fecaca; }
.btn-red:hover { background: #fef2f2; }
/* Import */
.import-zone { border: 2px dashed #d1d5db; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.15s; }
.import-zone:hover { border-color: var(--green); background: #f0fdf4; }
.import-zone.active { border-color: var(--green); background: #d1fae5; }
.import-zone h3 { font-size: 16px; margin-bottom: 6px; }
.import-zone p { font-size: 13px; color: var(--gray); }
.import-result { margin-top: 16px; padding: 16px; border-radius: 10px; font-size: 13px; }
.import-ok { background: #d1fae5; border: 1px solid #86efac; color: #065f46; }
.import-warn { background: #fef3c7; border: 1px solid #fcd34d; color: #92400e; }
/* Charts (simple bars) */
.bar-chart { display: flex; flex-direction: column; gap: 6px; }
.bar-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
.bar-label { width: 140px; text-align: right; color: var(--gray); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; height: 22px; background: var(--gray-light); border-radius: 6px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 700; color: #fff; min-width: 28px; transition: width 0.3s; }
.bar-val { width: 30px; font-weight: 700; font-size: 12px; }
/* Toasts (retour visuel sauvegarde / erreurs) */
#toast-zone { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; color: #fff; box-shadow: 0 4px 14px rgba(0,0,0,.18); transition: opacity .3s; }
.toast-ok { background: var(--green); }
.toast-err { background: var(--red); }
/* En-tête de tableau sticky sur les longues listes */
.table-wrap { max-height: calc(100vh - 230px); overflow: auto; }
thead th { position: sticky; top: 0; background: var(--gray-light); z-index: 1; }
/* Accessibilité clavier */
button:focus-visible, .nav-item:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, tr.row:focus-visible { outline: 2px solid var(--green); outline-offset: 1px; }
@media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
/* Mobile menu */
.menu-toggle { display: none; position: fixed; top: 12px; left: 12px; z-index: 1001; background: #0f172a; color: #fff; border: none; border-radius: 8px; width: 40px; height: 40px; font-size: 20px; cursor: pointer; align-items: center; justify-content: center; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; }
/* Tablet */
@media (max-width: 900px) {
  .menu-toggle { display: flex; }
  .sidebar { transform: translateX(-100%); transition: transform 0.25s ease; z-index: 1000; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .main { margin-left: 0; padding: 16px 14px; padding-top: 56px; max-width: 100%; }
  .dash-grid { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .kpi { padding: 10px 12px; }
  .kpi-value { font-size: 22px; }
  .kpi-label { font-size: 10px; }
  .info-grid, .form-grid { grid-template-columns: 1fr 1fr; }
  .filter-bar { gap: 6px; }
  .filter-bar select { font-size: 12px; padding: 6px 8px; }
  .bar-label { width: 90px; font-size: 11px; }
  table { font-size: 11.5px; }
  th, td { padding: 6px 6px; }
  .profil-cell { max-width: 140px; }
  .org-cell { max-width: 100px; }
}
/* Mobile */
@media (max-width: 600px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .kpi-value { font-size: 20px; }
  .info-grid, .form-grid { grid-template-columns: 1fr; }
  .filter-bar input[type=text] { min-width: 100%; }
  .filter-bar select { flex: 1; min-width: calc(50% - 6px); }
  .header h1 { font-size: 18px; }
  .header-actions { display: none; }
  .bar-label { width: 70px; }
  .profil-cell { max-width: 110px; font-size: 11px; }
  .org-cell { display: none; }
  th:nth-child(4), td:nth-child(4) { display: none; }
}

function fwSuggest(profil){
  const p=(profil||"").normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase();
  const m=p.match(/(?:niveau|level)\s*(\d)/);
  if(!m) return "";
  const niv=parseInt(m[1]);
  let prefix="", offset=0;
  for(const r of FW_RULES){ if(r[0].test(p)){ prefix=r[1]; offset=r[2]||0; break; } }
  if(!prefix) return "";
  const target=niv+offset;
  const lvls=FRAMEWORK_2026.filter(r=>r[0].replace(/[0-9]+$/,"")===prefix).map(r=>r[3]).sort((a,b)=>a-b);
  if(!lvls.length) return "";
  const best=lvls.includes(target)?target:(lvls.filter(l=>l<=target).pop() ?? lvls[0]);
  return prefix+best;
}

// Suggestion du profil+niveau BPCE depuis l'intitule (best-effort ; niveau par defaut = N2)
function bpceSuggest(profil){
  const p=bpceNorm(profil);
  let niv=0; const m=p.match(/\bn([1-4])\b/);
  if(m) niv=+m[1];
  else if(/expert/.test(p)) niv=4;
  else if(/senior/.test(p)) niv=3;
  else if(/confirme/.test(p)) niv=2;
  else if(/junior|debutant/.test(p)) niv=1;
  let prof="";
  for(const r of BPCE_RULES){ if(r[0].test(p)){ prof=r[1]; break; } }
  if(!prof) return "";
  if(!niv) niv=2;
  const avail=BPCE_GRID.filter(r=>r[0]===prof).map(r=>r[2]).sort((a,b)=>a-b);
  if(!avail.length) return "";
  const best=avail.includes(niv)?niv:(avail.filter(l=>l<=niv).pop() ?? avail[0]);
  return bpceCodeStr(prof,best);
}

function gridShort(a,code){ if(clientOf(a)!=="BNP"){ const i=bpceInfo(code); return i ? ("N"+i.niv+"·"+i.idf+"€") : code; } return code; }

async function dbGetAll(store) {

    const res = await fetch(SUPABASE_URL+"/rest/v1/"+table+"?select=data&order="+(store==="aos"?"updated_at":"created_at")+".desc", {headers:sbHeaders()});
    if(!res.ok) throw new Error(res.statusText);

  } catch(e) { console.error("Supabase GET error:", e); return store==="aos"?memoryStore.aos:memoryStore.imports; }

async function dbPut(store, data) {
  if(store==="aos"){const i=memoryStore.aos.findIndex(a=>a.rfc===data.rfc);if(i>=0)memoryStore.aos[i]=data;else memoryStore.aos.push(data);}
  else memoryStore.imports.push(data);
  if(!useSupabase) return true;
  try {
    const table = store==="aos"?"appels_offres":"imports";
    const body = store==="aos" ? {rfc:data.rfc, data:data} : {data:data};
    const res = await fetch(SUPABASE_URL+"/rest/v1/"+table, {
      method:"POST", headers:sbHeaders({"Prefer":"resolution=merge-duplicates,return=minimal"}), body:JSON.stringify(body)
    });

    console.error("Supabase PUT error:", e);

  }
}

  else memoryStore.imports.push(...items);

}

function parseAOs(raw) {
  const lines = raw.split("\n").map(l => l.trim()).filter(Boolean);
  const noise = ["Prestation","Dates de mission","Nombre d'UO","TJM","Code","Demande d'achats","Organisation","Département","Date limite de réponses","Statut"];
  const aos = []; let i = 0;
  while (i < lines.length) {
    if (lines[i]==="btnMasterDetail" && i+1<lines.length && /^RFC\d+/.test(lines[i+1])) {
      const rfc=lines[i+1], intitule=lines[i+2]||"";
      let tm="",org="",dept="",statutPwise="",j=i+3;
      while(j<lines.length&&lines[j]!=="btnMasterDetail"){
        if(/^TM\d+/.test(lines[j]))tm=lines[j];
        else if(/^L6T?_/.test(lines[j]))org=lines[j].replace(/^L6T?_/,"");
        else if(lines[j].startsWith("L4_"))dept=lines[j].replace("L4_","");
        else if(!noise.includes(lines[j])&&!lines[j].includes("Enregistrement")&&!lines[j].includes("Modifier le paramétrage"))statutPwise=lines[j];
        j++;
      }
      let profil="",modalite="",dateDebut="",dateFin="",nbJours=0;
      // Bloc détail = second btnMasterDetail NOT suivi d'un RFC (sinon c'est le prochain AO)
      if(j<lines.length && lines[j]==="btnMasterDetail" && (j+1>=lines.length || !/^RFC\d+/.test(lines[j+1]))) {
        j++;if(j<lines.length){profil=lines[j];j++;}
        while(j<lines.length&&lines[j]!=="btnMasterDetail"){
          if(["Sur Site","Télétravail","Hybride"].includes(lines[j]))modalite=lines[j];
          const dm=lines[j].match(/^(\d{2}\/\d{2}\/\d{4})\s*-\s*(\d{2}\/\d{2}\/\d{4})$/);
          if(dm){dateDebut=dm[1];dateFin=dm[2];}
          const nm=lines[j].match(/^(\d+)[,.](\d+)$/);
          if(nm)nbJours=parseInt(nm[1]);
          j++;
        }
      }
      // Si pas de profil (format liste seul), utiliser l'intitulé comme fallback
      if(!profil && intitule) profil = intitule;
      if(rfc)aos.push({rfc,tm,intitule,org,dept,statutPwise,profil,modalite,dateDebut,dateFin,nbJours,client:"BNP"});
      i=j;
    } else i++;
  }
  return aos;
}

  if(/chef de projet|project manager/.test(l)) return "CdP";

function parseDate(d){if(!d)return null;const p=d.split("/");if(p.length===3)return new Date(p[2],p[1]-1,p[0]);return new Date(d);}
function toISO(d){if(!d)return"";const dt=parseDate(d);if(!dt||isNaN(dt))return"";return dt.toISOString().slice(0,10);}
function fromISO(s){if(!s)return"";const[y,m,d]=s.split("-");return`${d}/${m}/${y}`;}
function urgency(d){const dt=parseDate(d);if(!dt)return 0;const diff=(dt-new Date())/86400000;if(diff<0)return 3;if(diff<=7)return 2;if(diff<=21)return 1;return 0;}

function domainGroup(o){const s=(o||"").replace(/^BCEF (IT|RETAIL) - /,"").trim();const m=s.match(/^([A-Z0-9]{2,})/);return m?m[1]:s.split(" ")[0]||"Autre";}
function statutSuivi(ao) {

  if(ao.dateQualif) return "qualif";
  if(ao.dateReponse) return "repondu";
  if(ao.bm || ao.datePrise) return "encours";

}
function statutComplet(ao) {

    const s=statutSuivi(ao);

function hasTraitement(ao) { return !!(ao.bm||ao.datePrise||ao.dateReponse||ao.dateQualif||ao.dateDemarrage); }
function statutLabel(s) {

}
function statutPill(s, ao) {

  return '<span class="status-pill '+cls+'">'+statutLabel(s)+'</span>'+flag;
}

function toast(msg, type="ok"){

  if(!zone){zone=document.createElement("div");zone.id="toast-zone";document.body.appendChild(zone);}
  const t=document.createElement("div");

function periodKey(dateStr, mode) {
  const d = dateStr ? (dateStr.includes("/") ? parseDate(dateStr) : new Date(dateStr)) : null;
  if(!d || isNaN(d)) return null;
  const y=d.getFullYear(), m=d.getMonth(), day=d.getDate();
  if(mode==="week") {
    const jan1=new Date(y,0,1); const days=Math.floor((d-jan1)/86400000);
    const w=Math.ceil((days+jan1.getDay()+1)/7);
    return y+"-S"+String(w).padStart(2,"0");
  }
  if(mode==="month") return y+"-"+String(m+1).padStart(2,"0");
  if(mode==="quarter") return y+"-T"+Math.ceil((m+1)/3);
  if(mode==="semester") return y+"-S"+(m<6?"1":"2");
  if(mode==="year") return ""+y;
  return y+"-"+String(m+1).padStart(2,"0");
}
function periodLabel(key, mode) {
  if(!key) return "—";
  if(mode==="week") { const [y,w]=key.split("-S"); return "Sem. "+parseInt(w)+" "+y; }
  if(mode==="month") { const [y,m]=key.split("-"); const mois=["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"]; return mois[parseInt(m)-1]+" "+y; }
  if(mode==="quarter") return key.replace("-T"," T");
  if(mode==="semester") return key.replace("-S"," Sem. ");
  return key;
}
function periodFilter(dateStr, period) {
  if(!period||period==="all") return true;
  const d = parseDate(dateStr);
  if(!d) return true;
  const now = new Date();
  if(period==="week") { const w=new Date(now); w.setDate(w.getDate()-7); return d>=w; }
  if(period==="month") { const m=new Date(now); m.setMonth(m.getMonth()-1); return d>=m; }
  if(period==="quarter") { const q=new Date(now); q.setMonth(q.getMonth()-3); return d>=q; }
  if(period==="year") { const y=new Date(now); y.setFullYear(y.getFullYear()-1); return d>=y; }
  return true;
}

function normDate(d) {
  if(!d) return "";
  // Convertir DD/MM/YYYY → YYYY-MM-DD pour comparaison
  const m = d.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(m) return `${m[3]}-${m[2]}-${m[1]}`;
  return d; // déjà YYYY-MM-DD
}
function getDashAOs() {
  return allAOs.filter(a => {
    const raw = a.dateOuverture || a.dateCreation || "";
    if(!raw) return false;
    return normDate(raw) >= dashDateFrom;
  });
}
function getDashOpenAOs() { return getDashAOs().filter(a => a.statut !== "clos"); }
function getFilteredAOs() {
  let f = clientAOs(baseAOs());
  if(filters.statut==="clos_nontraite") f=f.filter(a=>a.statut==="clos"&&!hasTraitement(a));
  else if(filters.statut==="clos_traite") f=f.filter(a=>a.statut==="clos"&&hasTraitement(a));
  else if(filters.statut==="clos") f=f.filter(a=>a.statut==="clos");
  else if(filters.statut==="tous_clos") { /* all, no filter */ }
  else if(filters.statut!=="Tous") f=f.filter(a=>a.statut!=="clos"&&statutSuivi(a)===filters.statut);
  else { /* Tous = show all including clos */ }
  if(filters.search){const s=filters.search.toLowerCase();f=f.filter(a=>[a.rfc,a.intitule,a.profil,a.org,a.dept,a.bm||"",a.consultant||"",a.codeFramework||"",a.codeBPCE||""].some(v=>(v||"").toLowerCase().includes(s)));}
  if(filters.dept!=="Tous") f=f.filter(a=>a.dept===filters.dept);
  if(filters.cat!=="Tous") f=f.filter(a=>categorize(a.profil)===filters.cat);
  if(filters.bm!=="Tous") f=f.filter(a=>(a.bm||"")===(filters.bm==="—"?"":filters.bm));
  if(filters.period!=="all") f=f.filter(a=>periodFilter(a.dateDebut,filters.period));
  f=[...f].sort((a,b)=>{
    if(sort.col==="dateDebut") return sort.dir*((parseDate(a.dateDebut)||0)-(parseDate(b.dateDebut)||0));

      panel.innerHTML = `<div class="card-title" style="display:flex;justify-content:space-between;align-items:center">

function renderListe(el) {
  const scope = clientAOs(baseAOs());
  const open = getOpenAOs();
  const depts = ["Tous",...new Set(scope.map(a=>a.dept))];
  const cats = ["Tous",...new Set(scope.map(a=>categorize(a.profil)))];
  const bms = ["Tous",...new Set(scope.map(a=>a.bm||"—").filter(Boolean))];
  const filtered = getFilteredAOs();
  let tableRows = filtered.map(a=>{
    const cat=categorize(a.profil), u=urgency(a.dateDebut), sc=statutComplet(a);
    const isClos=a.statut==="clos";
    const sel=selectedRFC===a.rfc;
    const gStored=gridStored(a); const fwSug=!gStored?gridSuggest(a):""; const fwEff=gStored||fwSug;
    return `<tr class="row${u&&!isClos?" urg"+u:""}${isClos?" clos":""}${sel?" selected":""}" data-rfc="${a.rfc}" tabindex="0">
      <td class="rfc-code">${a.rfc.replace("RFC0000","").replace("RFC000","")}</td>
      <td><span class="badge" style="background:${CAT_COLORS[cat]}">${cat}</span></td>
      <td class="profil-cell" title="${escHtml(a.profil)}">${escHtml(a.profil)}</td>
      <td class="org-cell" title="${escHtml(a.org)}">${escHtml(shortOrg(a.org))}</td>
      <td>${a.dateDebut}</td>
      <td class="r">${a.nbJours}</td>
      <td class="${a.bm?"tri-cell":"empty-cell"}">${a.bm||"—"}</td>
      <td class="${a.consultant?"tri-cell":"empty-cell"}">${a.consultant||"—"}</td>
      <td class="r" style="font-size:11.5px">${a.tjm?a.tjm+"€":"—"}</td>
      <td class="rfc-code" title="${escHtml(gridLabel(a,fwEff))}${fwSug?" — déduit de l&#39;intitulé (non enregistré)":""}">${gStored?escHtml(gridShort(a,gStored)):(fwSug?`<span style="color:#94a3b8;font-style:italic">${escHtml(gridShort(a,fwSug))}*</span>`:'<span class="empty-cell">—</span>')}</td>
      <td>${statutPill(sc,a)}${a.notes?` <span title="${escHtml(a.notes.substring(0,100))}" style="cursor:help">📝</span>`:""}</td>
      <td style="font-size:10px;color:var(--text-light);text-align:center" title="${a.modifiedAt?'Modifié le '+new Date(a.modifiedAt).toLocaleDateString('fr-FR'):''}">
        ${a.modifiedBy?`<span style="font-weight:600;color:var(--green)">${a.modifiedBy}</span>`:'—'}
      </td>
    </tr>`;
  }).join("");
  if(!filtered.length){
    tableRows = `<tr><td colspan="12" style="padding:36px;text-align:center;color:var(--gray);font-size:13px">
      Aucun appel d'offres ne correspond aux filtres actifs.<br>
      <button class="btn" id="reset-filters" style="margin-top:12px">Réinitialiser les filtres</button>
    </td></tr>`;
  }
  const sortArrow = c => sort.col===c ? (sort.dir===1?" ▲":" ▼") : "";
  el.innerHTML = `
    <h1 style="font-size:24px;font-weight:800;margin-bottom:20px">Appels d'offres <span style="font-weight:400;font-size:16px;color:var(--gray)">${clientMeta(selectedClient).label} · ${filtered.length} résultat${filtered.length>1?"s":""}</span></h1>
    <div class="filter-bar">
      <input type="text" id="f_search" placeholder="🔍 Rechercher..." value="${filters.search}">
      <select id="f_dept">${depts.map(d=>`<option value="${d}"${filters.dept===d?" selected":""}>${d==="Tous"?"Département":d}</option>`).join("")}</select>
      <select id="f_cat">${cats.map(c=>`<option value="${c}"${filters.cat===c?" selected":""}>${c==="Tous"?"Catégorie":c}</option>`).join("")}</select>
      <select id="f_statut">
        <option value="Tous"${filters.statut==="Tous"?" selected":""}>Tous les AO</option>
        <option value="ouvert"${filters.statut==="ouvert"?" selected":""}>⚪ Non traité</option>
        <option value="encours"${filters.statut==="encours"?" selected":""}>🟡 En cours</option>
        <option value="qualif"${filters.statut==="qualif"?" selected":""}>🟣 Qualifié</option>
        <option value="demarrage"${filters.statut==="demarrage"?" selected":""}>🟢 Démarré</option>
        <option value="clos"${filters.statut==="clos"?" selected":""}>⚫ Tous clos</option>
        <option value="clos_nontraite"${filters.statut==="clos_nontraite"?" selected":""}>⚫ Clos sans traitement</option>
        <option value="clos_traite"${filters.statut==="clos_traite"?" selected":""}>🔵 Clos traités</option>
      </select>
      <select id="f_bm">${bms.map(b=>`<option value="${b}"${filters.bm===b?" selected":""}>${b==="Tous"?"Manager":b}</option>`).join("")}</select>
      <select id="f_period">
        <option value="all"${filters.period==="all"?" selected":""}>Toute période</option>
        <option value="week"${filters.period==="week"?" selected":""}>7 derniers jours</option>
        <option value="month"${filters.period==="month"?" selected":""}>30 derniers jours</option>
        <option value="quarter"${filters.period==="quarter"?" selected":""}>Trimestre</option>
        <option value="year"${filters.period==="year"?" selected":""}>Année</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th class="sortable" data-col="rfc">RFC${sortArrow("rfc")}</th>
          <th>Cat.</th><th>Profil</th><th>Domaine</th>
          <th class="sortable" data-col="dateDebut">Début${sortArrow("dateDebut")}</th>
          <th class="sortable r" data-col="nbJours">Jours${sortArrow("nbJours")}</th>
          <th>BM</th><th>Consultant</th><th class="r">TJM</th><th>Code</th><th>Suivi</th><th style="text-align:center">Modif.</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div id="detail-area"></div>
  `;
  // Recherche : debounce + restauration du focus (le re-render détruisait le champ à chaque frappe)
  let searchTimer=null;
  document.getElementById("f_search").addEventListener("input",e=>{
    filters.search=e.target.value;
    clearTimeout(searchTimer);
    searchTimer=setTimeout(()=>{
      renderListe(el);
      const inp=document.getElementById("f_search");
      if(inp){ inp.focus(); const v=inp.value; inp.setSelectionRange(v.length,v.length); }
    },200);
  });
  document.getElementById("f_dept").addEventListener("change",e=>{filters.dept=e.target.value;renderListe(el);});
  document.getElementById("f_cat").addEventListener("change",e=>{filters.cat=e.target.value;renderListe(el);});
  document.getElementById("f_statut").addEventListener("change",e=>{filters.statut=e.target.value;renderListe(el);});
  document.getElementById("f_bm").addEventListener("change",e=>{filters.bm=e.target.value;renderListe(el);});
  document.getElementById("f_period").addEventListener("change",e=>{filters.period=e.target.value;renderListe(el);});
  const resetBtn=document.getElementById("reset-filters");
  if(resetBtn) resetBtn.addEventListener("click",()=>{
    filters={search:"",dept:"Tous",cat:"Tous",statut:"Tous",period:"all",bm:"Tous"};
    renderListe(el);
  });
  document.querySelectorAll("th.sortable").forEach(th=>{
    th.addEventListener("click",()=>{const c=th.dataset.col;if(sort.col===c)sort.dir=-sort.dir;else{sort.col=c;sort.dir=1;}renderListe(el);});
  });
  document.querySelectorAll("tr.row").forEach(tr=>{
    const openRow=()=>{
      const rfc=tr.dataset.rfc;
      selectedRFC=selectedRFC===rfc?null:rfc;
      renderListe(el);
      if(selectedRFC) document.getElementById("detail-area").scrollIntoView({behavior:"smooth",block:"nearest"});
    };
    tr.addEventListener("click",openRow);
    tr.addEventListener("keydown",e=>{ if(e.key==="Enter") openRow(); });
  });
  if(selectedRFC) renderDetail(document.getElementById("detail-area"), selectedRFC);
}

  });
  document.getElementById("delete-ao").addEventListener("click",async()=>{

    } else {
      selectedRFC = null;
      allAOs = allAOs.filter(a => a.rfc !== ao.rfc);
      renderView();
    }
  });
}

// ===================== HISTORIQUE =====================
let histF = { dept: "Tous", cat: "Tous", statut: "Tous", statutAO: "Tous", domain: "Tous", statutPwise: "Tous" };
function suiviFromPwise(sp) {
  if (!sp) return "encours";
  if (/non retenu/i.test(sp)) return "clos";
  if (/retenu/i.test(sp)) return "demarrage";
  if (/soumis/i.test(sp)) return "repondu";
  return "encours";
}
// "INTM a répondu" — preuve de réponse robuste aux ré-ouvertures PWise.
// Un AO non retenu / retenu prouve qu'on a répondu, même sans dateReponse captée.
function aReponduAO(a) {
  return !!(a.dateReponse || a.aRepondu || a.dateDemarrage ||
    ["repondu","demarrage","clos"].includes(suiviFromPwise(a.statutPwise)));
}
function estRetenuAO(a)    { return suiviFromPwise(a.statutPwise) === "demarrage" || !!a.dateDemarrage; }
function estNonRetenuAO(a) { return suiviFromPwise(a.statutPwise) === "clos"; }
async function renderHistorique(el) {
  await loadHistoricalAOs();
  const clientHist = clientAOs(histAOs).filter(a => !(a.bm||"").trim()); // comptes = AO sans attribution (les attribués sont dans les vues équipe)
  if (!clientHist.length) {
    el.innerHTML = `
      <h1 style="font-size:24px;font-weight:800;margin-bottom:16px">📊 Dashboard ${clientMeta(selectedClient).label}</h1>
      <div class="card" style="text-align:center;padding:40px">
        <div style="font-size:48px;margin-bottom:16px">📭</div>
        <h3 style="margin-bottom:8px">Aucune donnée historique</h3>
        <p style="color:var(--gray);font-size:13px;margin-bottom:20px">Importez l'extraction PWise via la section "Import Historique" dans Import PWise.</p>
        <button class="btn btn-green" onclick="navigate('import')">📥 Aller à l'import</button>
      </div>`;
    return;
  }
  const depts = ["Tous", ...new Set(clientHist.map(a => a.dept).filter(Boolean))].sort();
  const cats  = ["Tous", ...new Set(clientHist.map(a => categorize(a.profil)))];
  // Filtrage
  let f = [...clientHist];
  if (histF.dept !== "Tous") f = f.filter(a => a.dept === histF.dept);
  if (histF.domain !== "Tous") f = f.filter(a => domainGroup(a.org) === histF.domain);
  if (histF.cat  !== "Tous") f = f.filter(a => categorize(a.profil) === histF.cat);
  if (histF.statutPwise !== "Tous") f = f.filter(a => (a.statutPwise||"—") === histF.statutPwise);

  const reponduSeulement = f.filter(a => suiviFromPwise(a.statutPwise) === "repondu").length;
  const tauxGlobal= total ? Math.round(retenus / total * 100) : 0;

// ── (S) AO factory — construction d'un AO vierge ──
const AO_DEFAULTS = {
  client:"BNP",
  bm:"", consultant:"", tjm:"", notes:"",
  datePrise:"", dateReponse:"", dateQualif:"",
  dateDemarrage:"", dateCloture:"", dateDisparition:"", aRepondu:false
};
function buildNewAO(p, { isHistorique = false } = {}) {
  return { ...AO_DEFAULTS, ...p, isHistorique, statut:"ouvert",
    dateOuverture: today(), dateCreation: today(), dernierImport: today() };
}
// ── (O) Règles de statut PWise — données extensibles ──
const PWISE_STATUS_RULES = [
  { test: sp => /non retenu/i.test(sp),   apply: ()  => ({ statut:"clos", dateCloture: today(), aRepondu:true }) },
  { test: sp => /^RFC retenu$/i.test(sp), apply: ao  => ({ aRepondu:true, ...(ao.dateDemarrage ? {} : { dateDemarrage: today() }) }) },
  { test: sp => /soumis/i.test(sp),       apply: ao  => ({ aRepondu:true, ...(ao.dateReponse   ? {} : { dateReponse:  today() }) }) },
];
// ── (S) Application des règles — isolée du reste ──
function applyStatusRules(ao, statutPwise) {
  if (hasTraitement(ao)) return {}; // suivi actif protégé
  for (const rule of PWISE_STATUS_RULES) {
    if (rule.test(statutPwise)) {
      return rule.apply(ao) || {};
    }
  }
  return {};
}
// ── (S)(D) Moteur de sync unifié — toute la logique métier ──
// mode: 'pwise' | 'json' | 'historique'
async function syncAOs(parsed, { mode = 'pwise', logImport = false } = {}) {
  const existing   = await dbGetAll("aos");
  const existingMap = Object.fromEntries(existing.map(a => [a.rfc, a]));
  const importedRFCs = new Set(parsed.map(p => p.rfc));
  const c = { addedDash:0, addedHist:0, updated:0, closed:0, autoClos:0, unchanged:0, pending:0 };
  const toSave = [];
  parsed.forEach(p => {
    const ex          = existingMap[p.rfc];
    const inPerimeter = !EXCLUDED_DOMAINS.includes(domainGroup(p.org));
    if (!ex) {
      // ── Nouveau AO ──
      const isHist = (mode === 'historique') || !inPerimeter;
      toSave.push(buildNewAO(p, { isHistorique: isHist }));
      inPerimeter ? c.addedDash++ : c.addedHist++;
      return;
    }
    if (mode === 'pwise') {
      // Import texte complet : mise à jour champs + préservation suivi
      const changed = ex.profil !== p.profil || ex.nbJours !== p.nbJours || ex.dateDebut !== p.dateDebut;
      toSave.push({
        ...ex, ...p, statut:"ouvert", dateCloture:"", dateDisparition:"", dernierImport: today(),
        isHistorique: !inPerimeter, // ré-évalue le périmètre : un AO redevenu dans le périmètre est réactivé
        bm: ex.bm||"", datePrise: ex.datePrise||"", dateReponse: ex.dateReponse||"", aRepondu: ex.aRepondu||false,
        consultant: ex.consultant||"", tjm: ex.tjm||"", dateQualif: ex.dateQualif||"",
        dateDemarrage: ex.dateDemarrage||"", notes: ex.notes||"",
        dateOuverture: ex.dateOuverture || ex.dateCreation || today(),
        dateCreation:  ex.dateCreation  || today()
      });
      changed ? c.updated++ : c.unchanged++;
    } else if (mode === 'json') {
      // Sync JSON bookmarklet : statutPwise + règles auto
      const patch = applyStatusRules(ex, p.statutPwise);
      patch.statut === 'clos' ? c.autoClos++ : c.updated++;
      toSave.push({ ...ex, statutPwise: p.statutPwise, dernierImport: today(), ...patch });
    } else if (mode === 'historique') {
      // Retag sans suivi actif
      if (!ex.isHistorique && !ex.bm && !ex.datePrise) {
        const suivi = suiviFromPwise(p.statutPwise);
        toSave.push({ ...ex, isHistorique: true,
          statut:       suivi === "clos" ? "clos" : ex.statut,
          dateCloture:  suivi === "clos" && !ex.dateCloture  ? (p.dateDebut || today()) : ex.dateCloture,
          dateReponse:  ["repondu","demarrage"].includes(suivi) && !ex.dateReponse  ? (p.dateDebut || today()) : ex.dateReponse,
          dateDemarrage: suivi === "demarrage" && !ex.dateDemarrage ? (p.dateDebut || today()) : ex.dateDemarrage,
        });
        c.updated++;
      }
    }
  });
  // ── Gestion des absents ──
  if (mode === 'pwise') {
    existing.forEach(ex => {
      if (ex.statut === "clos" || importedRFCs.has(ex.rfc)) return;
      if (ex.dateReponse) {
        const days = Math.round((new Date() - new Date(ex.dateDisparition || today())) / 86400000);
        if (days < 30) { toSave.push({ ...ex, dateDisparition: ex.dateDisparition || today(), dernierImport: today() }); c.pending++; return; }
      }
      toSave.push({ ...ex, statut: "clos", dateCloture: today(), dernierImport: today() });
      c.closed++;
    });
    parsed.forEach(p => { const s = toSave.find(x => x.rfc === p.rfc); if (s?.dateDisparition) s.dateDisparition = ""; });
  } else if (mode === 'json') {
    existing
      .filter(ex => !ex.isHistorique && ex.statut !== "clos" && !importedRFCs.has(ex.rfc) && !hasTraitement(ex))
      .forEach(ex => { if (!ex.dateDisparition) toSave.push({ ...ex, dateDisparition: today() }); });
  }
  if (toSave.length) await dbPutMany("aos", toSave);
  if (logImport) await dbPut("imports", { date: today(), time: new Date().toLocaleTimeString("fr-FR"), nbParsed: parsed.length, ...c });
  return c;
}
// ── (S) Lecture de fichier — utilitaire pur ──
function readFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsText(file);
  });
}

// ── Transformation export Harmoni (BPCE) → objets AO ──
function harmoniToAOs(data){
  if (data && Array.isArray(data.aos) && data.source==="harmoni-bpce") return data.aos; // déjà transformé
  const rows = (data && data.dossiers) || (Array.isArray(data)?data:[]);
  const isoD = s => { s=(s||"").split(" ")[0].trim(); const m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/); return m?`${m[3]}-${m[2]}-${m[1]}`:""; };
  const splitLib = lib => {
    lib=(lib||"").trim().replace(/^N\s*-\s*/i,"").replace(/^N-\s*/i,"");
    const parts=lib.split(" - ").map(x=>x.trim()).filter(Boolean);
    if(!parts.length) return ["Autre", lib || "(sans intitulé)"];
    return [parts[0], parts.length>1?parts.slice(1).join(" - "):parts[0]];
  };
  // casse canonique des filiales (fusionne Natixis/NATIXIS…)
  const fold={};
  rows.forEach(r=>{ const o=splitLib(r.libelle)[0], f=o.toLowerCase(); (fold[f]=fold[f]||{})[o]=(fold[f][o]||0)+1; });
  const canon={}; Object.keys(fold).forEach(f=>{ canon[f]=Object.entries(fold[f]).sort((a,b)=>b[1]-a[1])[0][0]; });
  const extract = (data && data.extractDate) ? String(data.extractDate).slice(0,10) : today();
  const out=[], seen={};
  rows.forEach(r=>{
    const rfc=(r.dossierAchat||"").trim(); if(!rfc||seen[rfc]) return; seen[rfc]=1;
    const sp=splitLib(r.libelle); const org=canon[sp[0].toLowerCase()]||sp[0];
    const clos=(r.statutRFx||"").trim()==="Clos";
    out.push({ ...AO_DEFAULTS, client:"BPCE",
      rfc, tm: r.numLot?("Lot "+r.numLot):"",
      intitule:(r.libelle||"").trim(), org, dept:org,
      statutPwise:(r.avancementReponse||"").trim(),
      statutRFx:(r.statutRFx||"").trim(), typeAO:(r.typeAO||"").trim(),
      profil: sp[1]||(r.libelle||"").trim(), modalite:"",
      dateDebut:(r.dateDebut||"").split(" ")[0], dateFin:(r.dateFin||"").split(" ")[0], nbJours:0,
      statut: clos?"clos":"ouvert", dateCloture: clos?isoD(r.dateFin):"",
      dateOuverture: isoD(r.dateDebut), dateCreation: isoD(r.dateDebut)||extract,
      isHistorique:false, dernierImport:extract });
  });
  return out;
}
// ── Import scopé par client — n'affecte JAMAIS les autres clients ──
async function importClientAOs(parsed, clientId, { logImport = false } = {}) {
  const existing = await dbGetAll("aos");
  const exMap = Object.fromEntries(existing.map(a => [a.rfc, a]));
  const c = { added:0, updated:0 };
  const toSave = [];
  parsed.forEach(p => {
    const ex = exMap[p.rfc];
    if (!ex) { toSave.push({ ...p, client: clientId }); c.added++; }
    else {
      // MAJ des infos Harmoni + préservation du suivi manuel
      toSave.push({ ...ex, ...p, client: clientId,
        bm: ex.bm||"", consultant: ex.consultant||"", tjm: ex.tjm||"", notes: ex.notes||"",
        datePrise: ex.datePrise||"", dateReponse: ex.dateReponse||"", dateQualif: ex.dateQualif||"",
        dateDemarrage: ex.dateDemarrage||"", aRepondu: ex.aRepondu||false,
        dateOuverture: ex.dateOuverture || p.dateOuverture, dateCreation: ex.dateCreation || p.dateCreation,
        // Clôture "collante" : une fermeture (manuelle OU source) n'est jamais rouverte par un ré-import
        statut: (ex.statut==="clos" || p.statut==="clos") ? "clos" : "ouvert",
        dateCloture: ex.dateCloture || p.dateCloture || "" });
      c.updated++;
    }
  });
  if (toSave.length) await dbPutMany("aos", toSave);
  if (logImport) await dbPut("imports", { date: today(), time: new Date().toLocaleTimeString("fr-FR"), nbParsed: parsed.length, added: c.added, updated: c.updated, closed: 0, client: clientId });
  return c;
}
// ── Transformation export OBMS (.xlsx via SheetJS) → objets AO ──
function obmsYear(d){ if(d instanceof Date) return d.getFullYear(); const m=String(d).match(/(\d{4})/); return m?+m[1]:0; }
function obmsIso(d){ if(d instanceof Date){ const p=n=>String(n).padStart(2,"0"); return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()); } const s=String(d).slice(0,10); return /^\d{4}-\d{2}-\d{2}/.test(s)?s:""; }
function obmsFrDate(d){ if(d instanceof Date){ const p=n=>String(n).padStart(2,"0"); return p(d.getDate())+"/"+p(d.getMonth()+1)+"/"+d.getFullYear(); } return String(d||"").split(" ")[0]; }
function obmsParseProfil(str){
  let s=(str||"").toString().trim(), code="";
  let m=s.match(/^([A-Z]{3,}\d*_Z\d+)\s*-\s*(.*)$/); if(m){ code=m[1]; s=m[2].trim(); }
  let niv=0; m=s.match(/-\s*N([1-4])\s*$/); if(m){ niv=+m[1]; s=s.slice(0,m.index).trim(); }
  let loc=""; m=s.match(/-\s*(IDF|R[ée]gions?)\s*$/i); if(m){ loc=/idf/i.test(m[1])?"IDF":"Régions"; s=s.slice(0,m.index).trim(); }
  return { base:s.replace(/^[-\s]+|[-\s]+$/g,""), loc, niv, code };
}
function obmsToAOs(rows){
  const out=[], seen={};
  (rows||[]).forEach(r=>{
    const ref=String(r["Référence"]??r["Reference"]??"").trim();
    if(!ref || seen[ref]) return;
    const recu=r["Reçu le"]??r["Recu le"]??"";
    const y=obmsYear(recu); if(y && y<2026) return;         // périmètre 2026+
    seen[ref]=1;
    const pp=obmsParseProfil(r["Profil"]||"");
    const ca=parseFloat(String(r["CA estimé"]??r["CA estime"]??"").replace(",","."))||null;
    out.push({ ...AO_DEFAULTS, client:"OBMS", source:"obms", typeAO:"AT",
      rfc:ref, tm:pp.code||"",
      intitule:String(r["Profil"]||"").trim(),
      profil:(pp.base+(pp.niv?(" N"+pp.niv):"")).trim() || String(r["Profil"]||"").trim(),
      org:pp.base||"Autre", dept:pp.loc||"—", statutPwise:"", statutRFx:"", modalite:"",
      dateDebut:obmsFrDate(r["Démarrage"]??r["Demarrage"]??""), dateFin:"", nbJours:0,
      statut:"ouvert", bm:String(r["Suivi par"]||"").trim(),
      caEstime:ca, lieu:String(r["Lieu de réalisation"]??r["Lieu de realisation"]??"").trim(),
      motCle:String(r["Mot clé"]??r["Mot cle"]??"").trim().slice(0,200),
      contraintes:String(r["Contraintes"]||"").trim().slice(0,200),
      niveauOBMS:pp.niv, locOBMS:pp.loc,
      dateOuverture:obmsIso(recu), dateCreation:obmsIso(recu),
      isHistorique:false, dernierImport:today() });
  });
  return out;
}

async function getExportAOs(scoped){
  if(histAOs.length===0){
    try{ await loadHistoricalAOs(); }
    catch(e){ console.warn("Export : historique non chargé —", e); }
  }
  const seen={}, out=[];
  allAOs.forEach(a=>{ if(a.rfc&&!seen[a.rfc]){ seen[a.rfc]=1; out.push(a); } });
  histAOs.forEach(a=>{ if(a.rfc&&!seen[a.rfc]){ seen[a.rfc]=1; out.push(a); } });
  return scoped ? clientAOs(out) : out;

  const aos=await getExportAOs(scoped);
  const dashRfc={};
  allAOs.forEach(a=>{ dashRfc[a.rfc]=1; });
  let csv="RFC;Client;TM;Profil;Catégorie;Intitulé;Organisation;Département;Modalité;Date ouverture;Début;Fin;Jours;Statut PWise;BM;Date prise;Date réponse;Consultant;TJM;Code framework;TJM max grille;Qualif;Date qualif;Démarrage;Date démarrage;Notes;Statut suivi;Statut AO;Historique\n";
  aos.forEach(a=>{
    const ss=statutComplet(a);
    csv+=`${a.rfc};${clientMeta(clientOf(a)).label};${a.tm};${(a.profil||"").replace(/;/g,",")};${categorize(a.profil)};${(a.intitule||"").replace(/;/g,",")};${(a.org||"").replace(/;/g,",")};${a.dept};${a.modalite};${a.dateOuverture||a.dateCreation||""};${a.dateDebut};${a.dateFin};${a.nbJours};${a.statutPwise};${a.bm||""};${a.datePrise||""};${a.dateReponse||""};${a.consultant||""};${a.tjm||""};${gridEffective(a)||""};${gridMax(a,gridEffective(a))??""};${a.dateQualif?"Oui":"Non"};${a.dateQualif||""};${a.dateDemarrage?"Oui":"Non"};${a.dateDemarrage||""};${(a.notes||"").replace(/;/g,",").replace(/\n/g," ")};${statutLabel(ss)};${a.statut};${dashRfc[a.rfc]?"Non":"Oui"}\n`;
  });
  const cl=clientMeta(selectedClient).label;
  const suffix = scoped ? cl.normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^A-Za-z0-9]+/g,"_") : "tous_clients";
  download("ao_"+suffix+"_export.csv", "﻿"+csv, "text/csv;charset=utf-8;");
}

async function doImportJSON(e){
  const file=e.target.files[0]; if(!file)return;
  const text=await file.text();
  try{
    const data=JSON.parse(text);
    if(!data.aos||!data.aos.length){alert("Fichier invalide.");return;}
    if(!confirm(`Restaurer ${data.aos.length} AO depuis la sauvegarde du ${data.exportDate||"?"} ?\nCela écrasera les données existantes.`))return;
    await dbPutMany("aos",data.aos);
    alert("✅ Restauration terminée !");
    renderView();
  }catch(err){alert("Erreur de lecture: "+err.message);}
}
function download(filename, content, type){
  const blob=new Blob([content],{type});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}

function updateSuiviNav(){

  const nav = document.querySelector('.nav-item[data-view="suivi"]');
  if(!nav) return;
  const isTeam = !!(clientMeta(selectedClient).team);
  nav.style.display = isTeam ? "none" : "";

}
function initClientSelect(){
  const sel = document.getElementById("client-select");
  if(!sel) return;
  sel.innerHTML = activeClients().map(c => `<option value="${c.id}"${c.id===selectedClient?" selected":""}>${c.label}</option>`).join("");
  const lbl = document.getElementById("nav-dash-label");
  if(lbl) lbl.textContent = "Dashboard " + clientMeta(selectedClient).label;
  updateSuiviNav();
  sel.addEventListener("change", e => {
    selectedClient = e.target.value;
    const l = document.getElementById("nav-dash-label");
    if(l) l.textContent = "Dashboard " + clientMeta(selectedClient).label;
    const isTeam = updateSuiviNav();
    if(isTeam && currentView==="suivi") navigate("historique");   // pas coincé sur une vue masquée
    else renderView();
  });
}
async function init(){
  try {
    // Échap ferme le panneau de détail ou le panneau résultats
    document.addEventListener("keydown", e => {
      if(e.key !== "Escape") return;
      const closeBtn = document.getElementById("close-detail");
      if(closeBtn){ closeBtn.click(); return; }
      const resPanel = document.getElementById("res-detail-panel");
      if(resPanel) resPanel.remove();
    });
    await openDB();
    const statusEl=document.getElementById("db-status");
    if(useSupabase) statusEl.innerHTML='🟢 En ligne';
    else statusEl.innerHTML='🟡 Mode local';
    statusEl.style.background=useSupabase?"rgba(0,145,90,0.15)":"rgba(245,158,11,0.15)";
    statusEl.style.color=useSupabase?"#4ade80":"#fbbf24";
    // Init badge utilisateur
    renderUserBadge();
    if(!currentUser) {
      setTimeout(() => {
        const tri = prompt("👋 Bienvenue ! Entrez votre trigramme pour activer la traçabilité (ex: VBE, FIB) :");
        if(tri) setCurrentUser(tri);
      }, 800);
    }
    await seedIfEmpty();
    const menuBtn=document.getElementById("menu-toggle");
    const sidebar=document.getElementById("sidebar");
    const overlay=document.getElementById("sidebar-overlay");
    function toggleMenu(){ sidebar.classList.toggle("open"); overlay.classList.toggle("open"); }
    function closeMenu(){ sidebar.classList.remove("open"); overlay.classList.remove("open"); }
    menuBtn.addEventListener("click", toggleMenu);
    overlay.addEventListener("click", closeMenu);
    document.querySelectorAll(".nav-item").forEach(n=>{
      n.addEventListener("click",()=>{ closeMenu(); navigate(n.dataset.view); });
    });
    initClientSelect();
    await renderView();
  } catch(e) {
    document.getElementById("main-content").innerHTML='<div style="padding:40px;color:red;font-size:14px"><h2>Erreur au chargement</h2><pre>'+e.message+'\n'+e.stack+'</pre></div>';
  }
}
