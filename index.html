<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AO BCEF — PWise Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f5f7fa; color: #1a1a2e; }
  .wrap { max-width: 1260px; margin: 0 auto; padding: 20px; }

  /* Header */
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .header-bar { width: 6px; height: 40px; background: linear-gradient(180deg, #00915a, #00643e); border-radius: 3px; }
  .header h1 { font-size: 23px; font-weight: 700; letter-spacing: -0.5px; }
  .header p { font-size: 13px; color: #666; margin-top: 2px; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: #fff; border-radius: 10px; padding: 12px 16px; border: 1px solid #e2e8f0; }
  .stat-card.clickable { cursor: pointer; transition: box-shadow 0.15s; }
  .stat-card.clickable:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .stat-card.clickable.active { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
  .stat-val { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 12px; color: #64748b; margin-top: 2px; }
  .stat-val.green { color: #00915a; }
  .stat-val.red { color: #dc2626; }
  .stat-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

  /* Filters */
  .filters { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .filters input, .filters select { padding: 8px 12px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 13px; outline: none; background: #fff; }
  .filters input { flex: 1; min-width: 200px; }
  .filters input:focus { border-color: #00915a; }

  /* Table */
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: #f1f5f9; }
  th { padding: 10px 12px; text-align: left; font-weight: 600; white-space: nowrap; user-select: none; }
  th.sortable { cursor: pointer; }
  th.sortable:hover { color: #00915a; }
  td { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; }
  tr.row { cursor: pointer; transition: background 0.12s; }
  tr.row:hover { background: #f8fafc !important; }
  tr.row.selected { background: #e0f2fe !important; }
  tr.urg3 { background: #fef2f2; }
  tr.urg2 { background: #fefce8; }
  tr.urg1 { background: #f0fdf4; }
  .rfc-code { font-family: monospace; font-size: 12px; color: #475569; }
  .cat-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; color: #fff; }
  .profil-cell { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .org-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #64748b; }
  .date-cell { white-space: nowrap; }
  .fin-cell { color: #94a3b8; }
  .jours-cell { text-align: right; font-weight: 600; }
  th.jours-h { text-align: right; }

  /* Detail */
  .detail { margin-top: 14px; background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; padding: 16px; animation: slideIn 0.15s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .detail-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .detail-codes { font-size: 11px; color: #94a3b8; font-family: monospace; }
  .detail h3 { margin: 4px 0 10px; font-size: 16px; font-weight: 700; }
  .detail-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #94a3b8; }
  .detail-close:hover { color: #333; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; font-size: 13px; }
  .detail-grid .label { color: #94a3b8; font-size: 12px; }
  .detail-grid strong { font-weight: 600; }

  /* Footer */
  .footer { margin-top: 20px; text-align: center; font-size: 11px; color: #94a3b8; }

  @media (max-width: 768px) {
    .detail-grid { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
  }
</style>
</head>

// Parser
function parseAOs(raw) {
  const lines = raw.split("\n").map(l => l.trim()).filter(Boolean);
  const aos = [];
  const noise = ["Prestation","Dates de mission","Nombre d'UO","TJM","Code","Demande d'achats","Organisation","Département","Date limite de réponses","Statut"];
  let i = 0;
  while (i < lines.length) {
    if (lines[i] === "btnMasterDetail" && i+1 < lines.length && /^RFC\d+/.test(lines[i+1])) {
      const rfc = lines[i+1];
      const intitule = lines[i+2] || "";
      let tm="", org="", dept="", statut="";
      let j = i+3;
      while (j < lines.length && lines[j] !== "btnMasterDetail") {
        if (/^TM\d+/.test(lines[j])) tm = lines[j];
        else if (/^L6T?_/.test(lines[j])) org = lines[j].replace(/^L6T?_/, "");
        else if (lines[j].startsWith("L4_")) dept = lines[j].replace("L4_", "");
        else if (!noise.includes(lines[j]) && !lines[j].includes("Enregistrement") && !lines[j].includes("Modifier le paramétrage")) statut = lines[j];
        j++;
      }
      let profil="", modalite="", dateDebut="", dateFin="", nbJours=0;
      if (j < lines.length && lines[j] === "btnMasterDetail") {
        j++;
        if (j < lines.length) { profil = lines[j]; j++; }
        while (j < lines.length && lines[j] !== "btnMasterDetail") {
          if (["Sur Site","Télétravail","Hybride"].includes(lines[j])) modalite = lines[j];
          const dm = lines[j].match(/^(\d{2}\/\d{2}\/\d{4})\s*-\s*(\d{2}\/\d{2}\/\d{4})$/);
          if (dm) { dateDebut = dm[1]; dateFin = dm[2]; }
          const nm = lines[j].match(/^(\d+)[,.](\d+)$/);
          if (nm) nbJours = parseInt(nm[1]);
          j++;
        }
      }
      if (rfc) aos.push({ rfc, intitule, tm, org, dept, statut, profil, modalite, dateDebut, dateFin, nbJours });
      i = j;
    } else { i++; }
  }
  return aos;
}

function categorize(p) {
  const l = p.toLowerCase();
  if (/développeur|software|cobol|intégrateur/.test(l)) return "Dev";
  if (/business analyst|chargé de mission|consultant fonctionnel|analyse de test/.test(l)) return "BA";
  if (/chef de projet|project manager/.test(l)) return "CdP";
  if (/expert technique|tech lead/.test(l)) return "Expert";
  return "Autre";
}
const CAT_COLORS = { Dev:"#3b82f6", BA:"#8b5cf6", CdP:"#f59e0b", Expert:"#ef4444", Autre:"#6b7280" };

function parseDate(d) { if(!d) return null; const [day,month,year]=d.split("/"); return new Date(year,month-1,day); }
function urgency(d) { const dt=parseDate(d); if(!dt) return 0; const diff=(dt-new Date())/(86400000); if(diff<0) return 3; if(diff<=7) return 2; if(diff<=21) return 1; return 0; }
function shortOrg(o) { return o.replace(/BCEF (IT|RETAIL) - /g,"").replace(/\d+\s*/g,"").trim().substring(0,35); }

// State
let aos = parseAOs(RAW_DATA);
let state = { search:"", catFilter:"Tous", deptFilter:"Tous", sortBy:"dateDebut", sortDir:1, selected:null };

function getFiltered() {
  let f = aos;
  if (state.search) { const s=state.search.toLowerCase(); f=f.filter(a=>[a.rfc,a.intitule,a.profil,a.org,a.dept].some(v=>v.toLowerCase().includes(s))); }
  if (state.catFilter!=="Tous") f=f.filter(a=>categorize(a.profil)===state.catFilter);
  if (state.deptFilter!=="Tous") f=f.filter(a=>a.dept===state.deptFilter);
  f=[...f].sort((a,b)=>{
    if(state.sortBy==="dateDebut") return state.sortDir*((parseDate(a.dateDebut)||0)-(parseDate(b.dateDebut)||0));
    if(state.sortBy==="nbJours") return state.sortDir*(a.nbJours-b.nbJours);
    return state.sortDir*a.rfc.localeCompare(b.rfc);
  });
  return f;
}

function render() {
  const filtered = getFiltered();
  // Stats
  const catCounts = {};
  filtered.forEach(a=>{ const c=categorize(a.profil); catCounts[c]=(catCounts[c]||0)+1; });
  const total=filtered.length;
  const totalJours=filtered.reduce((s,a)=>s+a.nbJours,0);
  const avgJours=total?Math.round(totalJours/total):0;
  const urgent=filtered.filter(a=>urgency(a.dateDebut)>=2).length;

  let statsHtml = `
    <div class="stat-card"><div class="stat-val green">${total}</div><div class="stat-label">AO actifs</div></div>
    <div class="stat-card"><div class="stat-val">${totalJours}</div><div class="stat-label">Jours cumulés</div></div>
    <div class="stat-card"><div class="stat-val">${avgJours}j</div><div class="stat-label">Durée moy.</div></div>`;
  if(urgent>0) statsHtml += `<div class="stat-card"><div class="stat-val red">${urgent}</div><div class="stat-label" style="color:#dc2626">Urgent</div></div>`;
  for(const [cat,n] of Object.entries(catCounts)) {
    const active = state.catFilter===cat ? " active" : "";
    statsHtml += `<div class="stat-card clickable${active}" onclick="toggleCat('${cat}')"><div><span class="stat-dot" style="background:${CAT_COLORS[cat]}"></span><span class="stat-val" style="font-size:20px">${n}</span></div><div class="stat-label">${cat}</div></div>`;
  }
  document.getElementById("stats").innerHTML = statsHtml;

  // Sort icons
  document.querySelectorAll("th.sortable").forEach(th=>{
    const col=th.dataset.col;
    th.querySelector(".sort-icon").textContent = state.sortBy===col ? (state.sortDir===1?"↑":"↓") : "↕";
  });

  // Table
  let html = "";
  filtered.forEach(a=>{
    const cat=categorize(a.profil);
    const u=urgency(a.dateDebut);
    const sel=state.selected&&state.selected.rfc===a.rfc&&state.selected.tm===a.tm;
    html += `<tr class="row urg${u}${sel?" selected":""}" data-rfc="${a.rfc}" data-tm="${a.tm}">
      <td class="rfc-code">${a.rfc.replace("RFC000","")}</td>
      <td><span class="cat-badge" style="background:${CAT_COLORS[cat]}">${cat}</span></td>
      <td class="profil-cell" title="${a.profil}">${a.profil}</td>
      <td class="org-cell" title="${a.org}">${shortOrg(a.org)}</td>
      <td class="date-cell">${a.dateDebut}</td>
      <td class="date-cell fin-cell">${a.dateFin}</td>
      <td class="jours-cell">${a.nbJours}</td>
    </tr>`;
  });
  document.getElementById("tbody").innerHTML = html;

  // Row clicks
  document.querySelectorAll("tr.row").forEach(tr=>{
    tr.addEventListener("click", ()=>{
      const rfc=tr.dataset.rfc, tm=tr.dataset.tm;
      if(state.selected&&state.selected.rfc===rfc&&state.selected.tm===tm) { state.selected=null; }
      else { state.selected=filtered.find(a=>a.rfc===rfc&&a.tm===tm)||null; }
      render();
    });
  });

  // Detail
  const det=document.getElementById("detail");
  if(state.selected) {
    const s=state.selected;
    det.style.display="block";
    det.innerHTML = `<div class="detail">
      <div class="detail-header">
        <div>
          <div class="detail-codes">${s.rfc} · ${s.tm}</div>
          <h3>${s.profil}</h3>
        </div>
        <button class="detail-close" onclick="state.selected=null;render();">✕</button>
      </div>
      <div class="detail-grid">
        <div><div class="label">Intitulé</div>${s.intitule}</div>
        <div><div class="label">Organisation</div>${s.org}</div>
        <div><div class="label">Département</div>${s.dept}</div>
        <div><div class="label">Modalité</div>${s.modalite}</div>
        <div><div class="label">Période</div>${s.dateDebut} → ${s.dateFin}</div>
        <div><div class="label">Durée</div><strong>${s.nbJours} jours</strong></div>
        <div><div class="label">Statut</div>${s.statut}</div>
      </div>
    </div>`;
  } else { det.style.display="none"; }
}

// Filters setup
function setupFilters() {
  const depts = ["Tous", ...new Set(aos.map(a=>a.dept))];
  const cats = ["Tous", ...new Set(aos.map(a=>categorize(a.profil)))];
  const deptSel = document.getElementById("deptFilter");
  const catSel = document.getElementById("catFilter");
  deptSel.innerHTML = depts.map(d=>`<option value="${d}">${d==="Tous"?"Tous départements":d}</option>`).join("");
  catSel.innerHTML = cats.map(c=>`<option value="${c}">${c==="Tous"?"Toutes catégories":c}</option>`).join("");
}

// Events
document.getElementById("search").addEventListener("input", e=>{ state.search=e.target.value; render(); });
document.getElementById("deptFilter").addEventListener("change", e=>{ state.deptFilter=e.target.value; render(); });
document.getElementById("catFilter").addEventListener("change", e=>{ state.catFilter=e.target.value; render(); });
document.querySelectorAll("th.sortable").forEach(th=>{
  th.addEventListener("click", ()=>{
    const col=th.dataset.col;
    if(state.sortBy===col) state.sortDir=-state.sortDir;
    else { state.sortBy=col; state.sortDir=1; }
    render();
  });
});
function toggleCat(cat) { state.catFilter = state.catFilter===cat ? "Tous" : cat; document.getElementById("catFilter").value=state.catFilter; render(); }

// Init
document.getElementById("updateDate").textContent = new Date().toLocaleDateString("fr-FR");
setupFilters();
render();
</script>
</body>
</html>
