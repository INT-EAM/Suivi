<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTM — AO Manager</title>
<style>
:root {
  --green: #00915a; --green-dark: #00643e; --blue: #3b82f6; --purple: #8b5cf6;
  --amber: #f59e0b; --red: #ef4444; --gray: #64748b; --gray-light: #f1f5f9;
  --bg: #f5f7fa; --card: #fff; --border: #e2e8f0; --text: #1a1a2e; --text-light: #94a3b8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
a { color: var(--green); text-decoration: none; }

/* Layout */
.app { display: flex; min-height: 100vh; }
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.sidebar { width: 220px; background: #0f172a; color: #fff; padding: 20px 0; flex-shrink: 0; position: fixed; height: 100vh; overflow-y: auto; }
.sidebar-logo { padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px; }
.sidebar-logo h2 { font-size: 18px; font-weight: 700; }
.sidebar-logo span { font-size: 11px; color: var(--text-light); }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 13.5px; cursor: pointer; transition: background 0.12s; color: rgba(255,255,255,0.7); }
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active { background: rgba(0,145,90,0.2); color: #fff; border-left: 3px solid var(--green); }
.nav-item .icon { font-size: 16px; width: 22px; text-align: center; }
.nav-badge { margin-left: auto; background: var(--green); color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; }
.main { margin-left: 220px; flex: 1; padding: 24px 28px; max-width: 1200px; }

/* Cards */
.card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 18px; margin-bottom: 16px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--gray); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

/* KPI Grid */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
.kpi { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 16px; }
.kpi-value { font-size: 32px; font-weight: 800; line-height: 1.1; }
.kpi-label { font-size: 12px; color: var(--gray); margin-top: 4px; }
.kpi-sub { font-size: 11px; color: var(--text-light); margin-top: 2px; }

/* Filters Bar */
.filter-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.filter-bar select, .filter-bar input { padding: 7px 12px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 13px; outline: none; background: #fff; }
.filter-bar input[type=text] { flex: 1; min-width: 180px; }
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--green); }

/* Table */
.table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); background: #fff; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
thead tr { background: var(--gray-light); }
th { padding: 9px 10px; text-align: left; font-weight: 600; white-space: nowrap; user-select: none; font-size: 11.5px; text-transform: uppercase; color: var(--gray); letter-spacing: 0.3px; }
th.sortable { cursor: pointer; }
th.sortable:hover { color: var(--green); }
td { padding: 7px 10px; border-bottom: 1px solid #f8fafc; }
tr.row { cursor: pointer; transition: background 0.1s; }
tr.row:hover { background: #f8fafc !important; }
tr.row.selected { background: #e0f2fe !important; }
tr.urg3 { background: #fef2f2; }
tr.urg2 { background: #fefce8; }
tr.urg1 { background: #f0fdf4; }
tr.clos { opacity: 0.45; }
.rfc-code { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 11px; color: #475569; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; color: #fff; }
.profil-cell { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.org-cell { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--gray); font-size: 11.5px; }
.tri-cell { font-weight: 700; color: var(--green); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
.empty-cell { color: #d1d5db; }
.status-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 10.5px; font-weight: 600; }
.pill-ouvert { background: #dbeafe; color: #1d4ed8; }
.pill-encours { background: #fef3c7; color: #92400e; }
.pill-repondu { background: #fed7aa; color: #9a3412; }
.pill-qualif { background: #ede9fe; color: #6d28d9; }
.pill-demarrage { background: #d1fae5; color: #065f46; }
.pill-clos { background: #f1f5f9; color: #94a3b8; }
.pill-clos-traite { background: #dbeafe; color: #1e40af; }
th.r { text-align: right; }
td.r { text-align: right; }

/* Detail Panel */
.detail-panel { margin-top: 16px; animation: slideIn 0.15s ease; }
@keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
.detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.detail-codes { font-size: 11px; color: var(--text-light); font-family: monospace; }
.detail-panel h3 { font-size: 15px; font-weight: 700; margin-top: 4px; }
.close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-light); }
.close-btn:hover { color: #333; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px 20px; font-size: 13px; margin-bottom: 16px; }
.info-grid .lbl { font-size: 11px; color: var(--text-light); margin-bottom: 2px; }
.form-section { padding-top: 16px; border-top: 1px solid var(--border); }
.form-section h4 { font-size: 13px; font-weight: 600; color: var(--gray); margin-bottom: 12px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field label { font-size: 11px; color: var(--text-light); font-weight: 500; }
.field input, .field select { padding: 7px 10px; border-radius: 7px; border: 1px solid #d1d5db; font-size: 13px; outline: none; font-family: inherit; }
.field input:focus { border-color: var(--green); }
.field input.tri { text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
.form-actions { display: flex; gap: 8px; margin-top: 14px; }
.btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; font-size: 12.5px; cursor: pointer; font-weight: 500; font-family: inherit; }
.btn:hover { background: #f8fafc; }
.btn-green { background: var(--green); color: #fff; border-color: var(--green); }
.btn-green:hover { background: var(--green-dark); }
.btn-red { color: var(--red); border-color: #fecaca; }
.btn-red:hover { background: #fef2f2; }

/* Import */
.import-zone { border: 2px dashed #d1d5db; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.15s; }
.import-zone:hover { border-color: var(--green); background: #f0fdf4; }
.import-zone.active { border-color: var(--green); background: #d1fae5; }
.import-zone h3 { font-size: 16px; margin-bottom: 6px; }
.import-zone p { font-size: 13px; color: var(--gray); }
.import-result { margin-top: 16px; padding: 16px; border-radius: 10px; font-size: 13px; }
.import-ok { background: #d1fae5; border: 1px solid #86efac; color: #065f46; }
.import-warn { background: #fef3c7; border: 1px solid #fcd34d; color: #92400e; }

/* Charts (simple bars) */
.bar-chart { display: flex; flex-direction: column; gap: 6px; }
.bar-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
.bar-label { width: 140px; text-align: right; color: var(--gray); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; height: 22px; background: var(--gray-light); border-radius: 6px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 700; color: #fff; min-width: 28px; transition: width 0.3s; }
.bar-val { width: 30px; font-weight: 700; font-size: 12px; }

/* Mobile menu */
.menu-toggle { display: none; position: fixed; top: 12px; left: 12px; z-index: 1001; background: #0f172a; color: #fff; border: none; border-radius: 8px; width: 40px; height: 40px; font-size: 20px; cursor: pointer; align-items: center; justify-content: center; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; }

/* Tablet */
@media (max-width: 900px) {
  .menu-toggle { display: flex; }
  .sidebar { transform: translateX(-100%); transition: transform 0.25s ease; z-index: 1000; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .main { margin-left: 0; padding: 16px 14px; padding-top: 56px; max-width: 100%; }
  .dash-grid { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .kpi { padding: 10px 12px; }
  .kpi-value { font-size: 22px; }
  .kpi-label { font-size: 10px; }
  .info-grid, .form-grid { grid-template-columns: 1fr 1fr; }
  .filter-bar { gap: 6px; }
  .filter-bar select { font-size: 12px; padding: 6px 8px; }
  .bar-label { width: 90px; font-size: 11px; }
  table { font-size: 11.5px; }
  th, td { padding: 6px 6px; }
  .profil-cell { max-width: 140px; }
  .org-cell { max-width: 100px; }
}

/* Mobile */
@media (max-width: 600px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .kpi-value { font-size: 20px; }
  .info-grid, .form-grid { grid-template-columns: 1fr; }
  .filter-bar input[type=text] { min-width: 100%; }
  .filter-bar select { flex: 1; min-width: calc(50% - 6px); }
  .header h1 { font-size: 18px; }
  .header-actions { display: none; }
  .bar-label { width: 70px; }
  .profil-cell { max-width: 110px; font-size: 11px; }
  .org-cell { display: none; }
  th:nth-child(4), td:nth-child(4) { display: none; }
}
</style>
</head>
<body>
<button class="menu-toggle" id="menu-toggle">☰</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h2>INTM</h2>
      <span>AO Manager</span>
    </div>
    <div class="nav-item active" data-view="dashboard"><span class="icon">📊</span> Dashboard <span class="nav-badge" id="nav-count">0</span></div>
    <div class="nav-item" data-view="liste"><span class="icon">📋</span> Appels d'offres</div>
    <div class="nav-item" data-view="historique"><span class="icon">📈</span> Historique</div>
    <div class="nav-item" data-view="import"><span class="icon">📥</span> Import PWise</div>
    <div class="nav-item" data-view="export"><span class="icon">📤</span> Export</div>
    <div style="position:absolute;bottom:16px;left:0;right:0;padding:0 20px">
      <div id="db-status" style="font-size:10px;padding:6px 10px;border-radius:6px;text-align:center"></div>
    </div>
  </nav>

  <div class="main" id="main-content"></div>
</div>

<script>
// ===================== CONFIGURATION SUPABASE =====================
const SUPABASE_URL = "https://tjlrhacczpdtgtiutjlm.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqbHJoYWNjenBkdGd0aXV0amxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NzcxNTIsImV4cCI6MjA5MTI1MzE1Mn0.iBBvWvBtVHWf6s9eRb1cF9TgDqWBdl_8Bc3y6KH8lA4";

// Domaines exclus (équipe non utilisatrice de l'outil)
const EXCLUDED_DOMAINS = ["IECC", "DIFA", "MDEP"];

// ===================== BASE DE DONNÉES =====================
let memoryStore = { aos: [], imports: [] };
const useSupabase = SUPABASE_URL && SUPABASE_KEY;

function sbHeaders(extra) {
  return { "apikey": SUPABASE_KEY, "Authorization": "Bearer "+SUPABASE_KEY, "Content-Type": "application/json", "Prefer": "return=minimal", ...extra };
}

async function openDB() {
  if(useSupabase) { console.log("Supabase connecté: "+SUPABASE_URL); return; }
  console.warn("Supabase non configuré — mode mémoire (données non persistées)");
}

async function dbGetAll(store) {
  if(!useSupabase) return store==="aos"?memoryStore.aos:memoryStore.imports;
  try {
    const table = store==="aos"?"appels_offres":"imports";
    const res = await fetch(SUPABASE_URL+"/rest/v1/"+table+"?select=data&order="+(store==="aos"?"updated_at":"created_at")+".desc", {headers:sbHeaders()});
    if(!res.ok) throw new Error(res.statusText);
    const rows = await res.json();
    return rows.map(r=>r.data);
  } catch(e) { console.error("Supabase GET error:", e); return store==="aos"?memoryStore.aos:memoryStore.imports; }
}

async function dbPut(store, data) {
  if(store==="aos"){const i=memoryStore.aos.findIndex(a=>a.rfc===data.rfc);if(i>=0)memoryStore.aos[i]=data;else memoryStore.aos.push(data);}
  else memoryStore.imports.push(data);
  if(!useSupabase) return;
  try {
    const table = store==="aos"?"appels_offres":"imports";
    const body = store==="aos" ? {rfc:data.rfc, data:data} : {data:data};
    await fetch(SUPABASE_URL+"/rest/v1/"+table, {
      method:"POST", headers:sbHeaders({"Prefer":"resolution=merge-duplicates,return=minimal"}), body:JSON.stringify(body)
    });
  } catch(e) { console.error("Supabase PUT error:", e); }
}

async function dbPutMany(store, items) {
  if(store==="aos") items.forEach(item=>{const i=memoryStore.aos.findIndex(a=>a.rfc===item.rfc);if(i>=0)memoryStore.aos[i]=item;else memoryStore.aos.push(item);});
  else memoryStore.imports.push(...items);
  if(!useSupabase) return;
  try {
    const table = store==="aos"?"appels_offres":"imports";
    const body = store==="aos"
      ? items.map(item=>({rfc:item.rfc, data:item}))
      : items.map(item=>({data:item}));
    await fetch(SUPABASE_URL+"/rest/v1/"+table, {
      method:"POST", headers:sbHeaders({"Prefer":"resolution=merge-duplicates,return=minimal"}), body:JSON.stringify(body)
    });
  } catch(e) { console.error("Supabase PUTMANY error:", e); }
}

async function dbDelete(rfc) {
  // Memory
  memoryStore.aos = memoryStore.aos.filter(a => a.rfc !== rfc);
  if(!useSupabase) return;
  // Supabase
  try {
    await fetch(SUPABASE_URL+"/rest/v1/appels_offres?rfc=eq."+encodeURIComponent(rfc), {
      method:"DELETE", headers:sbHeaders()
    });
  } catch(e) { console.error("Supabase DELETE error:", e); }
}

// ===================== PARSER =====================
function parseAOs(raw) {
  const lines = raw.split("\n").map(l => l.trim()).filter(Boolean);
  const noise = ["Prestation","Dates de mission","Nombre d'UO","TJM","Code","Demande d'achats","Organisation","Département","Date limite de réponses","Statut"];
  const aos = []; let i = 0;
  while (i < lines.length) {
    if (lines[i]==="btnMasterDetail" && i+1<lines.length && /^RFC\d+/.test(lines[i+1])) {
      const rfc=lines[i+1], intitule=lines[i+2]||"";
      let tm="",org="",dept="",statutPwise="",j=i+3;
      while(j<lines.length&&lines[j]!=="btnMasterDetail"){
        if(/^TM\d+/.test(lines[j]))tm=lines[j];
        else if(/^L6T?_/.test(lines[j]))org=lines[j].replace(/^L6T?_/,"");
        else if(lines[j].startsWith("L4_"))dept=lines[j].replace("L4_","");
        else if(!noise.includes(lines[j])&&!lines[j].includes("Enregistrement")&&!lines[j].includes("Modifier le paramétrage"))statutPwise=lines[j];
        j++;
      }
      let profil="",modalite="",dateDebut="",dateFin="",nbJours=0;
      // Bloc détail = second btnMasterDetail NOT suivi d'un RFC (sinon c'est le prochain AO)
      if(j<lines.length && lines[j]==="btnMasterDetail" && (j+1>=lines.length || !/^RFC\d+/.test(lines[j+1]))) {
        j++;if(j<lines.length){profil=lines[j];j++;}
        while(j<lines.length&&lines[j]!=="btnMasterDetail"){
          if(["Sur Site","Télétravail","Hybride"].includes(lines[j]))modalite=lines[j];
          const dm=lines[j].match(/^(\d{2}\/\d{2}\/\d{4})\s*-\s*(\d{2}\/\d{2}\/\d{4})$/);
          if(dm){dateDebut=dm[1];dateFin=dm[2];}
          const nm=lines[j].match(/^(\d+)[,.](\d+)$/);
          if(nm)nbJours=parseInt(nm[1]);
          j++;
        }
      }
      // Si pas de profil (format liste seul), utiliser l'intitulé comme fallback
      if(!profil && intitule) profil = intitule;
      if(rfc)aos.push({rfc,tm,intitule,org,dept,statutPwise,profil,modalite,dateDebut,dateFin,nbJours});
      i=j;
    } else i++;
  }
  return aos;
}

// ===================== HELPERS =====================
function categorize(p) {
  const l=(p||"").toLowerCase();
  if(/développeur|software|cobol|intégrateur/.test(l)) return "Dev";
  if(/business analyst|chargé de mission|consultant fonctionnel|analyse de test/.test(l)) return "BA";
  if(/chef de projet|project manager/.test(l)) return "CdP";
  if(/expert technique|tech lead/.test(l)) return "Expert";
  return "Autre";
}
const CAT_COLORS={Dev:"#3b82f6",BA:"#8b5cf6",CdP:"#f59e0b",Expert:"#ef4444",Autre:"#6b7280"};

function parseDate(d){if(!d)return null;const p=d.split("/");if(p.length===3)return new Date(p[2],p[1]-1,p[0]);return new Date(d);}
function toISO(d){if(!d)return"";const dt=parseDate(d);if(!dt||isNaN(dt))return"";return dt.toISOString().slice(0,10);}
function fromISO(s){if(!s)return"";const[y,m,d]=s.split("-");return`${d}/${m}/${y}`;}
function urgency(d){const dt=parseDate(d);if(!dt)return 0;const diff=(dt-new Date())/86400000;if(diff<0)return 3;if(diff<=7)return 2;if(diff<=21)return 1;return 0;}
function shortOrg(o){return(o||"").replace(/BCEF (IT|RETAIL) - /g,"").replace(/\d+\s*/g,"").trim().substring(0,28);}
function domainGroup(o){const s=(o||"").replace(/^BCEF (IT|RETAIL) - /,"").trim();const m=s.match(/^([A-Z0-9]{2,})/);return m?m[1]:s.split(" ")[0]||"Autre";}

function statutSuivi(ao) {
  if(ao.dateDemarrage) return "demarrage";
  if(ao.dateQualif) return "qualif";
  if(ao.dateReponse) return "repondu";
  if(ao.bm || ao.datePrise) return "encours";
  return "ouvert";
}
function statutComplet(ao) {
  if(ao.statut==="clos") {
    const s=statutSuivi(ao);
    return s==="ouvert" ? "clos_nontraite" : "clos_traite";
  }
  return statutSuivi(ao);
}
function hasTraitement(ao) { return !!(ao.bm||ao.datePrise||ao.dateReponse||ao.dateQualif||ao.dateDemarrage); }
function statutLabel(s) {
  return {ouvert:"Ouvert",encours:"En cours",repondu:"Répondu",qualif:"Qualifié",demarrage:"Démarré",clos:"Clos",clos_nontraite:"Clos sans traitement",clos_traite:"Clos traité"}[s]||s;
}
function statutPill(s, ao) {
  if(s==="clos_traite" && ao) {
    const inner=statutSuivi(ao);
    const innerLabel={encours:"En cours",repondu:"Répondu",qualif:"Qualifié",demarrage:"Démarré"}[inner]||inner;
    return '<span class="status-pill pill-clos-traite">Clos · '+innerLabel+'</span>';
  }
  const cls={ouvert:"pill-ouvert",encours:"pill-encours",repondu:"pill-repondu",qualif:"pill-qualif",demarrage:"pill-demarrage",clos:"pill-clos",clos_nontraite:"pill-clos",clos_traite:"pill-clos-traite"}[s]||"pill-ouvert";
  return '<span class="status-pill '+cls+'">'+statutLabel(s)+'</span>';
}

function today(){return new Date().toISOString().slice(0,10);}

function periodKey(dateStr, mode) {
  const d = dateStr ? (dateStr.includes("/") ? parseDate(dateStr) : new Date(dateStr)) : null;
  if(!d || isNaN(d)) return null;
  const y=d.getFullYear(), m=d.getMonth(), day=d.getDate();
  if(mode==="week") {
    const jan1=new Date(y,0,1); const days=Math.floor((d-jan1)/86400000);
    const w=Math.ceil((days+jan1.getDay()+1)/7);
    return y+"-S"+String(w).padStart(2,"0");
  }
  if(mode==="month") return y+"-"+String(m+1).padStart(2,"0");
  if(mode==="quarter") return y+"-T"+Math.ceil((m+1)/3);
  if(mode==="semester") return y+"-S"+(m<6?"1":"2");
  if(mode==="year") return ""+y;
  return y+"-"+String(m+1).padStart(2,"0");
}

function periodLabel(key, mode) {
  if(!key) return "—";
  if(mode==="week") { const [y,w]=key.split("-S"); return "Sem. "+parseInt(w)+" "+y; }
  if(mode==="month") { const [y,m]=key.split("-"); const mois=["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"]; return mois[parseInt(m)-1]+" "+y; }
  if(mode==="quarter") return key.replace("-T"," T");
  if(mode==="semester") return key.replace("-S"," Sem. ");
  return key;
}

function periodFilter(dateStr, period) {
  if(!period||period==="all") return true;
  const d = parseDate(dateStr);
  if(!d) return true;
  const now = new Date();
  if(period==="week") { const w=new Date(now); w.setDate(w.getDate()-7); return d>=w; }
  if(period==="month") { const m=new Date(now); m.setMonth(m.getMonth()-1); return d>=m; }
  if(period==="quarter") { const q=new Date(now); q.setMonth(q.getMonth()-3); return d>=q; }
  if(period==="year") { const y=new Date(now); y.setFullYear(y.getFullYear()-1); return d>=y; }
  return true;
}

// ===================== STATE =====================
let allAOs = [];
let histAOs = [];
let currentView = "dashboard";
let filters = { search:"", dept:"Tous", cat:"Tous", statut:"Tous", period:"all", bm:"Tous" };
let sort = { col:"dateDebut", dir:1 };
let selectedRFC = null;

// Chargement avec exclusion des domaines non gérés + AO historiques séparés
async function loadAOs() {
  const all = await dbGetAll("aos");
  allAOs = all
    .filter(a => !EXCLUDED_DOMAINS.includes(domainGroup(a.org)))
    .filter(a => !a.isHistorique);
}

async function loadHistoricalAOs() {
  const all = await dbGetAll("aos");
  histAOs = all.filter(a => a.isHistorique); // tous périmètres inclus
}

function getOpenAOs() { return allAOs.filter(a => a.statut !== "clos"); }

// Date de début du dashboard (encours actif depuis début avril)
let dashDateFrom = "2026-04-01";

function normDate(d) {
  if(!d) return "";
  // Convertir DD/MM/YYYY → YYYY-MM-DD pour comparaison
  const m = d.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(m) return `${m[3]}-${m[2]}-${m[1]}`;
  return d; // déjà YYYY-MM-DD
}
function getDashAOs() {
  return allAOs.filter(a => {
    const raw = a.dateOuverture || a.dateCreation || "";
    if(!raw) return false;
    return normDate(raw) >= dashDateFrom;
  });
}
function getDashOpenAOs() { return getDashAOs().filter(a => a.statut !== "clos"); }
function getFilteredAOs() {
  let f = allAOs;
  if(filters.statut==="clos_nontraite") f=f.filter(a=>a.statut==="clos"&&!hasTraitement(a));
  else if(filters.statut==="clos_traite") f=f.filter(a=>a.statut==="clos"&&hasTraitement(a));
  else if(filters.statut==="clos") f=f.filter(a=>a.statut==="clos");
  else if(filters.statut==="tous_clos") { /* all, no filter */ }
  else if(filters.statut!=="Tous") f=f.filter(a=>a.statut!=="clos"&&statutSuivi(a)===filters.statut);
  else { /* Tous = show all including clos */ }
  if(filters.search){const s=filters.search.toLowerCase();f=f.filter(a=>[a.rfc,a.intitule,a.profil,a.org,a.dept,a.bm||"",a.consultant||""].some(v=>(v||"").toLowerCase().includes(s)));}
  if(filters.dept!=="Tous") f=f.filter(a=>a.dept===filters.dept);
  if(filters.cat!=="Tous") f=f.filter(a=>categorize(a.profil)===filters.cat);
  if(filters.bm!=="Tous") f=f.filter(a=>(a.bm||"")===(filters.bm==="—"?"":filters.bm));
  if(filters.period!=="all") f=f.filter(a=>periodFilter(a.dateDebut,filters.period));
  f=[...f].sort((a,b)=>{
    if(sort.col==="dateDebut") return sort.dir*((parseDate(a.dateDebut)||0)-(parseDate(b.dateDebut)||0));
    if(sort.col==="nbJours") return sort.dir*(a.nbJours-b.nbJours);
    if(sort.col==="rfc") return sort.dir*a.rfc.localeCompare(b.rfc);
    return 0;
  });
  return f;
}

// ===================== NAVIGATION =====================
function navigate(view) {
  currentView = view;
  selectedRFC = null;
  if(view==="dashboard") dashF={dept:null,domain:null,bm:null,cat:null,suivi:null,periodView:dashF.periodView||"month"};
  document.querySelectorAll(".nav-item").forEach(n => n.classList.toggle("active", n.dataset.view===view));
  renderView();
}

async function renderView() {
  try {
    await loadAOs();
    document.getElementById("nav-count").textContent = getOpenAOs().length;
    const main = document.getElementById("main-content");
    if(currentView==="dashboard") renderDashboard(main);
    else if(currentView==="liste") renderListe(main);
    else if(currentView==="historique") renderHistorique(main);
    else if(currentView==="import") renderImport(main);
    else if(currentView==="export") renderExport(main);
  } catch(e) {
    document.getElementById("main-content").innerHTML='<div style="padding:40px;color:red;font-size:14px"><h2>Erreur rendu ('+currentView+')</h2><pre>'+e.message+'\n'+e.stack+'</pre></div>';
  }
}

let dashF = { dept:null, domain:null, bm:null, cat:null, suivi:null, periodView:"month" };

function dashFilteredAOs() {
  let f = (dashF.suivi==="tous_clos"||dashF.suivi==="clos_nt"||dashF.suivi==="clos_t") ? [...getDashAOs()] : getDashOpenAOs();
  if(dashF.dept) f=f.filter(a=>a.dept===dashF.dept);
  if(dashF.domain) f=f.filter(a=>domainGroup(a.org)===dashF.domain);
  if(dashF.bm) f=f.filter(a=>(a.bm||"Non assigné")===dashF.bm);
  if(dashF.cat) f=f.filter(a=>categorize(a.profil)===dashF.cat);
  if(dashF.suivi) {
    if(dashF.suivi==="tous_clos") { /* include all */ }
    else if(dashF.suivi==="clos_nt") f=f.filter(a=>a.statut==="clos"&&!hasTraitement(a));
    else if(dashF.suivi==="clos_t") f=f.filter(a=>a.statut==="clos"&&hasTraitement(a));
    else if(dashF.suivi==="ouvert") f=f.filter(a=>!a.bm);
    else if(dashF.suivi==="encours") f=f.filter(a=>a.bm&&!a.dateReponse);
    else if(dashF.suivi==="repondu") f=f.filter(a=>a.dateReponse&&!a.dateQualif);
    else if(dashF.suivi==="qualif") f=f.filter(a=>a.dateQualif&&!a.dateDemarrage);
    else if(dashF.suivi==="demarrage") f=f.filter(a=>a.dateDemarrage);
  }
  return f;
}

function dashHasFilters(){ return dashF.dept||dashF.domain||dashF.bm||dashF.cat||dashF.suivi; }

  const totalRecu=fClosNT+fClosT+total;

  const fSteps=[

  const fMax=Math.max(totalRecu,1);

    if(dashF.dept && a.dept!==dashF.dept) return false;
    if(dashF.domain && domainGroup(a.org)!==dashF.domain) return false;
    if(dashF.cat && categorize(a.profil)!==dashF.cat) return false;

  mgrSource.forEach(a=>{
    const bm=a.bm;

    mgrData[bm].total++;
    if(a.statut==="clos" && hasTraitement(a)) { mgrData[bm].closTraite++; }
    else if(a.statut!=="clos") {
      if(a.dateDemarrage)       mgrData[bm].demarrage++;
      else if(a.dateQualif)     mgrData[bm].qualif++;
      else if(a.dateReponse)    mgrData[bm].repondu++;

  const mgrEntries=Object.entries(mgrData).sort((a,b)=>b[1].aTraiter-a[1].aTraiter||b[1].total-a[1].total);
  let mgrHtml='';

    mgrHtml+='<th style="text-align:center;padding:4px 4px" title="Total AO">Total</th>';
    mgrHtml+='</tr></thead><tbody>';
    mgrEntries.forEach(([bm,s])=>{

  } else {

      deptChartHtml+='<div class="bar-track"><div class="bar-fill" style="width:'+Math.round(n/maxDept*100)+'%;background:var(--green)">'+n+'</div></div></div>';

    if(!periodByBM[pk]) periodByBM[pk]={};
    periodBuckets[pk].recu++;
    const bm=a.bm||"Non assigné";
    if(!periodByBM[pk][bm]) periodByBM[pk][bm]={recu:0,repondu:0,qualif:0,demarrage:0,clos:0};
    periodByBM[pk][bm].recu++;
    if(a.dateReponse) { const rk=periodKey(a.dateReponse,pMode); if(!periodBuckets[rk]) periodBuckets[rk]={recu:0,repondu:0,qualif:0,demarrage:0,clos:0}; periodBuckets[rk].repondu++; if(!periodByBM[rk]) periodByBM[rk]={}; if(!periodByBM[rk][bm]) periodByBM[rk][bm]={recu:0,repondu:0,qualif:0,demarrage:0,clos:0}; periodByBM[rk][bm].repondu++; }
    if(a.dateQualif) { const qk=periodKey(a.dateQualif,pMode); if(!periodBuckets[qk]) periodBuckets[qk]={recu:0,repondu:0,qualif:0,demarrage:0,clos:0}; periodBuckets[qk].qualif++; if(!periodByBM[qk]) periodByBM[qk]={}; if(!periodByBM[qk][bm]) periodByBM[qk][bm]={recu:0,repondu:0,qualif:0,demarrage:0,clos:0}; periodByBM[qk][bm].qualif++; }
    if(a.dateDemarrage) { const dk=periodKey(a.dateDemarrage,pMode); if(!periodBuckets[dk]) periodBuckets[dk]={recu:0,repondu:0,qualif:0,demarrage:0,clos:0}; periodBuckets[dk].demarrage++; if(!periodByBM[dk]) periodByBM[dk]={}; if(!periodByBM[dk][bm]) periodByBM[dk][bm]={recu:0,repondu:0,qualif:0,demarrage:0,clos:0}; periodByBM[dk][bm].demarrage++; }
    if(a.statut==="clos"&&a.dateCloture) { const ck=periodKey(a.dateCloture,pMode); if(!periodBuckets[ck]) periodBuckets[ck]={recu:0,repondu:0,qualif:0,demarrage:0,clos:0}; periodBuckets[ck].clos++; if(!periodByBM[ck]) periodByBM[ck]={}; if(!periodByBM[ck][bm]) periodByBM[ck][bm]={recu:0,repondu:0,qualif:0,demarrage:0,clos:0}; periodByBM[ck][bm].clos++; }
  });
  window._periodByBM=periodByBM;
  window._periodMode=pMode;
  const periodEntries=Object.entries(periodBuckets).sort((a,b)=>b[0].localeCompare(a[0]));
  const periodModes=[{k:"week",l:"Semaine"},{k:"month",l:"Mois"},{k:"quarter",l:"Trimestre"},{k:"semester",l:"Semestre"},{k:"year",l:"Année"}];

    periodEntries.forEach(([pk,b])=>{

      periodHtml+='</tr>';
      periodHtml+='<tr class="period-detail" data-pk="'+pk+'" style="display:none"><td colspan="7" style="padding:0"></td></tr>';
    });
    const totals=periodEntries.reduce((t,[,b])=>({recu:t.recu+b.recu,repondu:t.repondu+b.repondu,qualif:t.qualif+b.qualif,demarrage:t.demarrage+b.demarrage,clos:t.clos+b.clos}),{recu:0,repondu:0,qualif:0,demarrage:0,clos:0});

    periodHtml+='<td style="text-align:center">'+totals.repondu+'</td>';
    periodHtml+='<td style="text-align:center">'+totals.qualif+'</td>';

    periodHtml+='<td style="text-align:center;color:var(--gray)">'+totals.clos+'</td>';
    periodHtml+='<td style="text-align:center;color:'+(tauxTotal>=15?"var(--green)":"var(--amber)")+'">'+tauxTotal+'%</td>';
    periodHtml+='</tr></tbody></table></div>';
  } else {
    periodHtml+='<div style="color:var(--gray);font-size:13px;text-align:center;padding:16px">Aucune donnée pour cette période</div>';
  }

  el.innerHTML = '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">'
    +'<h1 style="font-size:24px;font-weight:800">Dashboard</h1>'

    +(dashHasFilters()?'<button class="btn" id="dash-clear" style="font-size:11px;padding:4px 12px">✕ Filtres</button>':"")

    +'</div>'
    +'<div class="dash-grid">'
    +'<div class="card"><div class="card-title">🔄 Répartition des AO <span style="font-size:11px;color:var(--text-light);font-weight:400">— cliquez pour filtrer</span></div>'+funnelHtml+'</div>'

    +'</div>'
    +'<div class="dash-grid">'

    +'</div>'

  document.querySelectorAll(".dash-click").forEach(el=>{

      subHtml+='<div style="font-size:11px;font-weight:600;color:var(--gray);margin-bottom:6px">👤 Détail par manager — '+periodLabel(pk,window._periodMode)+'</div>';

// ===================== LISTE AO =====================
function renderListe(el) {
  const open = getOpenAOs();
  const depts = ["Tous",...new Set(allAOs.map(a=>a.dept))];
  const cats = ["Tous",...new Set(allAOs.map(a=>categorize(a.profil)))];
  const bms = ["Tous",...new Set(allAOs.map(a=>a.bm||"—").filter(Boolean))];

  const filtered = getFilteredAOs();

  let tableRows = filtered.map(a=>{
    const cat=categorize(a.profil), u=urgency(a.dateDebut), sc=statutComplet(a);
    const isClos=a.statut==="clos";
    const sel=selectedRFC===a.rfc;
    return `<tr class="row${u&&!isClos?" urg"+u:""}${isClos?" clos":""}${sel?" selected":""}" data-rfc="${a.rfc}">
      <td class="rfc-code">${a.rfc.replace("RFC0000","").replace("RFC000","")}</td>
      <td><span class="badge" style="background:${CAT_COLORS[cat]}">${cat}</span></td>
      <td class="profil-cell" title="${a.profil}">${a.profil}</td>
      <td class="org-cell" title="${a.org}">${shortOrg(a.org)}</td>
      <td>${a.dateDebut}</td>
      <td class="r">${a.nbJours}</td>
      <td class="${a.bm?"tri-cell":"empty-cell"}">${a.bm||"—"}</td>
      <td class="${a.consultant?"tri-cell":"empty-cell"}">${a.consultant||"—"}</td>
      <td class="r" style="font-size:11.5px">${a.tjm?a.tjm+"€":"—"}</td>
      <td>${statutPill(sc,a)}${a.notes?` <span title="${a.notes.substring(0,100).replace(/"/g,"'")}" style="cursor:help">📝</span>`:""}</td>
    </tr>`;
  }).join("");

  el.innerHTML = `
    <h1 style="font-size:24px;font-weight:800;margin-bottom:20px">Appels d'offres <span style="font-weight:400;font-size:16px;color:var(--gray)">${filtered.length} résultat${filtered.length>1?"s":""}</span></h1>
    <div class="filter-bar">
      <input type="text" id="f_search" placeholder="🔍 Rechercher..." value="${filters.search}">
      <select id="f_dept">${depts.map(d=>`<option value="${d}"${filters.dept===d?" selected":""}>${d==="Tous"?"Département":d}</option>`).join("")}</select>
      <select id="f_cat">${cats.map(c=>`<option value="${c}"${filters.cat===c?" selected":""}>${c==="Tous"?"Catégorie":c}</option>`).join("")}</select>
      <select id="f_statut">
        <option value="Tous"${filters.statut==="Tous"?" selected":""}>Tous les AO</option>
        <option value="ouvert"${filters.statut==="ouvert"?" selected":""}>⚪ Non traité</option>
        <option value="encours"${filters.statut==="encours"?" selected":""}>🟡 En cours</option>
        <option value="qualif"${filters.statut==="qualif"?" selected":""}>🟣 Qualifié</option>
        <option value="demarrage"${filters.statut==="demarrage"?" selected":""}>🟢 Démarré</option>
        <option value="clos"${filters.statut==="clos"?" selected":""}>⚫ Tous clos</option>
        <option value="clos_nontraite"${filters.statut==="clos_nontraite"?" selected":""}>⚫ Clos sans traitement</option>
        <option value="clos_traite"${filters.statut==="clos_traite"?" selected":""}>🔵 Clos traités</option>
      </select>
      <select id="f_bm">${bms.map(b=>`<option value="${b}"${filters.bm===b?" selected":""}>${b==="Tous"?"Manager":b}</option>`).join("")}</select>
      <select id="f_period">
        <option value="all"${filters.period==="all"?" selected":""}>Toute période</option>
        <option value="week"${filters.period==="week"?" selected":""}>7 derniers jours</option>
        <option value="month"${filters.period==="month"?" selected":""}>30 derniers jours</option>
        <option value="quarter"${filters.period==="quarter"?" selected":""}>Trimestre</option>
        <option value="year"${filters.period==="year"?" selected":""}>Année</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th class="sortable" data-col="rfc">RFC</th>
          <th>Cat.</th><th>Profil</th><th>Domaine</th>
          <th class="sortable" data-col="dateDebut">Début</th>
          <th class="sortable r" data-col="nbJours">Jours</th>
          <th>BM</th><th>Consultant</th><th class="r">TJM</th><th>Suivi</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div id="detail-area"></div>
  `;

  document.getElementById("f_search").addEventListener("input",e=>{filters.search=e.target.value;renderListe(el);});
  document.getElementById("f_dept").addEventListener("change",e=>{filters.dept=e.target.value;renderListe(el);});
  document.getElementById("f_cat").addEventListener("change",e=>{filters.cat=e.target.value;renderListe(el);});
  document.getElementById("f_statut").addEventListener("change",e=>{filters.statut=e.target.value;renderListe(el);});
  document.getElementById("f_bm").addEventListener("change",e=>{filters.bm=e.target.value;renderListe(el);});
  document.getElementById("f_period").addEventListener("change",e=>{filters.period=e.target.value;renderListe(el);});
  document.querySelectorAll("th.sortable").forEach(th=>{
    th.addEventListener("click",()=>{const c=th.dataset.col;if(sort.col===c)sort.dir=-sort.dir;else{sort.col=c;sort.dir=1;}renderListe(el);});
  });
  document.querySelectorAll("tr.row").forEach(tr=>{
    tr.addEventListener("click",()=>{
      const rfc=tr.dataset.rfc;
      selectedRFC=selectedRFC===rfc?null:rfc;
      renderListe(el);
      if(selectedRFC) document.getElementById("detail-area").scrollIntoView({behavior:"smooth",block:"nearest"});
    });
  });

  if(selectedRFC) renderDetail(document.getElementById("detail-area"), selectedRFC);
}

          <div class="field"><label>Consultant poussé</label><input class="tri" id="d_consultant" maxlength="4" placeholder="FIB" value="${ao.consultant||""}"></div>
          <div class="field"><label>TJM proposé (€)</label><input type="number" id="d_tjm" placeholder="450" value="${ao.tjm||""}"></div>
          <div class="field"><label>Qualif obtenue</label>
            <select id="d_qualif"><option value=""${!ao.dateQualif?" selected":""}>Non</option><option value="oui"${ao.dateQualif?" selected":""}>Oui</option></select>
          </div>
          <div class="field" id="qualif-date-field" style="${ao.dateQualif?"":"display:none"}"><label>Date qualif</label><input type="date" id="d_dateQualif" value="${ao.dateQualif||""}"></div>
          <div class="field"><label>Démarrage</label>
            <select id="d_demarrage"><option value=""${!ao.dateDemarrage?" selected":""}>Non</option><option value="oui"${ao.dateDemarrage?" selected":""}>Oui</option></select>
          </div>
          <div class="field" id="dem-date-field" style="${ao.dateDemarrage?"":"display:none"}"><label>Date démarrage</label><input type="date" id="d_dateDemarrage" value="${ao.dateDemarrage||""}"></div>
        </div>
        <div style="margin-top:12px">
          <div class="field"><label>📝 Notes / Commentaires</label><textarea id="d_notes" style="width:100%;height:70px;border:1px solid #d1d5db;border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical;outline:none" placeholder="Ex: en attente retour client, profil envoyé le...">${ao.notes||""}</textarea></div>
        </div>
        <div class="form-actions">
          <button class="btn btn-green" id="save-detail">💾 Enregistrer</button>
          <button class="btn btn-red" id="clear-detail">🗑️ Effacer le suivi</button>
          <button class="btn" id="delete-ao" style="margin-left:auto;color:#7f1d1d;border-color:#fecaca;background:#fff5f5" title="Supprime définitivement cet AO de la base">🗑️ Supprimer l'AO</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById("close-detail").addEventListener("click",()=>{selectedRFC=null;renderView();});
  document.getElementById("d_qualif").addEventListener("change",e=>{
    document.getElementById("qualif-date-field").style.display=e.target.value?"":"none";
    if(e.target.value&&!document.getElementById("d_dateQualif").value) document.getElementById("d_dateQualif").value=today();
  });
  document.getElementById("d_demarrage").addEventListener("change",e=>{
    document.getElementById("dem-date-field").style.display=e.target.value?"":"none";
    if(e.target.value&&!document.getElementById("d_dateDemarrage").value) document.getElementById("d_dateDemarrage").value=today();
  });
  document.getElementById("save-detail").addEventListener("click",async()=>{
    ao.bm = document.getElementById("d_bm").value.toUpperCase().trim();
    ao.datePrise = document.getElementById("d_datePrise").value;
    ao.dateReponse = document.getElementById("d_dateReponse").value;
    ao.consultant = document.getElementById("d_consultant").value.toUpperCase().trim();
    ao.tjm = document.getElementById("d_tjm").value;
    ao.dateQualif = document.getElementById("d_qualif").value ? document.getElementById("d_dateQualif").value : "";
    ao.dateDemarrage = document.getElementById("d_demarrage").value ? document.getElementById("d_dateDemarrage").value : "";
    ao.notes = document.getElementById("d_notes").value.trim();
    ao.dateOuverture = document.getElementById("d_dateOuverture").value;
    ao.dateCloture = document.getElementById("d_dateCloture").value;
    ao.statut = ao.dateCloture ? "clos" : "ouvert";
    if(ao.bm && !ao.datePrise) ao.datePrise = today();
    await dbPut("aos", ao);
    renderView();
  });
  document.getElementById("clear-detail").addEventListener("click",async()=>{
    if(!confirm("Effacer le suivi de "+ao.rfc+" ?")) return;
    ao.bm="";ao.datePrise="";ao.dateReponse="";ao.consultant="";ao.tjm="";ao.dateQualif="";ao.dateDemarrage="";ao.notes="";ao.dateCloture="";ao.statut="ouvert";
    await dbPut("aos", ao);
    renderView();
  });
  document.getElementById("delete-ao").addEventListener("click",async()=>{
    if(!confirm("⚠️ Supprimer définitivement "+ao.rfc+" ?\n\nCet AO sera effacé de la base et n'apparaîtra plus, même après import PWise.\n\nCette action est irréversible.")) return;
    await dbDelete(ao.rfc);
    selectedRFC = null;
    allAOs = allAOs.filter(a => a.rfc !== ao.rfc);
    renderView();
  });
}

// ===================== HISTORIQUE =====================
let histF = { dept: "Tous", cat: "Tous", statut: "Tous" };

function suiviFromPwise(sp) {
  if (!sp) return "encours";
  if (/non retenu/i.test(sp)) return "clos";
  if (/retenu/i.test(sp)) return "demarrage";
  if (/soumis/i.test(sp)) return "repondu";
  return "encours";
}

async function renderHistorique(el) {
  await loadHistoricalAOs();
  if (!histAOs.length) {
    el.innerHTML = `
      <h1 style="font-size:24px;font-weight:800;margin-bottom:16px">📈 Historique</h1>
      <div class="card" style="text-align:center;padding:40px">
        <div style="font-size:48px;margin-bottom:16px">📭</div>
        <h3 style="margin-bottom:8px">Aucune donnée historique</h3>
        <p style="color:var(--gray);font-size:13px;margin-bottom:20px">Importez l'extraction PWise via la section "Import Historique" dans Import PWise.</p>
        <button class="btn btn-green" onclick="navigate('import')">📥 Aller à l'import</button>
      </div>`;
    return;
  }

  const depts = ["Tous", ...new Set(histAOs.map(a => a.dept).filter(Boolean))].sort();
  const cats  = ["Tous", ...new Set(histAOs.map(a => categorize(a.profil)))];

  // Filtrage
  let f = [...histAOs];
  if (histF.dept !== "Tous") f = f.filter(a => a.dept === histF.dept);
  if (histF.cat  !== "Tous") f = f.filter(a => categorize(a.profil) === histF.cat);
  if (histF.statut !== "Tous") {
    if (histF.statut === "demarrage") f = f.filter(a => suiviFromPwise(a.statutPwise) === "demarrage");
    else if (histF.statut === "clos") f = f.filter(a => suiviFromPwise(a.statutPwise) === "clos");
    else if (histF.statut === "repondu") f = f.filter(a => suiviFromPwise(a.statutPwise) === "repondu");
    else if (histF.statut === "encours") f = f.filter(a => suiviFromPwise(a.statutPwise) === "encours");
  }

  const total     = f.length;
  const soumis    = f.filter(a => ["repondu","demarrage"].includes(suiviFromPwise(a.statutPwise))).length;
  const retenus   = f.filter(a => suiviFromPwise(a.statutPwise) === "demarrage").length;
  const nonRetenus= f.filter(a => suiviFromPwise(a.statutPwise) === "clos").length;
  const encours   = f.filter(a => suiviFromPwise(a.statutPwise) === "encours").length;
  const reponduSeulement = f.filter(a => suiviFromPwise(a.statutPwise) === "repondu").length;
  const tauxGlobal= total ? Math.round(retenus / total * 100) : 0;
  const tauxSoumis= soumis ? Math.round(retenus / soumis * 100) : 0;

  // TJM moyen
  const tjms = f.filter(a => a.nbJours > 0).map(a => a.nbJours);
  const avgJours = tjms.length ? Math.round(tjms.reduce((a,b)=>a+b,0)/tjms.length) : 0;

  // Funnel global
  const funnelSteps = [
    {label:"Total reçus", n:total, color:"#475569"},
    {label:"En cours", n:encours, color:"#3b82f6", indent:true},
    {label:"Répondus", n:reponduSeulement, color:"#f59e0b", indent:true},
    {label:"Non retenus", n:nonRetenus, color:"#94a3b8", indent:true},
    {label:"Retenus ✓", n:retenus, color:"#00915a", indent:true},
  ];
  const fMax = Math.max(total,1);
  let funnelHtml = '<div style="display:flex;flex-direction:column;gap:4px">';
  funnelSteps.forEach(s => {
    const pct = Math.max(Math.round(s.n/fMax*100), s.n>0?4:0);
    funnelHtml += `<div class="bar-row"><div style="width:100px;text-align:right;font-size:11px;color:var(--gray);${s.indent?"padding-left:8px":""}">${s.label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${s.color};min-width:${s.n>0?"28px":"0"}">${s.n>0?`<span style="font-size:11px;font-weight:700;color:#fff">${s.n}</span>`:""}</div></div>
    <div style="width:30px;text-align:right;font-size:11px;font-weight:600;color:var(--gray)">${s.n}</div></div>`;
  });
  funnelHtml += `<div style="margin-top:8px;font-size:11px;color:var(--gray);text-align:center">Taux conversion global : <strong style="color:${tauxGlobal>=15?"var(--green)":"var(--amber)"}">${tauxGlobal}%</strong> · Taux soumis→retenu : <strong style="color:${tauxSoumis>=30?"var(--green)":"var(--amber)"}">${tauxSoumis}%</strong></div>`;
  funnelHtml += '</div>';

  // Par entité
  const byDept = {};
  f.forEach(a => {
    const d = a.dept || "—";
    if (!byDept[d]) byDept[d] = { total: 0, retenu: 0, clos: 0, encours: 0, repondu: 0 };
    byDept[d].total++;
    const s = suiviFromPwise(a.statutPwise);
    if (s === "demarrage") byDept[d].retenu++;
    else if (s === "clos") byDept[d].clos++;
    else if (s === "encours") byDept[d].encours++;
    else if (s === "repondu") byDept[d].repondu++;
  });
  const deptEntries = Object.entries(byDept).sort((a,b) => b[1].total - a[1].total);
  const maxDept = deptEntries.length ? deptEntries[0][1].total : 1;

  // Par domaine (top 15)
  const byDomain = {};
  f.forEach(a => {
    const d = domainGroup(a.org) || "—";
    if (!byDomain[d]) byDomain[d] = { total: 0, retenu: 0, clos: 0 };
    byDomain[d].total++;
    const s = suiviFromPwise(a.statutPwise);
    if (s === "demarrage") byDomain[d].retenu++;
    if (s === "clos") byDomain[d].clos++;
  });
  const domainEntries = Object.entries(byDomain).sort((a,b) => b[1].total - a[1].total).slice(0, 15);
  const maxDom = domainEntries.length ? domainEntries[0][1].total : 1;

  // Par type profil
  const byCat = {};
  f.forEach(a => {
    const c = categorize(a.profil);
    if (!byCat[c]) byCat[c] = { total: 0, retenu: 0, clos: 0 };
    byCat[c].total++;
    const s = suiviFromPwise(a.statutPwise);
    if (s === "demarrage") byCat[c].retenu++;
    if (s === "clos") byCat[c].clos++;
  });

  // Statuts PWise bruts
  const byStatut = {};
  f.forEach(a => { const s = a.statutPwise||"—"; byStatut[s] = (byStatut[s]||0) + 1; });

  let deptHtml = '';
  deptEntries.forEach(([d, s]) => {
    const taux = s.total ? Math.round(s.retenu / s.total * 100) : 0;
    const selD = histF.dept === d;
    const barW = Math.round(s.total/maxDept*100);
    deptHtml += `<div class="bar-row hist-dept-click" data-dept="${d}" style="cursor:pointer;${selD?"outline:2px solid var(--green);border-radius:6px;":""}">
      <div class="bar-label" title="${d}" style="width:180px">${d}</div>
      <div class="bar-track" style="position:relative">
        <div class="bar-fill" style="width:${barW}%;background:${selD?"var(--green)":"var(--blue)"}">
          <span style="font-size:10px">${s.total}</span>
        </div>
        ${s.retenu>0?`<div style="position:absolute;left:${barW}%;top:0;height:100%;width:${Math.round(s.retenu/maxDept*100)}%;background:rgba(0,145,90,0.3);border-radius:0 6px 6px 0"></div>`:""}
      </div>
      <div style="width:36px;text-align:right;font-size:11px;font-weight:700;color:${taux>=15?"var(--green)":"var(--amber)"}">${taux}%</div>
    </div>`;
  });

  let domHtml = '';
  domainEntries.forEach(([d, s]) => {
    const taux = s.total ? Math.round(s.retenu / s.total * 100) : 0;
    domHtml += `<div class="bar-row">
      <div class="bar-label" title="${d}">${d}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(s.total/maxDom*100)}%;background:var(--purple)">
        <span style="font-size:10px">${s.total}</span>
      </div></div>
      <div style="width:36px;text-align:right;font-size:11px;font-weight:700;color:${taux>=15?"var(--green)":"var(--amber)"}">${taux}%</div>
    </div>`;
  });

  let catHtml = '<table style="width:100%;font-size:12px;border-collapse:collapse"><thead><tr style="border-bottom:1px solid var(--border)">';
  catHtml += '<th style="text-align:left;padding:5px 8px">Type profil</th><th style="text-align:center">Reçus</th><th style="text-align:center">Retenus</th><th style="text-align:center">Non ret.</th><th style="text-align:center">Taux</th><th style="text-align:center">Moy. jours</th></tr></thead><tbody>';
  Object.entries(byCat).sort((a,b) => b[1].total - a[1].total).forEach(([c,s]) => {
    const taux = s.total ? Math.round(s.retenu / s.total * 100) : 0;
    const joursCat = f.filter(a => categorize(a.profil)===c && a.nbJours>0).map(a=>a.nbJours);
    const avgJ = joursCat.length ? Math.round(joursCat.reduce((a,b)=>a+b,0)/joursCat.length) : 0;
    catHtml += `<tr style="border-bottom:1px solid #f8fafc">
      <td style="padding:5px 8px"><span class="badge" style="background:${CAT_COLORS[c]}">${c}</span></td>
      <td style="text-align:center;font-weight:700">${s.total}</td>
      <td style="text-align:center;color:var(--green);font-weight:600">${s.retenu}</td>
      <td style="text-align:center;color:var(--gray)">${s.clos}</td>
      <td style="text-align:center;font-weight:700;color:${taux>=15?"var(--green)":"var(--amber)"}">${taux}%</td>
      <td style="text-align:center;color:var(--gray)">${avgJ||"—"}j</td>
    </tr>`;
  });
  catHtml += '</tbody></table>';

  let statutHtml = '';
  Object.entries(byStatut).sort((a,b) => b[1]-a[1]).forEach(([s,n]) => {
    const suivi = suiviFromPwise(s);
    const color = {demarrage:"var(--green)",repondu:"var(--amber)",clos:"var(--gray)",encours:"var(--blue)"}[suivi]||"var(--gray)";
    const pct = Math.round(n/total*100);
    statutHtml += `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f8fafc">
      <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>
      <div style="flex:1;font-size:12px">${s}</div>
      <div style="font-weight:700;font-size:13px;min-width:24px;text-align:right">${n}</div>
      <div style="font-size:10px;color:var(--text-light);min-width:30px">${pct}%</div>
    </div>`;
  });

  const selTag = histF.dept !== "Tous" ? `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:#e0f2fe;border-radius:16px;font-size:11px;font-weight:600;color:#0369a1;cursor:pointer" class="hist-dept-click" data-dept="">✕ ${histF.dept}</span>` : "";

  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <h1 style="font-size:24px;font-weight:800">📈 Historique Global</h1>
      <span style="font-size:13px;color:var(--gray)">${histAOs.length} AO · tous périmètres</span>
    </div>
    <div class="filter-bar" style="margin-bottom:16px">
      <select id="hf_dept">${depts.map(d=>`<option value="${d}"${histF.dept===d?" selected":""}>${d==="Tous"?"Tous départements":d}</option>`).join("")}</select>
      <select id="hf_cat">${cats.map(c=>`<option value="${c}"${histF.cat===c?" selected":""}>${c==="Tous"?"Tous profils":c}</option>`).join("")}</select>
      <select id="hf_statut">
        <option value="Tous"${histF.statut==="Tous"?" selected":""}>Tous statuts</option>
        <option value="demarrage"${histF.statut==="demarrage"?" selected":""}>🟢 Retenus</option>
        <option value="repondu"${histF.statut==="repondu"?" selected":""}>🟡 Soumis</option>
        <option value="clos"${histF.statut==="clos"?" selected":""}>⚫ Non retenus</option>
        <option value="encours"${histF.statut==="encours"?" selected":""}>🔵 En cours</option>
      </select>
      ${selTag}
    </div>

    <div class="kpi-grid" style="margin-bottom:20px">
      <div class="kpi"><div class="kpi-value" style="color:var(--blue)">${total}</div><div class="kpi-label">Total AO</div><div class="kpi-sub">tous périmètres</div></div>
      <div class="kpi"><div class="kpi-value" style="color:var(--blue)">${encours}</div><div class="kpi-label">En cours</div></div>
      <div class="kpi"><div class="kpi-value" style="color:var(--amber)">${reponduSeulement}</div><div class="kpi-label">Soumis</div></div>
      <div class="kpi"><div class="kpi-value" style="color:var(--green)">${retenus}</div><div class="kpi-label">Retenus ✓</div></div>
      <div class="kpi"><div class="kpi-value" style="color:var(--gray)">${nonRetenus}</div><div class="kpi-label">Non retenus</div></div>
      <div class="kpi"><div class="kpi-value" style="color:${tauxGlobal>=15?"var(--green)":"var(--amber)"}">${tauxGlobal}%</div><div class="kpi-label">Taux reçu→retenu</div></div>
      <div class="kpi"><div class="kpi-value" style="color:${tauxSoumis>=30?"var(--green)":"var(--amber)"}">${tauxSoumis}%</div><div class="kpi-label">Taux soumis→retenu</div></div>
      <div class="kpi"><div class="kpi-value" style="color:var(--gray)">${avgJours||"—"}</div><div class="kpi-label">Jours moy.</div><div class="kpi-sub">par mission</div></div>
    </div>

    <div class="dash-grid">
      <div class="card">
        <div class="card-title">🔄 Funnel global</div>
        ${funnelHtml}
      </div>
      <div class="card">
        <div class="card-title">🏷️ Statuts PWise</div>
        ${statutHtml}
      </div>
    </div>
    <div class="dash-grid">
      <div class="card">
        <div class="card-title">📂 Par département <span style="font-size:11px;color:var(--text-light)">— clic pour filtrer — % taux retenu — barre verte = retenus</span></div>
        <div class="bar-chart">${deptHtml}</div>
      </div>
      <div class="card">
        <div class="card-title">🔷 Par domaine (top 15) <span style="font-size:11px;color:var(--text-light)">% taux retenu</span></div>
        <div class="bar-chart">${domHtml}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🎯 Par type profil</div>
      ${catHtml}
    </div>`;

  document.getElementById("hf_dept").addEventListener("change", e => { histF.dept = e.target.value; renderHistorique(el); });
  document.getElementById("hf_cat").addEventListener("change",  e => { histF.cat  = e.target.value; renderHistorique(el); });
  document.getElementById("hf_statut").addEventListener("change", e => { histF.statut = e.target.value; renderHistorique(el); });
  document.querySelectorAll(".hist-dept-click").forEach(btn => {
    btn.addEventListener("click", () => { histF.dept = btn.dataset.dept || "Tous"; renderHistorique(el); });
  });
}

    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => { document.getElementById("hist-text").value = ev.target.result; };
    reader.readAsText(file);
  });

  document.getElementById("run-hist-import").addEventListener("click", async () => {
    const raw = document.getElementById("hist-text").value.trim();
    if (!raw) { alert("Collez d'abord le texte PWise historique."); return; }
    const btn = document.getElementById("run-hist-import");
    btn.textContent = "⏳ Import en cours..."; btn.disabled = true;
    const { added, updated, skipped } = await importHistorique(raw);
    btn.textContent = "🚀 Importer en Historique"; btn.disabled = false;
    document.getElementById("hist-result").innerHTML = `
      <div class="import-ok" style="margin-top:12px">
        ✅ Import historique terminé<br>
        🆕 ${added} nouveaux · ♻️ ${updated} retaggés comme historiques · ⏭️ ${skipped} ignorés (suivi actif)
        <br><span style="font-size:12px">→ <a href="#" onclick="navigate('historique');return false;" style="color:var(--green);font-weight:600">Voir la page Historique</a></span>
      </div>`;
  });

  document.getElementById("run-import").addEventListener("click", async()=>{
    const raw = document.getElementById("import-text").value.trim();
    if(!raw){alert("Collez d'abord le texte PWise.");return;}
    const parsed = parseAOs(raw);
    if(!parsed.length){document.getElementById("import-result").innerHTML=`<div class="import-warn" style="margin-top:16px">⚠️ Aucun AO détecté. Vérifiez le format du texte.</div>`;return;}

    const existing = await dbGetAll("aos");
    const existingMap = {};
    existing.forEach(a=>{existingMap[a.rfc]=a;});
    const importedRFCs = new Set(parsed.map(a=>a.rfc));

    let added=0, updated=0, closed=0, unchanged=0;
    const toSave = [];

    parsed.forEach(p=>{
      const ex = existingMap[p.rfc];
      if(!ex){
        toSave.push({...p, statut:"ouvert", bm:"", datePrise:"", dateReponse:"", consultant:"", tjm:"", dateQualif:"", dateDemarrage:"", notes:"", dateOuverture:today(), dateCreation:today(), dateCloture:"", dateDisparition:"", dernierImport:today()});
        added++;
      } else {
        let changed = ex.profil!==p.profil||ex.nbJours!==p.nbJours||ex.dateDebut!==p.dateDebut||ex.dateFin!==p.dateFin;
        const merged = {...ex, ...p, statut:"ouvert", dateCloture:"", dateDisparition:"", dernierImport:today(),
          bm:ex.bm||"", datePrise:ex.datePrise||"", dateReponse:ex.dateReponse||"", consultant:ex.consultant||"", tjm:ex.tjm||"",
          dateQualif:ex.dateQualif||"", dateDemarrage:ex.dateDemarrage||"", notes:ex.notes||"", dateOuverture:ex.dateOuverture||ex.dateCreation||today(), dateCreation:ex.dateCreation||today()};
        toSave.push(merged);
        if(changed) updated++; else unchanged++;
      }
    });

    let pending=0;
    existing.forEach(ex=>{
      if(ex.statut==="clos"||importedRFCs.has(ex.rfc)) return;
      if(ex.dateReponse) {
        const dispDate = ex.dateDisparition || today();
        const daysSinceDisp = Math.round((new Date() - new Date(dispDate)) / 86400000);
        if(daysSinceDisp < 30) {
          toSave.push({...ex, dateDisparition: ex.dateDisparition || today(), dernierImport:today()});
          pending++;
          return;
        }
      }
      toSave.push({...ex, statut:"clos", dateCloture:today(), dernierImport:today()});
      closed++;
    });

    parsed.forEach(p=>{
      const saved = toSave.find(s=>s.rfc===p.rfc);
      if(saved && saved.dateDisparition) saved.dateDisparition="";
    });

    await dbPutMany("aos", toSave);
    await dbPut("imports", {date:today(), time:new Date().toLocaleTimeString("fr-FR"), nbParsed:parsed.length, added, updated, closed, pending, unchanged});

    document.getElementById("import-result").innerHTML=`
      <div class="import-ok" style="margin-top:16px">
        <strong>✅ Import réussi !</strong><br>
        📊 ${parsed.length} AO dans le fichier<br>
        🆕 ${added} nouveau${added>1?"x":""} · ♻️ ${updated} mis à jour · 🔒 ${closed} clos · ✔️ ${unchanged} inchangé${unchanged>1?"s":""}${pending?` · ⏳ ${pending} en sursis (répondus, clos dans <30j)`:""}
      </div>`;

    loadImportHistory();
  });

  loadImportHistory();
}

async function importHistorique(raw) {
  const parsed = parseAOs(raw);
  if (!parsed.length) return { added: 0, updated: 0, skipped: 0 };
  const existing = await dbGetAll("aos");
  const existingMap = {};
  existing.forEach(a => { existingMap[a.rfc] = a; });

  const toSave = [];
  let added = 0, updated = 0, skipped = 0;

  parsed.forEach(p => {
    const ex = existingMap[p.rfc];
    const suivi = suiviFromPwise(p.statutPwise);

    if (!ex) {
      // Nouveau — créer comme historique
      toSave.push({
        ...p, isHistorique: true,
        statut: suivi === "clos" ? "clos" : "ouvert",
        dateCloture: suivi === "clos" ? (p.dateDebut || today()) : "",
        dateReponse: ["repondu","demarrage"].includes(suivi) ? (p.dateDebut || today()) : "",
        dateDemarrage: suivi === "demarrage" ? (p.dateDebut || today()) : "",
        bm:"", consultant:"", tjm:"", notes:"",
        dateCreation: today(), dateOuverture: today(), dateDisparition:"", dernierImport: today()
      });
      added++;
    } else if (!ex.isHistorique && !ex.bm && !ex.datePrise) {
      // Existe mais sans suivi INTM → retagger comme historique
      toSave.push({...ex, isHistorique: true,
        statut: suivi === "clos" ? "clos" : ex.statut,
        dateCloture: suivi === "clos" && !ex.dateCloture ? (p.dateDebut || today()) : ex.dateCloture,
        dateReponse: ["repondu","demarrage"].includes(suivi) && !ex.dateReponse ? (p.dateDebut || today()) : ex.dateReponse,
        dateDemarrage: suivi === "demarrage" && !ex.dateDemarrage ? (p.dateDebut || today()) : ex.dateDemarrage,
      });
      updated++;
    } else {
      // AO avec suivi actif → ne pas toucher
      skipped++;
    }
  });

  if (toSave.length) await dbPutMany("aos", toSave);
  return { added, updated, skipped };
}

async function loadImportHistory() {
  const imports = await dbGetAll("imports");
  const el = document.getElementById("import-history");
  if(!el||!imports.length) return;
  const recent = imports.sort((a,b)=>(b.id||0)-(a.id||0)).slice(0,10);
  el.innerHTML=`<div class="card" style="margin-top:16px"><div class="card-title">📜 Historique des imports</div>
    <table style="width:100%;font-size:12px"><thead><tr><th>Date</th><th>Heure</th><th>AO parsés</th><th>Nouveaux</th><th>Mis à jour</th><th>Clos</th></tr></thead>
    <tbody>${recent.map(i=>`<tr><td>${i.date}</td><td>${i.time}</td><td>${i.nbParsed}</td><td>${i.added}</td><td>${i.updated}</td><td>${i.closed}</td></tr>`).join("")}</tbody></table></div>`;
}

}

async function doImportJSON(e){
  const file=e.target.files[0]; if(!file)return;
  const text=await file.text();
  try{
    const data=JSON.parse(text);
    if(!data.aos||!data.aos.length){alert("Fichier invalide.");return;}
    if(!confirm(`Restaurer ${data.aos.length} AO depuis la sauvegarde du ${data.exportDate||"?"} ?\nCela écrasera les données existantes.`))return;
    await dbPutMany("aos",data.aos);
    alert("✅ Restauration terminée !");
    renderView();
  }catch(err){alert("Erreur de lecture: "+err.message);}
}

function download(filename, content, type){
  const blob=new Blob([content],{type});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}

    statusEl.style.color=useSupabase?"#4ade80":"#fbbf24";
    await seedIfEmpty();

    const menuBtn=document.getElementById("menu-toggle");
    const sidebar=document.getElementById("sidebar");
    const overlay=document.getElementById("sidebar-overlay");
    function toggleMenu(){ sidebar.classList.toggle("open"); overlay.classList.toggle("open"); }
    function closeMenu(){ sidebar.classList.remove("open"); overlay.classList.remove("open"); }
    menuBtn.addEventListener("click", toggleMenu);
    overlay.addEventListener("click", closeMenu);

    document.querySelectorAll(".nav-item").forEach(n=>{
      n.addEventListener("click",()=>{ closeMenu(); navigate(n.dataset.view); });
    });
    await renderView();
  } catch(e) {
    document.getElementById("main-content").innerHTML='<div style="padding:40px;color:red;font-size:14px"><h2>Erreur au chargement</h2><pre>'+e.message+'\n'+e.stack+'</pre></div>';
  }
}

init();
</script>
</body>
</html>
