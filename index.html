<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTM — AO Manager</title>
<style>
:root {
  --green: #00915a; --green-dark: #00643e; --blue: #3b82f6; --purple: #8b5cf6;
  --amber: #f59e0b; --red: #ef4444; --gray: #64748b; --gray-light: #f1f5f9;
  --bg: #f5f7fa; --card: #fff; --border: #e2e8f0; --text: #1a1a2e; --text-light: #94a3b8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
a { color: var(--green); text-decoration: none; }

/* Layout */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: #0f172a; color: #fff; padding: 20px 0; flex-shrink: 0; position: fixed; height: 100vh; overflow-y: auto; }
.sidebar-logo { padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px; }
.sidebar-logo h2 { font-size: 18px; font-weight: 700; }
.sidebar-logo span { font-size: 11px; color: var(--text-light); }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 13.5px; cursor: pointer; transition: background 0.12s; color: rgba(255,255,255,0.7); }
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active { background: rgba(0,145,90,0.2); color: #fff; border-left: 3px solid var(--green); }
.nav-item .icon { font-size: 16px; width: 22px; text-align: center; }
.nav-badge { margin-left: auto; background: var(--green); color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; }
.main { margin-left: 220px; flex: 1; padding: 24px 28px; max-width: 1200px; }

/* Cards */
.card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 18px; margin-bottom: 16px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--gray); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

/* KPI Grid */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
.kpi { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 16px; }
.kpi-value { font-size: 32px; font-weight: 800; line-height: 1.1; }
.kpi-label { font-size: 12px; color: var(--gray); margin-top: 4px; }
.kpi-sub { font-size: 11px; color: var(--text-light); margin-top: 2px; }

/* Filters Bar */
.filter-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.filter-bar select, .filter-bar input { padding: 7px 12px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 13px; outline: none; background: #fff; }
.filter-bar input[type=text] { flex: 1; min-width: 180px; }
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--green); }

/* Table */
.table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); background: #fff; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
thead tr { background: var(--gray-light); }
th { padding: 9px 10px; text-align: left; font-weight: 600; white-space: nowrap; user-select: none; font-size: 11.5px; text-transform: uppercase; color: var(--gray); letter-spacing: 0.3px; }
th.sortable { cursor: pointer; }
th.sortable:hover { color: var(--green); }
td { padding: 7px 10px; border-bottom: 1px solid #f8fafc; }
tr.row { cursor: pointer; transition: background 0.1s; }
tr.row:hover { background: #f8fafc !important; }
tr.row.selected { background: #e0f2fe !important; }
tr.urg3 { background: #fef2f2; }
tr.urg2 { background: #fefce8; }
tr.urg1 { background: #f0fdf4; }
tr.clos { opacity: 0.45; }
.rfc-code { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 11px; color: #475569; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; color: #fff; }
.profil-cell { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.org-cell { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--gray); font-size: 11.5px; }
.tri-cell { font-weight: 700; color: var(--green); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
.empty-cell { color: #d1d5db; }
.status-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 10.5px; font-weight: 600; }
.pill-ouvert { background: #dbeafe; color: #1d4ed8; }
.pill-encours { background: #fef3c7; color: #92400e; }
.pill-qualif { background: #ede9fe; color: #6d28d9; }
.pill-demarrage { background: #d1fae5; color: #065f46; }
.pill-clos { background: #f1f5f9; color: #94a3b8; }
th.r { text-align: right; }
td.r { text-align: right; }

/* Detail Panel */
.detail-panel { margin-top: 16px; animation: slideIn 0.15s ease; }
@keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
.detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.detail-codes { font-size: 11px; color: var(--text-light); font-family: monospace; }
.detail-panel h3 { font-size: 15px; font-weight: 700; margin-top: 4px; }
.close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-light); }
.close-btn:hover { color: #333; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px 20px; font-size: 13px; margin-bottom: 16px; }
.info-grid .lbl { font-size: 11px; color: var(--text-light); margin-bottom: 2px; }
.form-section { padding-top: 16px; border-top: 1px solid var(--border); }
.form-section h4 { font-size: 13px; font-weight: 600; color: var(--gray); margin-bottom: 12px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field label { font-size: 11px; color: var(--text-light); font-weight: 500; }
.field input, .field select { padding: 7px 10px; border-radius: 7px; border: 1px solid #d1d5db; font-size: 13px; outline: none; font-family: inherit; }
.field input:focus { border-color: var(--green); }
.field input.tri { text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
.form-actions { display: flex; gap: 8px; margin-top: 14px; }
.btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; font-size: 12.5px; cursor: pointer; font-weight: 500; font-family: inherit; }
.btn:hover { background: #f8fafc; }
.btn-green { background: var(--green); color: #fff; border-color: var(--green); }
.btn-green:hover { background: var(--green-dark); }
.btn-red { color: var(--red); border-color: #fecaca; }
.btn-red:hover { background: #fef2f2; }

/* Import */
.import-zone { border: 2px dashed #d1d5db; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.15s; }
.import-zone:hover { border-color: var(--green); background: #f0fdf4; }
.import-zone.active { border-color: var(--green); background: #d1fae5; }
.import-zone h3 { font-size: 16px; margin-bottom: 6px; }
.import-zone p { font-size: 13px; color: var(--gray); }
.import-result { margin-top: 16px; padding: 16px; border-radius: 10px; font-size: 13px; }
.import-ok { background: #d1fae5; border: 1px solid #86efac; color: #065f46; }
.import-warn { background: #fef3c7; border: 1px solid #fcd34d; color: #92400e; }

/* Charts (simple bars) */
.bar-chart { display: flex; flex-direction: column; gap: 6px; }
.bar-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
.bar-label { width: 140px; text-align: right; color: var(--gray); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; height: 22px; background: var(--gray-light); border-radius: 6px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 700; color: #fff; min-width: 28px; transition: width 0.3s; }
.bar-val { width: 30px; font-weight: 700; font-size: 12px; }

/* Responsive */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .info-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h2>INTM</h2>
      <span>AO Manager</span>
    </div>
    <div class="nav-item active" data-view="dashboard"><span class="icon">📊</span> Dashboard <span class="nav-badge" id="nav-count">0</span></div>
    <div class="nav-item" data-view="liste"><span class="icon">📋</span> Appels d'offres</div>
    <div class="nav-item" data-view="import"><span class="icon">📥</span> Import PWise</div>
    <div class="nav-item" data-view="export"><span class="icon">📤</span> Export</div>
  </nav>

  <div class="main" id="main-content"></div>
</div>

<script>
// ===================== INDEXEDDB =====================
const DB_NAME = "intm_ao_manager";
const DB_VERSION = 2;
let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains("aos")) {
        const s = d.createObjectStore("aos", { keyPath: "rfc" });
        s.createIndex("statut", "statut");
        s.createIndex("dept", "dept");
        s.createIndex("bm", "bm");
        s.createIndex("dateCreation", "dateCreation");
      }
      if (!d.objectStoreNames.contains("imports")) {
        d.createObjectStore("imports", { keyPath: "id", autoIncrement: true });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e);
  });
}

function dbGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readonly");
    const s = tx.objectStore(store);
    const req = s.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(store, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readwrite");
    const s = tx.objectStore(store);
    s.put(data);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

function dbPutMany(store, items) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readwrite");
    const s = tx.objectStore(store);
    items.forEach(item => s.put(item));
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// ===================== PARSER =====================
function parseAOs(raw) {
  const lines = raw.split("\n").map(l => l.trim()).filter(Boolean);
  const noise = ["Prestation","Dates de mission","Nombre d'UO","TJM","Code","Demande d'achats","Organisation","Département","Date limite de réponses","Statut"];
  const aos = []; let i = 0;
  while (i < lines.length) {
    if (lines[i]==="btnMasterDetail" && i+1<lines.length && /^RFC\d+/.test(lines[i+1])) {
      const rfc=lines[i+1], intitule=lines[i+2]||"";
      let tm="",org="",dept="",statutPwise="",j=i+3;
      while(j<lines.length&&lines[j]!=="btnMasterDetail"){
        if(/^TM\d+/.test(lines[j]))tm=lines[j];
        else if(/^L6T?_/.test(lines[j]))org=lines[j].replace(/^L6T?_/,"");
        else if(lines[j].startsWith("L4_"))dept=lines[j].replace("L4_","");
        else if(!noise.includes(lines[j])&&!lines[j].includes("Enregistrement")&&!lines[j].includes("Modifier le paramétrage"))statutPwise=lines[j];
        j++;
      }
      let profil="",modalite="",dateDebut="",dateFin="",nbJours=0;
      if(j<lines.length&&lines[j]==="btnMasterDetail"){
        j++;if(j<lines.length){profil=lines[j];j++;}
        while(j<lines.length&&lines[j]!=="btnMasterDetail"){
          if(["Sur Site","Télétravail","Hybride"].includes(lines[j]))modalite=lines[j];
          const dm=lines[j].match(/^(\d{2}\/\d{2}\/\d{4})\s*-\s*(\d{2}\/\d{2}\/\d{4})$/);
          if(dm){dateDebut=dm[1];dateFin=dm[2];}
          const nm=lines[j].match(/^(\d+)[,.](\d+)$/);
          if(nm)nbJours=parseInt(nm[1]);
          j++;
        }
      }
      if(rfc)aos.push({rfc,tm,intitule,org,dept,statutPwise,profil,modalite,dateDebut,dateFin,nbJours});
      i=j;
    } else i++;
  }
  return aos;
}

// ===================== HELPERS =====================
function categorize(p) {
  const l=(p||"").toLowerCase();
  if(/développeur|software|cobol|intégrateur/.test(l)) return "Dev";
  if(/business analyst|chargé de mission|consultant fonctionnel|analyse de test/.test(l)) return "BA";
  if(/chef de projet|project manager/.test(l)) return "CdP";
  if(/expert technique|tech lead/.test(l)) return "Expert";
  return "Autre";
}
const CAT_COLORS={Dev:"#3b82f6",BA:"#8b5cf6",CdP:"#f59e0b",Expert:"#ef4444",Autre:"#6b7280"};

function parseDate(d){if(!d)return null;const p=d.split("/");if(p.length===3)return new Date(p[2],p[1]-1,p[0]);return new Date(d);}
function toISO(d){if(!d)return"";const dt=parseDate(d);if(!dt||isNaN(dt))return"";return dt.toISOString().slice(0,10);}
function fromISO(s){if(!s)return"";const[y,m,d]=s.split("-");return`${d}/${m}/${y}`;}
function urgency(d){const dt=parseDate(d);if(!dt)return 0;const diff=(dt-new Date())/86400000;if(diff<0)return 3;if(diff<=7)return 2;if(diff<=21)return 1;return 0;}
function shortOrg(o){return(o||"").replace(/BCEF (IT|RETAIL) - /g,"").replace(/\d+\s*/g,"").trim().substring(0,28);}
function domainGroup(o){const s=(o||"").replace(/^BCEF (IT|RETAIL) - /,"").trim();const m=s.match(/^([A-Z0-9]{2,})/);return m?m[1]:s.split(" ")[0]||"Autre";}

function statutSuivi(ao) {
  if(ao.dateDemarrage) return "demarrage";
  if(ao.dateQualif) return "qualif";
  if(ao.dateReponse) return "repondu";
  if(ao.bm || ao.datePrise) return "encours";
  return "ouvert";
}
function statutLabel(s) {
  return {ouvert:"Ouvert",encours:"En cours",repondu:"Répondu",qualif:"Qualifié",demarrage:"Démarré",clos:"Clos"}[s]||s;
}
function statutPill(s) {
  const cls={ouvert:"pill-ouvert",encours:"pill-encours",repondu:"pill-encours",qualif:"pill-qualif",demarrage:"pill-demarrage",clos:"pill-clos"}[s]||"pill-ouvert";
  return `<span class="status-pill ${cls}">${statutLabel(s)}</span>`;
}

function today(){return new Date().toISOString().slice(0,10);}

function periodFilter(dateStr, period) {
  if(!period||period==="all") return true;
  const d = parseDate(dateStr);
  if(!d) return true;
  const now = new Date();
  if(period==="week") { const w=new Date(now); w.setDate(w.getDate()-7); return d>=w; }
  if(period==="month") { const m=new Date(now); m.setMonth(m.getMonth()-1); return d>=m; }
  if(period==="quarter") { const q=new Date(now); q.setMonth(q.getMonth()-3); return d>=q; }
  if(period==="year") { const y=new Date(now); y.setFullYear(y.getFullYear()-1); return d>=y; }
  return true;
}

// ===================== STATE =====================
let allAOs = [];
let currentView = "dashboard";
let filters = { search:"", dept:"Tous", cat:"Tous", statut:"Tous", period:"all", bm:"Tous" };
let sort = { col:"dateDebut", dir:1 };
let selectedRFC = null;

async function loadAOs() { allAOs = await dbGetAll("aos"); }

function getOpenAOs() { return allAOs.filter(a => a.statut !== "clos"); }
function getFilteredAOs() {
  let f = allAOs;
  if(filters.statut==="clos") f=f.filter(a=>a.statut==="clos");
  else if(filters.statut!=="Tous") f=f.filter(a=>a.statut!=="clos"&&statutSuivi(a)===filters.statut);
  else f=f.filter(a=>a.statut!=="clos");
  if(filters.search){const s=filters.search.toLowerCase();f=f.filter(a=>[a.rfc,a.intitule,a.profil,a.org,a.dept,a.bm||"",a.consultant||""].some(v=>(v||"").toLowerCase().includes(s)));}
  if(filters.dept!=="Tous") f=f.filter(a=>a.dept===filters.dept);
  if(filters.cat!=="Tous") f=f.filter(a=>categorize(a.profil)===filters.cat);
  if(filters.bm!=="Tous") f=f.filter(a=>(a.bm||"")===(filters.bm==="—"?"":filters.bm));
  if(filters.period!=="all") f=f.filter(a=>periodFilter(a.dateDebut,filters.period));
  f=[...f].sort((a,b)=>{
    if(sort.col==="dateDebut") return sort.dir*((parseDate(a.dateDebut)||0)-(parseDate(b.dateDebut)||0));
    if(sort.col==="nbJours") return sort.dir*(a.nbJours-b.nbJours);
    if(sort.col==="rfc") return sort.dir*a.rfc.localeCompare(b.rfc);
    return 0;
  });
  return f;
}

// ===================== NAVIGATION =====================
function navigate(view) {
  currentView = view;
  selectedRFC = null;
  if(view==="dashboard") dashF={dept:null,domain:null,bm:null,cat:null};
  document.querySelectorAll(".nav-item").forEach(n => n.classList.toggle("active", n.dataset.view===view));
  renderView();
}

async function renderView() {
  await loadAOs();
  document.getElementById("nav-count").textContent = getOpenAOs().length;
  const main = document.getElementById("main-content");
  if(currentView==="dashboard") renderDashboard(main);
  else if(currentView==="liste") renderListe(main);
  else if(currentView==="import") renderImport(main);
  else if(currentView==="export") renderExport(main);
}

// ===================== DASHBOARD =====================
// Dashboard filter state
let dashF = { dept:null, domain:null, bm:null, cat:null };

function dashFilteredAOs() {
  let f = getOpenAOs();
  if(dashF.dept) f=f.filter(a=>a.dept===dashF.dept);
  if(dashF.domain) f=f.filter(a=>domainGroup(a.org)===dashF.domain);
  if(dashF.bm) f=f.filter(a=>(a.bm||"Non assigné")===dashF.bm);
  if(dashF.cat) f=f.filter(a=>categorize(a.profil)===dashF.cat);
  return f;
}

function dashHasFilters(){ return dashF.dept||dashF.domain||dashF.bm||dashF.cat; }

function renderDashboard(el) {
  const all = getOpenAOs();
  const filtered = dashFilteredAOs();
  const total=filtered.length;
  const encours=filtered.filter(a=>["encours","repondu"].includes(statutSuivi(a))).length;
  const qualif=filtered.filter(a=>statutSuivi(a)==="qualif").length;
  const demarrage=filtered.filter(a=>statutSuivi(a)==="demarrage").length;
  const nonTraite=filtered.filter(a=>statutSuivi(a)==="ouvert").length;
  const urgent=filtered.filter(a=>urgency(a.dateDebut)>=2).length;

  // Compute data for each chart based on OTHER filters (exclude own dimension)
  function subFilter(exclude) {
    let f=all;
    if(exclude!=="dept" && dashF.dept) f=f.filter(a=>a.dept===dashF.dept);
    if(exclude!=="domain" && dashF.domain) f=f.filter(a=>domainGroup(a.org)===dashF.domain);
    if(exclude!=="bm" && dashF.bm) f=f.filter(a=>(a.bm||"Non assigné")===dashF.bm);
    if(exclude!=="cat" && dashF.cat) f=f.filter(a=>categorize(a.profil)===dashF.cat);
    return f;
  }

  // Départements (+ domaines en drilldown)
  const deptData = subFilter("dept");
  const byDept={}; deptData.forEach(a=>{byDept[a.dept]=(byDept[a.dept]||0)+1;});
  const deptEntries=Object.entries(byDept).sort((a,b)=>b[1]-a[1]);
  const maxDept=deptEntries.length?deptEntries[0][1]:1;

  // Domaines (si un dept est sélectionné)
  let domainEntries=[], maxDomain=1;
  if(dashF.dept) {
    const domData=subFilter("domain").filter(a=>a.dept===dashF.dept);
    const byDom={}; domData.forEach(a=>{const g=domainGroup(a.org);byDom[g]=(byDom[g]||0)+1;});
    domainEntries=Object.entries(byDom).sort((a,b)=>b[1]-a[1]);
    maxDomain=domainEntries.length?domainEntries[0][1]:1;
  }

  // Managers
  const bmData=subFilter("bm");
  const byBM={}; bmData.forEach(a=>{const bm=a.bm||"Non assigné";byBM[bm]=(byBM[bm]||0)+1;});
  const bmEntries=Object.entries(byBM).sort((a,b)=>b[1]-a[1]);
  const maxBM=bmEntries.length?bmEntries[0][1]:1;

  // Catégories
  const catData=subFilter("cat");
  const byCat={}; catData.forEach(a=>{const c=categorize(a.profil);byCat[c]=(byCat[c]||0)+1;});

  // Build funnel HTML
  const fRepondu=filtered.filter(a=>a.dateReponse).length;
  const fQualif=filtered.filter(a=>a.dateQualif).length;
  const fDem=filtered.filter(a=>a.dateDemarrage).length;
  const fSteps=[{label:"Ouverts",n:total,color:"var(--blue)"},{label:"Répondus",n:fRepondu,color:"var(--amber)"},{label:"Qualifiés",n:fQualif,color:"var(--purple)"},{label:"Démarrés",n:fDem,color:"var(--green)"}];
  const fMax=Math.max(total,1);
  let funnelHtml='<div style="display:flex;flex-direction:column;gap:4px">';
  fSteps.forEach((s,i)=>{
    const pct=total?Math.round(s.n/fMax*100):0;
    const rate=i>0&&fSteps[i-1].n?Math.round(s.n/fSteps[i-1].n*100):null;
    funnelHtml+='<div style="display:flex;align-items:center;gap:8px">';
    funnelHtml+='<div style="width:70px;text-align:right;font-size:11px;color:var(--gray)">'+s.label+'</div>';
    funnelHtml+='<div style="flex:1;height:28px;background:var(--gray-light);border-radius:6px;overflow:hidden">';
    funnelHtml+='<div style="height:100%;width:'+pct+'%;background:'+s.color+';border-radius:6px;display:flex;align-items:center;padding-left:8px;min-width:32px">';
    funnelHtml+='<span style="font-size:12px;font-weight:700;color:#fff">'+s.n+'</span></div></div>';
    if(rate!==null) funnelHtml+='<div style="width:42px;font-size:11px;font-weight:600;color:'+(rate>=30?"var(--green)":"var(--red)")+'">'+rate+'%</div>';
    else funnelHtml+='<div style="width:42px"></div>';
    funnelHtml+='</div>';
  });
  funnelHtml+='</div>';
  if(total) funnelHtml+='<div style="margin-top:8px;font-size:11px;color:var(--gray);text-align:center">Taux global : <strong style="color:'+(fDem/total>=0.1?"var(--green)":"var(--amber)")+'">'+Math.round(fDem/total*100)+'%</strong> (ouvert → démarré)</div>';

  // Build manager table HTML
  const mgrData={};
  filtered.forEach(a=>{
    const bm=a.bm||"Non assigné";
    if(!mgrData[bm]) mgrData[bm]={total:0,ouvert:0,repondu:0,qualif:0,demarrage:0,delais:[]};
    mgrData[bm].total++;
    if(statutSuivi(a)==="ouvert") mgrData[bm].ouvert++;
    if(a.dateReponse) mgrData[bm].repondu++;
    if(a.dateQualif) mgrData[bm].qualif++;
    if(a.dateDemarrage) mgrData[bm].demarrage++;
    if(a.datePrise&&a.dateReponse){
      const d1=new Date(a.datePrise),d2=new Date(a.dateReponse);
      if(!isNaN(d1)&&!isNaN(d2)) mgrData[bm].delais.push(Math.round((d2-d1)/86400000));
    }
  });
  const mgrEntries=Object.entries(mgrData).sort((a,b)=>b[1].total-a[1].total);
  let mgrHtml='';
  if(!mgrEntries.length){ mgrHtml='<div style="color:var(--gray);font-size:13px">Aucun BM assigné</div>'; }
  else {
    mgrHtml='<table style="width:100%;font-size:11.5px;border-collapse:collapse"><thead><tr style="border-bottom:1px solid var(--border)">';
    mgrHtml+='<th style="text-align:left;padding:4px 6px;font-weight:600;color:var(--gray)">BM</th>';
    mgrHtml+='<th style="text-align:center;padding:4px 4px" title="Total AO">Total</th>';
    mgrHtml+='<th style="text-align:center;padding:4px 4px" title="Non traités">⚪</th>';
    mgrHtml+='<th style="text-align:center;padding:4px 4px" title="Répondus">📨</th>';
    mgrHtml+='<th style="text-align:center;padding:4px 4px" title="Qualifiés">🟣</th>';
    mgrHtml+='<th style="text-align:center;padding:4px 4px" title="Démarrés">🟢</th>';
    mgrHtml+='<th style="text-align:center;padding:4px 4px" title="Délai moyen réponse">⏱️ moy.</th>';
    mgrHtml+='</tr></thead><tbody>';
    mgrEntries.forEach(([bm,s])=>{
      const avg=s.delais.length?Math.round(s.delais.reduce((a,b)=>a+b,0)/s.delais.length):null;
      mgrHtml+='<tr style="border-bottom:1px solid #f8fafc">';
      mgrHtml+='<td style="padding:5px 6px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:0.5px">'+bm+'</td>';
      mgrHtml+='<td style="text-align:center;font-weight:700">'+s.total+'</td>';
      mgrHtml+='<td style="text-align:center;color:'+(s.ouvert>3?"var(--red)":"inherit")+'">'+s.ouvert+'</td>';
      mgrHtml+='<td style="text-align:center">'+s.repondu+'</td>';
      mgrHtml+='<td style="text-align:center">'+s.qualif+'</td>';
      mgrHtml+='<td style="text-align:center">'+s.demarrage+'</td>';
      mgrHtml+='<td style="text-align:center;font-size:11px;color:'+(avg&&avg>5?"var(--amber)":"var(--green)")+'">'+(avg!==null?avg+"j":"—")+'</td>';
      mgrHtml+='</tr>';
    });
    mgrHtml+='</tbody></table>';
  }

  // Build dept/domain chart HTML
  let deptChartHtml='';
  if(dashF.dept){
    domainEntries.forEach(([d,n])=>{
      const sel=dashF.domain===d;
      deptChartHtml+='<div class="bar-row dash-click" data-key="domain" data-val="'+d+'" style="cursor:pointer;'+(sel?"outline:2px solid var(--purple);border-radius:6px;":"")+'">';
      deptChartHtml+='<div class="bar-label" title="'+d+'">'+d+'</div>';
      deptChartHtml+='<div class="bar-track"><div class="bar-fill" style="width:'+Math.round(n/maxDomain*100)+'%;background:'+(sel?"var(--green)":"var(--purple)")+'">'+n+'</div></div></div>';
    });
    deptChartHtml+='<div style="margin-top:8px"><button class="btn dash-tag" data-key="dept" style="font-size:11px;padding:3px 10px">← Tous les départements</button></div>';
  } else {
    deptEntries.forEach(([d,n])=>{
      const sel=dashF.dept===d;
      deptChartHtml+='<div class="bar-row dash-click" data-key="dept" data-val="'+d+'" style="cursor:pointer;'+(sel?"outline:2px solid var(--green);border-radius:6px;":"")+'">';
      deptChartHtml+='<div class="bar-label" title="'+d+'">'+d+'</div>';
      deptChartHtml+='<div class="bar-track"><div class="bar-fill" style="width:'+Math.round(n/maxDept*100)+'%;background:var(--green)">'+n+'</div></div></div>';
    });
  }

  // Build BM chart HTML
  let bmChartHtml='';
  bmEntries.forEach(([bm,n])=>{
    const sel=dashF.bm===bm;
    bmChartHtml+='<div class="bar-row dash-click" data-key="bm" data-val="'+bm+'" style="cursor:pointer;'+(sel?"outline:2px solid var(--blue);border-radius:6px;":"")+'">';
    bmChartHtml+='<div class="bar-label">'+bm+'</div>';
    bmChartHtml+='<div class="bar-track"><div class="bar-fill" style="width:'+Math.round(n/maxBM*100)+'%;background:'+(sel?"var(--green)":"var(--blue)")+'">'+n+'</div></div></div>';
  });

  // Build cat badges HTML
  let catHtml='';
  Object.entries(byCat).forEach(([c,n])=>{
    const sel=dashF.cat===c;
    catHtml+='<span class="badge dash-click" data-key="cat" data-val="'+c+'" style="background:'+CAT_COLORS[c]+';font-size:12px;padding:6px 14px;cursor:pointer;'+(sel?"outline:2px solid #333;outline-offset:2px;":"")+'">'+c+': '+n+'</span> ';
  });

  // Tags HTML
  let tagsHtml='';
  if(tags.length){
    tagsHtml='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">';
    tags.forEach(t=>{
      tagsHtml+='<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:#e0f2fe;border-radius:16px;font-size:11px;font-weight:600;color:#0369a1;cursor:pointer" class="dash-tag" data-key="'+t.k+'">'+t.v+' ✕</span>';
    });
    tagsHtml+='</div>';
  }

  el.innerHTML = '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">'
    +'<h1 style="font-size:24px;font-weight:800">Dashboard</h1>'
    +(dashHasFilters()?'<button class="btn" id="dash-clear" style="font-size:11px;padding:4px 12px">✕ Réinitialiser</button>':"")
    +'</div>'
    +tagsHtml
    +'<div class="kpi-grid">'
    +'<div class="kpi"><div class="kpi-value" style="color:var(--green)">'+total+'</div><div class="kpi-label">AO filtrés</div>'+(dashHasFilters()?'<div class="kpi-sub">sur '+all.length+' total</div>':"")+'</div>'
    +'<div class="kpi"><div class="kpi-value" style="color:var(--red)">'+nonTraite+'</div><div class="kpi-label">Non traités</div><div class="kpi-sub">'+urgent+' urgent'+(urgent>1?"s":"")+'</div></div>'
    +'<div class="kpi"><div class="kpi-value" style="color:var(--amber)">'+encours+'</div><div class="kpi-label">En cours</div></div>'
    +'<div class="kpi"><div class="kpi-value" style="color:var(--purple)">'+qualif+'</div><div class="kpi-label">Qualifiés</div></div>'
    +'<div class="kpi"><div class="kpi-value" style="color:var(--green)">'+demarrage+'</div><div class="kpi-label">Démarrés</div></div>'
    +'<div class="kpi"><div class="kpi-value" style="color:var(--gray)">'+allAOs.filter(a=>a.statut==="clos").length+'</div><div class="kpi-label">Clos</div></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'
    +'<div class="card"><div class="card-title">🔄 Funnel de conversion</div>'+funnelHtml+'</div>'
    +'<div class="card"><div class="card-title">👥 Charge par manager</div>'+mgrHtml+'</div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'
    +'<div class="card"><div class="card-title">📂 '+(dashF.dept?dashF.dept+' — Domaines':'Par département')+' <span style="font-size:11px;color:var(--text-light);font-weight:400">'+(dashF.dept?"cliquez un domaine ou ← retour":"cliquez pour filtrer")+'</span></div><div class="bar-chart" id="dept-chart">'+deptChartHtml+'</div></div>'
    +'<div class="card"><div class="card-title">👤 Par manager <span style="font-size:11px;color:var(--text-light);font-weight:400">— cliquez pour filtrer</span></div><div class="bar-chart">'+bmChartHtml+'</div></div>'
    +'</div>'
    +'<div class="card" style="margin-top:0"><div class="card-title">🎯 Par type de profil <span style="font-size:11px;color:var(--text-light);font-weight:400">— cliquez pour filtrer</span></div><div style="display:flex;gap:10px;flex-wrap:wrap">'+catHtml+'</div></div>'
    +(dashHasFilters()?'<div style="text-align:center;margin-top:16px"><button class="btn btn-green" id="dash-to-list" style="padding:10px 24px;font-size:14px">📋 Voir la liste des '+total+' AO filtrés</button></div>':"");
  `;

  // Bind events
  document.querySelectorAll(".dash-click").forEach(el=>{
    el.addEventListener("click",()=>{
      const k=el.dataset.key, v=el.dataset.val;
      if(dashF[k]===v) dashF[k]=null; // toggle off
      else dashF[k]=v;
      // If changing dept, reset domain
      if(k==="dept") dashF.domain=null;
      renderDashboard(document.getElementById("main-content"));
    });
  });

  document.querySelectorAll(".dash-tag").forEach(el=>{
    el.addEventListener("click",()=>{
      const k=el.dataset.key;
      dashF[k]=null;
      if(k==="dept") dashF.domain=null;
      renderDashboard(document.getElementById("main-content"));
    });
  });

  const clearBtn=document.getElementById("dash-clear");
  if(clearBtn) clearBtn.addEventListener("click",()=>{ dashF={dept:null,domain:null,bm:null,cat:null}; renderDashboard(document.getElementById("main-content")); });

  const listBtn=document.getElementById("dash-to-list");
  if(listBtn) listBtn.addEventListener("click",()=>{
    // Transfer dash filters to list filters
    filters.dept=dashF.dept||"Tous";
    filters.cat=dashF.cat||"Tous";
    filters.bm=dashF.bm||"Tous";
    if(dashF.domain) filters.search=dashF.domain;
    navigate("liste");
  });
}

// ===================== LISTE AO =====================
function renderListe(el) {
  const open = getOpenAOs();
  const depts = ["Tous",...new Set(allAOs.map(a=>a.dept))];
  const cats = ["Tous",...new Set(allAOs.map(a=>categorize(a.profil)))];
  const bms = ["Tous",...new Set(allAOs.map(a=>a.bm||"—").filter(Boolean))];

  const filtered = getFilteredAOs();

  let tableRows = filtered.map(a=>{
    const cat=categorize(a.profil), u=urgency(a.dateDebut), ss=a.statut==="clos"?"clos":statutSuivi(a);
    const sel=selectedRFC===a.rfc;
    return `<tr class="row${u&&ss!=="clos"?" urg"+u:""}${ss==="clos"?" clos":""}${sel?" selected":""}" data-rfc="${a.rfc}">
      <td class="rfc-code">${a.rfc.replace("RFC0000","").replace("RFC000","")}</td>
      <td><span class="badge" style="background:${CAT_COLORS[cat]}">${cat}</span></td>
      <td class="profil-cell" title="${a.profil}">${a.profil}</td>
      <td class="org-cell" title="${a.org}">${shortOrg(a.org)}</td>
      <td>${a.dateDebut}</td>
      <td class="r">${a.nbJours}</td>
      <td class="${a.bm?"tri-cell":"empty-cell"}">${a.bm||"—"}</td>
      <td class="${a.consultant?"tri-cell":"empty-cell"}">${a.consultant||"—"}</td>
      <td class="r" style="font-size:11.5px">${a.tjm?a.tjm+"€":"—"}</td>
      <td>${statutPill(ss)}${a.notes?` <span title="${a.notes.substring(0,100).replace(/"/g,"'")}" style="cursor:help">📝</span>`:""}</td>
    </tr>`;
  }).join("");

  el.innerHTML = `
    <h1 style="font-size:24px;font-weight:800;margin-bottom:20px">Appels d'offres <span style="font-weight:400;font-size:16px;color:var(--gray)">${filtered.length} résultat${filtered.length>1?"s":""}</span></h1>
    <div class="filter-bar">
      <input type="text" id="f_search" placeholder="🔍 Rechercher..." value="${filters.search}">
      <select id="f_dept">${depts.map(d=>`<option value="${d}"${filters.dept===d?" selected":""}>${d==="Tous"?"Département":d}</option>`).join("")}</select>
      <select id="f_cat">${cats.map(c=>`<option value="${c}"${filters.cat===c?" selected":""}>${c==="Tous"?"Catégorie":c}</option>`).join("")}</select>
      <select id="f_statut">
        <option value="Tous"${filters.statut==="Tous"?" selected":""}>Statut suivi</option>
        <option value="ouvert"${filters.statut==="ouvert"?" selected":""}>⚪ Ouvert</option>
        <option value="encours"${filters.statut==="encours"?" selected":""}>🟡 En cours</option>
        <option value="qualif"${filters.statut==="qualif"?" selected":""}>🟣 Qualifié</option>
        <option value="demarrage"${filters.statut==="demarrage"?" selected":""}>🟢 Démarré</option>
        <option value="clos"${filters.statut==="clos"?" selected":""}>⚫ Clos</option>
      </select>
      <select id="f_bm">${bms.map(b=>`<option value="${b}"${filters.bm===b?" selected":""}>${b==="Tous"?"Manager":b}</option>`).join("")}</select>
      <select id="f_period">
        <option value="all"${filters.period==="all"?" selected":""}>Toute période</option>
        <option value="week"${filters.period==="week"?" selected":""}>7 derniers jours</option>
        <option value="month"${filters.period==="month"?" selected":""}>30 derniers jours</option>
        <option value="quarter"${filters.period==="quarter"?" selected":""}>Trimestre</option>
        <option value="year"${filters.period==="year"?" selected":""}>Année</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th class="sortable" data-col="rfc">RFC</th>
          <th>Cat.</th><th>Profil</th><th>Domaine</th>
          <th class="sortable" data-col="dateDebut">Début</th>
          <th class="sortable r" data-col="nbJours">Jours</th>
          <th>BM</th><th>Consultant</th><th class="r">TJM</th><th>Suivi</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div id="detail-area"></div>
  `;

  // Bind filters
  document.getElementById("f_search").addEventListener("input",e=>{filters.search=e.target.value;renderListe(el);});
  document.getElementById("f_dept").addEventListener("change",e=>{filters.dept=e.target.value;renderListe(el);});
  document.getElementById("f_cat").addEventListener("change",e=>{filters.cat=e.target.value;renderListe(el);});
  document.getElementById("f_statut").addEventListener("change",e=>{filters.statut=e.target.value;renderListe(el);});
  document.getElementById("f_bm").addEventListener("change",e=>{filters.bm=e.target.value;renderListe(el);});
  document.getElementById("f_period").addEventListener("change",e=>{filters.period=e.target.value;renderListe(el);});
  document.querySelectorAll("th.sortable").forEach(th=>{
    th.addEventListener("click",()=>{const c=th.dataset.col;if(sort.col===c)sort.dir=-sort.dir;else{sort.col=c;sort.dir=1;}renderListe(el);});
  });
  document.querySelectorAll("tr.row").forEach(tr=>{
    tr.addEventListener("click",()=>{
      const rfc=tr.dataset.rfc;
      selectedRFC=selectedRFC===rfc?null:rfc;
      renderListe(el);
      if(selectedRFC) document.getElementById("detail-area").scrollIntoView({behavior:"smooth",block:"nearest"});
    });
  });

  if(selectedRFC) renderDetail(document.getElementById("detail-area"), selectedRFC);
}

function renderDetail(el, rfc) {
  const ao = allAOs.find(a=>a.rfc===rfc);
  if(!ao) return;
  el.innerHTML = `
    <div class="card detail-panel">
      <div class="detail-header">
        <div><div class="detail-codes">${ao.rfc} · ${ao.tm}</div><h3>${ao.profil}</h3></div>
        <button class="close-btn" id="close-detail">✕</button>
      </div>
      <div class="info-grid">
        <div><div class="lbl">Intitulé</div>${ao.intitule}</div>
        <div><div class="lbl">Organisation</div>${ao.org}</div>
        <div><div class="lbl">Département</div>${ao.dept}</div>
        <div><div class="lbl">Modalité</div>${ao.modalite||"—"}</div>
        <div><div class="lbl">Période</div>${ao.dateDebut} → ${ao.dateFin}</div>
        <div><div class="lbl">Durée</div><strong>${ao.nbJours} jours</strong></div>
      </div>
      <div class="form-section">
        <h4>📋 Suivi INTM</h4>
        <div class="form-grid">
          <div class="field"><label>BM qui traite</label><input class="tri" id="d_bm" maxlength="4" placeholder="VBE" value="${ao.bm||""}"></div>
          <div class="field"><label>Date prise en charge</label><input type="date" id="d_datePrise" value="${ao.datePrise||""}"></div>
          <div class="field"><label>Date réponse</label><input type="date" id="d_dateReponse" value="${ao.dateReponse||""}"></div>
          <div class="field"><label>Consultant poussé</label><input class="tri" id="d_consultant" maxlength="4" placeholder="FIB" value="${ao.consultant||""}"></div>
          <div class="field"><label>TJM proposé (€)</label><input type="number" id="d_tjm" placeholder="450" value="${ao.tjm||""}"></div>
          <div class="field"><label>Qualif obtenue</label>
            <select id="d_qualif"><option value=""${!ao.dateQualif?" selected":""}>Non</option><option value="oui"${ao.dateQualif?" selected":""}>Oui</option></select>
          </div>
          <div class="field" id="qualif-date-field" style="${ao.dateQualif?"":"display:none"}"><label>Date qualif</label><input type="date" id="d_dateQualif" value="${ao.dateQualif||""}"></div>
          <div class="field"><label>Démarrage</label>
            <select id="d_demarrage"><option value=""${!ao.dateDemarrage?" selected":""}>Non</option><option value="oui"${ao.dateDemarrage?" selected":""}>Oui</option></select>
          </div>
          <div class="field" id="dem-date-field" style="${ao.dateDemarrage?"":"display:none"}"><label>Date démarrage</label><input type="date" id="d_dateDemarrage" value="${ao.dateDemarrage||""}"></div>
        </div>
        <div style="margin-top:12px">
          <div class="field"><label>📝 Notes / Commentaires</label><textarea id="d_notes" style="width:100%;height:70px;border:1px solid #d1d5db;border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical;outline:none" placeholder="Ex: en attente retour client, profil envoyé le...">${ao.notes||""}</textarea></div>
        </div>
        <div class="form-actions">
          <button class="btn btn-green" id="save-detail">💾 Enregistrer</button>
          <button class="btn btn-red" id="clear-detail">🗑️ Effacer le suivi</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById("close-detail").addEventListener("click",()=>{selectedRFC=null;renderView();});
  document.getElementById("d_qualif").addEventListener("change",e=>{
    document.getElementById("qualif-date-field").style.display=e.target.value?"":"none";
    if(e.target.value&&!document.getElementById("d_dateQualif").value) document.getElementById("d_dateQualif").value=today();
  });
  document.getElementById("d_demarrage").addEventListener("change",e=>{
    document.getElementById("dem-date-field").style.display=e.target.value?"":"none";
    if(e.target.value&&!document.getElementById("d_dateDemarrage").value) document.getElementById("d_dateDemarrage").value=today();
  });
  document.getElementById("save-detail").addEventListener("click",async()=>{
    ao.bm = document.getElementById("d_bm").value.toUpperCase().trim();
    ao.datePrise = document.getElementById("d_datePrise").value;
    ao.dateReponse = document.getElementById("d_dateReponse").value;
    ao.consultant = document.getElementById("d_consultant").value.toUpperCase().trim();
    ao.tjm = document.getElementById("d_tjm").value;
    ao.dateQualif = document.getElementById("d_qualif").value ? document.getElementById("d_dateQualif").value : "";
    ao.dateDemarrage = document.getElementById("d_demarrage").value ? document.getElementById("d_dateDemarrage").value : "";
    ao.notes = document.getElementById("d_notes").value.trim();
    if(ao.bm && !ao.datePrise) ao.datePrise = today();
    await dbPut("aos", ao);
    renderView();
  });
  document.getElementById("clear-detail").addEventListener("click",async()=>{
    if(!confirm("Effacer le suivi de "+ao.rfc+" ?")) return;
    ao.bm="";ao.datePrise="";ao.dateReponse="";ao.consultant="";ao.tjm="";ao.dateQualif="";ao.dateDemarrage="";ao.notes="";
    await dbPut("aos", ao);
    renderView();
  });
}

// ===================== IMPORT =====================
function renderImport(el) {
  el.innerHTML = `
    <h1 style="font-size:24px;font-weight:800;margin-bottom:8px">Import PWise</h1>
    <p style="font-size:13px;color:var(--gray);margin-bottom:20px">Copiez le texte brut depuis PWise et collez-le ici. Les nouveaux AO seront ajoutés, les AO absents seront marqués comme clos.</p>

    <div class="card">
      <div class="card-title">📄 Coller le texte ou charger un fichier</div>
      <textarea id="import-text" style="width:100%;height:200px;border:1px solid #d1d5db;border-radius:8px;padding:12px;font-size:12px;font-family:'Cascadia Code',monospace;resize:vertical;outline:none" placeholder="Collez ici le contenu copié depuis PWise..."></textarea>
      <div style="display:flex;gap:10px;margin-top:12px;align-items:center">
        <button class="btn btn-green" id="run-import">🚀 Lancer l'import</button>
        <span style="color:var(--gray);font-size:12px">ou</span>
        <label class="btn" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer">
          📎 Charger un fichier .txt
          <input type="file" id="import-file" accept=".txt,.text" style="display:none">
        </label>
      </div>
    </div>
    <div id="import-result"></div>
    <div id="import-history"></div>
  `;

  document.getElementById("import-file").addEventListener("change",e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{document.getElementById("import-text").value=ev.target.result;};
    reader.readAsText(file);
  });

  document.getElementById("run-import").addEventListener("click", async()=>{
    const raw = document.getElementById("import-text").value.trim();
    if(!raw){alert("Collez d'abord le texte PWise.");return;}
    const parsed = parseAOs(raw);
    if(!parsed.length){document.getElementById("import-result").innerHTML=`<div class="import-warn" style="margin-top:16px">⚠️ Aucun AO détecté. Vérifiez le format du texte.</div>`;return;}

    const existing = await dbGetAll("aos");
    const existingMap = {};
    existing.forEach(a=>{existingMap[a.rfc]=a;});
    const importedRFCs = new Set(parsed.map(a=>a.rfc));

    let added=0, updated=0, closed=0, unchanged=0;
    const toSave = [];

    // Add/update
    parsed.forEach(p=>{
      const ex = existingMap[p.rfc];
      if(!ex){
        toSave.push({...p, statut:"ouvert", bm:"", datePrise:"", dateReponse:"", consultant:"", tjm:"", dateQualif:"", dateDemarrage:"", notes:"", dateCreation:today(), dateCloture:"", dernierImport:today()});
        added++;
      } else {
        // Update PWise fields, keep tracking
        let changed = ex.profil!==p.profil||ex.nbJours!==p.nbJours||ex.dateDebut!==p.dateDebut||ex.dateFin!==p.dateFin;
        const merged = {...ex, ...p, statut:"ouvert", dateCloture:"", dernierImport:today(),
          bm:ex.bm||"", datePrise:ex.datePrise||"", dateReponse:ex.dateReponse||"", consultant:ex.consultant||"", tjm:ex.tjm||"",
          dateQualif:ex.dateQualif||"", dateDemarrage:ex.dateDemarrage||"", notes:ex.notes||"", dateCreation:ex.dateCreation||today()};
        toSave.push(merged);
        if(changed) updated++; else unchanged++;
      }
    });

    // Close missing
    existing.forEach(ex=>{
      if(ex.statut!=="clos"&&!importedRFCs.has(ex.rfc)){
        toSave.push({...ex, statut:"clos", dateCloture:today(), dernierImport:today()});
        closed++;
      }
    });

    await dbPutMany("aos", toSave);
    await dbPut("imports", {date:today(), time:new Date().toLocaleTimeString("fr-FR"), nbParsed:parsed.length, added, updated, closed, unchanged});

    document.getElementById("import-result").innerHTML=`
      <div class="import-ok" style="margin-top:16px">
        <strong>✅ Import réussi !</strong><br>
        📊 ${parsed.length} AO dans le fichier<br>
        🆕 ${added} nouveau${added>1?"x":""} · ♻️ ${updated} mis à jour · 🔒 ${closed} clos · ✔️ ${unchanged} inchangé${unchanged>1?"s":""}
      </div>`;

    loadImportHistory();
  });

  loadImportHistory();
}

async function loadImportHistory() {
  const imports = await dbGetAll("imports");
  const el = document.getElementById("import-history");
  if(!el||!imports.length) return;
  const recent = imports.sort((a,b)=>(b.id||0)-(a.id||0)).slice(0,10);
  el.innerHTML=`<div class="card" style="margin-top:16px"><div class="card-title">📜 Historique des imports</div>
    <table style="width:100%;font-size:12px"><thead><tr><th>Date</th><th>Heure</th><th>AO parsés</th><th>Nouveaux</th><th>Mis à jour</th><th>Clos</th></tr></thead>
    <tbody>${recent.map(i=>`<tr><td>${i.date}</td><td>${i.time}</td><td>${i.nbParsed}</td><td>${i.added}</td><td>${i.updated}</td><td>${i.closed}</td></tr>`).join("")}</tbody></table></div>`;
}

function renderExport(el) {
  el.innerHTML = `
    <h1 style="font-size:24px;font-weight:800;margin-bottom:20px">Export</h1>
    <div class="card">
      <div class="card-title">📤 Exporter les données</div>
      <p style="font-size:13px;color:var(--gray);margin-bottom:16px">Exportez toutes les données AO + suivi au format CSV ou JSON.</p>
      <div style="display:flex;gap:10px">
        <button class="btn btn-green" onclick="doExportCSV()">📥 Export CSV</button>
        <button class="btn" onclick="doExportJSON()">📥 Export JSON (sauvegarde)</button>
        <label class="btn" style="cursor:pointer">📎 Restaurer JSON <input type="file" accept=".json" style="display:none" onchange="doImportJSON(event)"></label>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📧 Rapport hebdomadaire</div>
      <p style="font-size:13px;color:var(--gray);margin-bottom:12px">Génère un résumé prêt à copier-coller dans un mail ou Teams pour le point d'équipe.</p>
      <button class="btn btn-green" id="gen-report">📋 Générer le rapport</button>
      <div id="report-area"></div>
    </div>
  `;
  document.getElementById("gen-report").addEventListener("click",()=>{
    const open=getOpenAOs();
    const now=new Date();
    const weekAgo=new Date(now);weekAgo.setDate(weekAgo.getDate()-7);

    // Stats
    const total=open.length;
    const nonTraite=open.filter(a=>statutSuivi(a)==="ouvert").length;
    const reponduSemaine=open.filter(a=>a.dateReponse&&new Date(a.dateReponse)>=weekAgo).length;
    const qualifSemaine=open.filter(a=>a.dateQualif&&new Date(a.dateQualif)>=weekAgo).length;
    const demSemaine=open.filter(a=>a.dateDemarrage&&new Date(a.dateDemarrage)>=weekAgo).length;
    const totalRepondu=open.filter(a=>a.dateReponse).length;
    const totalQualif=open.filter(a=>a.dateQualif).length;
    const totalDem=open.filter(a=>a.dateDemarrage).length;

    // Par BM
    const bms={};
    open.forEach(a=>{
      const bm=a.bm;if(!bm)return;
      if(!bms[bm])bms[bm]={total:0,reponduSem:0,qualifSem:0,demSem:0,nonTraite:0};
      bms[bm].total++;
      if(statutSuivi(a)==="ouvert") bms[bm].nonTraite++;
      if(a.dateReponse&&new Date(a.dateReponse)>=weekAgo) bms[bm].reponduSem++;
      if(a.dateQualif&&new Date(a.dateQualif)>=weekAgo) bms[bm].qualifSem++;
      if(a.dateDemarrage&&new Date(a.dateDemarrage)>=weekAgo) bms[bm].demSem++;
    });

    // AO urgents
    const urgents=open.filter(a=>urgency(a.dateDebut)>=2&&statutSuivi(a)==="ouvert");

    // AO avec notes récentes
    const avecNotes=open.filter(a=>a.notes).slice(0,5);

    const dateStr=now.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

    let report=`📊 RAPPORT HEBDO AO BCEF — ${dateStr}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

📈 VUE D'ENSEMBLE
• ${total} AO ouverts dont ${nonTraite} non traités
• Funnel : ${total} ouverts → ${totalRepondu} répondus → ${totalQualif} qualifiés → ${totalDem} démarrés
• Taux conversion global : ${total?Math.round(totalDem/total*100):0}%

📅 ACTIVITÉ DE LA SEMAINE
• ${reponduSemaine} réponse(s) envoyée(s)
• ${qualifSemaine} qualification(s) obtenue(s)
• ${demSemaine} démarrage(s)`;

    if(Object.keys(bms).length){
      report+=`\n\n👤 PAR MANAGER`;
      Object.entries(bms).sort((a,b)=>b[1].total-a[1].total).forEach(([bm,s])=>{
        report+=`\n• ${bm} : ${s.total} AO (${s.nonTraite} à traiter)`;
        const acts=[];
        if(s.reponduSem) acts.push(s.reponduSem+" rép.");
        if(s.qualifSem) acts.push(s.qualifSem+" qualif");
        if(s.demSem) acts.push(s.demSem+" dém.");
        if(acts.length) report+=` — semaine : ${acts.join(", ")}`;
      });
    }

    if(urgents.length){
      report+=`\n\n🚨 AO URGENTS (non traités, début imminent)`;
      urgents.slice(0,8).forEach(a=>{
        report+=`\n• ${a.rfc} — ${a.profil.substring(0,50)} — début ${a.dateDebut}`;
      });
    }

    if(avecNotes.length){
      report+=`\n\n📝 NOTES RÉCENTES`;
      avecNotes.forEach(a=>{
        report+=`\n• ${a.rfc} (${a.bm||"?"}) : ${a.notes.substring(0,80)}`;
      });
    }

    report+=`\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nGénéré depuis INTM AO Manager`;

    document.getElementById("report-area").innerHTML=`
      <div style="margin-top:14px;background:#0f172a;border-radius:10px;padding:16px;position:relative">
        <button class="btn" style="position:absolute;top:10px;right:10px;font-size:11px;padding:4px 10px" onclick="navigator.clipboard.writeText(document.getElementById('report-text').textContent);this.textContent='✅ Copié !';setTimeout(()=>this.textContent='📋 Copier',1500)">📋 Copier</button>
        <pre id="report-text" style="color:#e2e8f0;font-size:12.5px;font-family:'Cascadia Code','Fira Code',monospace;white-space:pre-wrap;line-height:1.6;margin:0">${report}</pre>
      </div>`;
  });
}

function doExportCSV(){
  let csv="RFC;TM;Profil;Catégorie;Intitulé;Organisation;Département;Modalité;Début;Fin;Jours;Statut PWise;BM;Date prise;Date réponse;Consultant;TJM;Qualif;Date qualif;Démarrage;Date démarrage;Notes;Statut suivi;Statut AO\n";
  allAOs.forEach(a=>{
    const ss=a.statut==="clos"?"clos":statutSuivi(a);
    csv+=`${a.rfc};${a.tm};${(a.profil||"").replace(/;/g,",")};${categorize(a.profil)};${(a.intitule||"").replace(/;/g,",")};${(a.org||"").replace(/;/g,",")};${a.dept};${a.modalite};${a.dateDebut};${a.dateFin};${a.nbJours};${a.statutPwise};${a.bm||""};${a.datePrise||""};${a.dateReponse||""};${a.consultant||""};${a.tjm||""};${a.dateQualif?"Oui":"Non"};${a.dateQualif||""};${a.dateDemarrage?"Oui":"Non"};${a.dateDemarrage||""};${(a.notes||"").replace(/;/g,",").replace(/\n/g," ")};${statutLabel(ss)};${a.statut}\n`;
  });
  download("ao_bcef_export.csv", "\uFEFF"+csv, "text/csv;charset=utf-8;");
}

function doExportJSON(){
  const data = {version:1, exportDate:new Date().toISOString(), aos:allAOs};
  download("ao_bcef_backup.json", JSON.stringify(data,null,2), "application/json");
}

async function doImportJSON(e){
  const file=e.target.files[0]; if(!file)return;
  const text=await file.text();
  try{
    const data=JSON.parse(text);
    if(!data.aos||!data.aos.length){alert("Fichier invalide.");return;}
    if(!confirm(`Restaurer ${data.aos.length} AO depuis la sauvegarde du ${data.exportDate||"?"} ?\nCela écrasera les données existantes.`))return;
    await dbPutMany("aos",data.aos);
    alert("✅ Restauration terminée !");
    renderView();
  }catch(err){alert("Erreur de lecture: "+err.message);}
}

function download(filename, content, type){
  const blob=new Blob([content],{type});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
