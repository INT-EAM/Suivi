<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INTM Finance Manager</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; background: #0c0f1a; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a3158; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3d4a7a; }
    input:focus, button:focus-visible { outline: 1px solid #60a5fa; outline-offset: 2px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    .fade-in { animation: fadeIn .35s ease both; }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useMemo, useCallback, useRef } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, Legend } = Recharts;

    // ─── CONSTANTS ──────────────────────────────────────────
    const TEAM = {
      VBR:  { label: "Vincent B.",  color: "#3b82f6" },
      OAK:  { label: "Omar A.",    color: "#10b981" },
      MBNE: { label: "Mira B.",    color: "#d946ef" },
    };
    const TEAM_KEYS = Object.keys(TEAM);
    const ALL = "ALL";

    const COL = {
      region:0, resp:1, collab:2, stSociete:3, client:4, clientFinal:5,
      tjm:6, w:7, mal:8, css:9, icEntree:10, ic:11, cp:12, totalJrs:13,
      prod:14, prodCompl:15, totalProd:16, tarifST:17, st:18, stForfait:19,
      regulST:20, totalST:21, diffST:22, salBrut:23, fraisRef:24, fraisCompta:25,
      ticketResto:26, autresFrais:27, rfa:28, coutConsult:29, mc1:30, mc1CA:31,
      mc2:32, rex:33, rexCA:34, coutIC:35, adv:36, adjAdv:37, pole:38, regionCol:39,
    };

    const SHORT_M = ["","Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
    const P = {
      bg:"#0c0f1a", card:"#141827", cardH:"#1a1f35", bdr:"#1e2540", bdrL:"#2a3158",
      tx:"#e2e8f0", txM:"#8892b0", txD:"#4a5578",
      acc:"#60a5fa", grn:"#34d399", red:"#f87171", pur:"#c084fc", amb:"#fbbf24",
    };

    // ─── UTILS ──────────────────────────────────────────────
    const n = v => { if(v==null||v===""||v===" ") return 0; const x=typeof v==="number"?v:parseFloat(String(v).replace(",",".")); return isNaN(x)?0:x; };
    const fmt = (v,d=0) => { if(v==null||isNaN(v)) return "–"; return new Intl.NumberFormat("fr-FR",{minimumFractionDigits:d,maximumFractionDigits:d}).format(v); };
    const fK = v => { if(v==null||isNaN(v)) return "–"; return Math.abs(v)>=1000 ? fmt(v/1000,1)+"k" : fmt(v,0); };
    const fP = v => { if(v==null||isNaN(v)||!isFinite(v)) return "–"; return fmt(v*100,1)+"%"; };

    // ─── PARSER ─────────────────────────────────────────────
    function parseSheetName(name) {
      const s = name.trim();
      const simu = /^SIMU/i.test(s);
      const full = /FULL/i.test(s);
      const m = s.match(/(\d{2})[_\s]*(\d{4})/);
      if (!m) return null;
      // Skip recap/pivot sheets (R XX or R FULL)
      const stripped = s.replace(/SIMU/i,"").replace(/FULL/i,"").trim();
      if (/^\s*R\s/i.test(stripped) || /^R\s/i.test(s.replace(/SIMU\s*/i,""))) return null;
      // Skip FULL cumulative sheets
      if (full) return null;
      return { name: s, month: parseInt(m[1]), year: parseInt(m[2]), simu };
    }

    function parseSheet(ws) {
      const ref = ws["!ref"];
      if (!ref) return { rows: [], jo: 0 };
      const rng = XLSX.utils.decode_range(ref);
      const jo = n(ws["B1"]?.v);
      const rows = [];
      for (let r = 2; r <= rng.e.r; r++) {
        const g = c => { const cell = ws[XLSX.utils.encode_cell({r,c})]; return cell ? cell.v : null; };
        const resp = g(COL.resp);
        const collab = g(COL.collab);
        if (!resp || !collab) continue;
        rows.push({
          resp: String(resp).trim(),
          collab: String(collab).trim(),
          stSoc: g(COL.stSociete)||"",
          client: g(COL.client)||"",
          cf: g(COL.clientFinal)||"",
          tjm: n(g(COL.tjm)),
          w: n(g(COL.w)),
          mal: n(g(COL.mal)),
          ic: n(g(COL.ic)),
          cp: n(g(COL.cp)),
          totalJrs: n(g(COL.totalJrs)),
          prod: n(g(COL.prod)),
          totalProd: n(g(COL.totalProd)),
          totalST: n(g(COL.totalST)),
          diffST: n(g(COL.diffST)),
          salBrut: n(g(COL.salBrut)),
          rfa: n(g(COL.rfa)),
          coutCons: n(g(COL.coutConsult)),
          mc1: n(g(COL.mc1)),
          mc1CA: n(g(COL.mc1CA)),
          mc2: n(g(COL.mc2)),
          rex: n(g(COL.rex)),
          rexCA: n(g(COL.rexCA)),
          coutIC: n(g(COL.coutIC)),
        });
      }
      return { rows, jo };
    }

    function parseWorkbook(wb) {
      const out = [];
      for (const name of wb.SheetNames) {
        const info = parseSheetName(name);
        if (!info) continue;
        const { rows, jo } = parseSheet(wb.Sheets[name]);
        if (rows.length === 0) continue;
        out.push({ ...info, rows, jo });
      }
      out.sort((a,b) => a.year-b.year || a.month-b.month);
      return out;
    }

    // ─── KPI ENGINE ─────────────────────────────────────────
    function kpi(rows, jo, bm) {
      const f = bm===ALL ? rows.filter(r=>TEAM_KEYS.includes(r.resp)) : rows.filter(r=>r.resp===bm);
      const mission = f.filter(r=>r.tjm>0 && r.cf && !["IC","MALADIE",""].includes(r.cf.trim()));
      const totalProd = f.reduce((s,r)=>s+r.totalProd,0);
      const totalST  = f.reduce((s,r)=>s+r.totalST,0);
      const mc1 = f.reduce((s,r)=>s+r.mc1,0);
      const mc2 = f.reduce((s,r)=>s+r.mc2,0);
      const rex = f.reduce((s,r)=>s+r.rex,0);
      const wTot = f.reduce((s,r)=>s+r.w,0);
      const jrsPoss = mission.length * jo;
      const taux = jrsPoss>0 ? wTot/jrsPoss : 0;
      const tjmMoy = wTot>0 ? totalProd/wTot : 0;
      const collabs = new Set(f.map(r=>r.collab)).size;
      const enMission = new Set(mission.map(r=>r.collab)).size;
      const icCount = new Set(f.filter(r=>!r.cf||r.cf==="IC"||r.cf==="MALADIE"||r.tjm===0).map(r=>r.collab)).size;
      return { totalProd, totalST, mc1, mc2, rex, wTot, taux, tjmMoy, collabs, enMission, icCount, mc1R: totalProd?mc1/totalProd:0, rexR: totalProd?rex/totalProd:0, data: f };
    }

    // ─── SUB-COMPONENTS ─────────────────────────────────────

    function KCard({ label, value, sub, color, delay }) {
      return React.createElement("div", {
        className: "fade-in",
        style: {
          background: P.card, border: `1px solid ${P.bdr}`, borderRadius: 12,
          padding: "18px 20px", position: "relative", overflow: "hidden",
          cursor: "default", animationDelay: delay||"0s", transition: "border-color .2s, transform .2s",
        },
        onMouseEnter: e => { e.currentTarget.style.borderColor = color||P.acc; e.currentTarget.style.transform = "translateY(-2px)"; },
        onMouseLeave: e => { e.currentTarget.style.borderColor = P.bdr; e.currentTarget.style.transform = "none"; },
      },
        React.createElement("div", { style: { position:"absolute", top:0, left:0, right:0, height:3, background:color||P.acc, opacity:.7 } }),
        React.createElement("div", { style: { fontSize:11, color:P.txM, textTransform:"uppercase", letterSpacing:1.2, marginBottom:8, fontWeight:600 } }, label),
        React.createElement("div", { style: { fontSize:26, fontWeight:700, color:P.tx, letterSpacing:-.5, fontVariantNumeric:"tabular-nums" } }, value),
        sub && React.createElement("div", { style: { fontSize:12, color:P.txM, marginTop:4 } }, sub),
      );
    }

    function BmToggle({ sel, onChange }) {
      const opts = [{ k:ALL, l:"Équipe" }, ...TEAM_KEYS.map(k=>({ k, l:k }))];
      return React.createElement("div", { style: { display:"flex", gap:4, background:P.card, borderRadius:10, padding:4, border:`1px solid ${P.bdr}` } },
        opts.map(o => {
          const act = sel===o.k;
          const col = o.k===ALL ? P.acc : TEAM[o.k]?.color||P.acc;
          return React.createElement("button", {
            key: o.k, onClick: ()=>onChange(o.k),
            style: {
              padding:"8px 16px", borderRadius:8, border:"none", cursor:"pointer",
              fontSize:13, fontWeight:600, letterSpacing:.3, transition:"all .15s",
              background: act?col:"transparent", color: act?"#fff":P.txM,
            }
          }, o.l);
        })
      );
    }

    function MonthTabs({ months, sel, onChange }) {
      return React.createElement("div", { style: { display:"flex", gap:4, flexWrap:"wrap" } },
        months.map((m,i) => {
          const act = sel===i;
          const lbl = `${m.simu?"⚡ ":""}${SHORT_M[m.month]} ${m.year}`;
          return React.createElement("button", {
            key: i, onClick: ()=>onChange(i),
            style: {
              padding:"7px 16px", borderRadius:8, border:`1px solid ${act?P.acc:P.bdr}`,
              cursor:"pointer", fontSize:12, fontWeight:600, transition:"all .15s",
              background: act?P.acc+"22":"transparent", color: act?P.acc:P.txM,
            }
          }, lbl);
        })
      );
    }

    function Trend({ months, bm }) {
      const data = months.map(m => {
        const k = kpi(m.rows, m.jo, bm);
        return { label: `${m.simu?"~":""}${SHORT_M[m.month]}`, prod:k.totalProd, rex:k.rex };
      });
      return React.createElement("div", { className:"fade-in", style: { background:P.card, borderRadius:12, padding:20, border:`1px solid ${P.bdr}` } },
        React.createElement("div", { style: { fontSize:12, fontWeight:600, color:P.txM, textTransform:"uppercase", letterSpacing:1, marginBottom:16 } }, "Évolution mensuelle"),
        React.createElement(ResponsiveContainer, { width:"100%", height:260 },
          React.createElement(BarChart, { data, barGap:2 },
            React.createElement(CartesianGrid, { strokeDasharray:"3 3", stroke:P.bdr }),
            React.createElement(XAxis, { dataKey:"label", tick:{fill:P.txM,fontSize:12}, axisLine:{stroke:P.bdr} }),
            React.createElement(YAxis, { tick:{fill:P.txM,fontSize:11}, axisLine:false, tickFormatter:fK }),
            React.createElement(Tooltip, { contentStyle:{background:P.card,border:`1px solid ${P.bdr}`,borderRadius:8,color:P.tx,fontSize:12}, formatter:(v,nm)=>[fmt(v)+"€",nm] }),
            React.createElement(Legend, { wrapperStyle:{fontSize:11,color:P.txM} }),
            React.createElement(Bar, { dataKey:"prod", name:"Production", fill:P.acc, radius:[4,4,0,0] }),
            React.createElement(Bar, { dataKey:"rex", name:"REX", fill:P.grn, radius:[4,4,0,0] }),
          )
        )
      );
    }

    function BmCompare({ rows, jo }) {
      const data = TEAM_KEYS.map(bm => ({ bm, ...kpi(rows, jo, bm) }));
      return React.createElement("div", { className:"fade-in", style: { background:P.card, borderRadius:12, padding:20, border:`1px solid ${P.bdr}` } },
        React.createElement("div", { style: { fontSize:12, fontWeight:600, color:P.txM, textTransform:"uppercase", letterSpacing:1, marginBottom:16 } }, "Comparaison BM"),
        React.createElement("div", { style: { display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:14 } },
          data.map(d => React.createElement("div", {
            key: d.bm,
            style: { padding:16, borderRadius:10, border:`1px solid ${TEAM[d.bm].color}33`, background:TEAM[d.bm].color+"08" }
          },
            React.createElement("div", { style: { display:"flex", alignItems:"center", gap:8, marginBottom:12 } },
              React.createElement("div", { style: { width:10, height:10, borderRadius:"50%", background:TEAM[d.bm].color } }),
              React.createElement("span", { style: { fontSize:15, fontWeight:700, color:P.tx } }, d.bm),
              React.createElement("span", { style: { fontSize:11, color:P.txM } }, TEAM[d.bm].label),
            ),
            React.createElement("div", { style: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, fontSize:12 } },
              ...[
                ["Consultants", `${d.collabs}`, `${d.enMission} mission · ${d.icCount} IC`],
                ["Production", fK(d.totalProd)+"€", `TJM ${fmt(d.tjmMoy)}€`],
                ["REX", fK(d.rex)+"€", `REX/CA ${fP(d.rexR)}`],
                ["Occupation", fP(d.taux), `${fmt(d.wTot,0)} jrs travaillés`],
              ].map(([lbl,val,sub],i) => React.createElement("div", { key:i },
                React.createElement("span", { style:{color:P.txM} }, lbl),
                React.createElement("br"),
                React.createElement("b", { style:{color: lbl==="REX"?(d.rex>=0?P.grn:P.red) : lbl==="Occupation"?(d.taux>=.85?P.grn:P.amb) : P.tx} }, val),
                sub && React.createElement("div", { style:{fontSize:10,color:P.txD,marginTop:2} }, sub),
              ))
            )
          ))
        )
      );
    }

    function TopClients({ data }) {
      const map = {};
      data.forEach(r => {
        if (!r.cf || r.cf==="IC" || r.cf==="MALADIE") return;
        const k = r.cf.trim();
        if (!map[k]) map[k] = { cf:k, prod:0, n:0 };
        map[k].prod += r.totalProd;
        map[k].n += 1;
      });
      const top = Object.values(map).sort((a,b)=>b.prod-a.prod).slice(0,8);
      const colors = [P.acc,P.grn,P.pur,P.amb,"#f87171","#38bdf8","#a78bfa","#fb923c"];
      const max = top[0]?.prod||1;

      return React.createElement("div", { className:"fade-in", style: { background:P.card, borderRadius:12, padding:20, border:`1px solid ${P.bdr}` } },
        React.createElement("div", { style: { fontSize:12, fontWeight:600, color:P.txM, textTransform:"uppercase", letterSpacing:1, marginBottom:16 } }, "Top clients (production)"),
        React.createElement("div", { style: { display:"flex", flexDirection:"column", gap:8 } },
          top.map((c,i) => React.createElement("div", { key:c.cf, style: { display:"flex", alignItems:"center", gap:10 } },
            React.createElement("div", { style: { width:130, fontSize:12, color:P.tx, fontWeight:500, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }, title:c.cf }, c.cf),
            React.createElement("div", { style: { flex:1, height:20, background:P.bdr+"44", borderRadius:4, overflow:"hidden" } },
              React.createElement("div", { style: { height:"100%", width:`${(c.prod/max)*100}%`, background:colors[i%8], borderRadius:4, opacity:.7, transition:"width .5s" } })
            ),
            React.createElement("div", { style: { fontSize:12, fontWeight:600, color:P.tx, width:65, textAlign:"right", fontVariantNumeric:"tabular-nums" } }, fK(c.prod)+"€"),
            React.createElement("div", { style: { fontSize:10, color:P.txM, width:20, textAlign:"right" } }, c.n),
          ))
        )
      );
    }

    function Alerts({ data, jo }) {
      const alerts = [];
      data.forEach(r => {
        if (r.tjm>0 && r.w===0 && r.mal===0 && r.ic===0 && r.cp===0)
          alerts.push({ t:"warn", m:`${r.collab} — 0 jour travaillé (TJM ${fmt(r.tjm)}€)` });
        if (r.totalProd < 0)
          alerts.push({ t:"err", m:`${r.collab} — Prod. négative (${fmt(r.totalProd)}€)` });
        if (r.rex < -2000)
          alerts.push({ t:"err", m:`${r.collab} — REX critique (${fmt(r.rex)}€)` });
      });
      if (!alerts.length) return null;
      const col = { err:P.red, warn:P.amb, info:P.acc };
      return React.createElement("div", { className:"fade-in", style: { background:P.card, borderRadius:12, padding:20, border:`1px solid ${P.bdr}` } },
        React.createElement("div", { style: { fontSize:12, fontWeight:600, color:P.txM, textTransform:"uppercase", letterSpacing:1, marginBottom:12 } }, `⚠ Alertes (${alerts.length})`),
        React.createElement("div", { style: { display:"flex", flexDirection:"column", gap:6, maxHeight:220, overflowY:"auto" } },
          alerts.slice(0,20).map((a,i) => React.createElement("div", {
            key:i, style: { fontSize:12, padding:"6px 10px", borderRadius:6, borderLeft:`3px solid ${col[a.t]}`, background:col[a.t]+"0a", color:P.tx }
          }, a.m))
        )
      );
    }

    function Table({ data, jo }) {
      const [sort, setSort] = useState("totalProd");
      const [asc, setAsc] = useState(false);
      const [q, setQ] = useState("");

      const sorted = useMemo(() => {
        let arr = [...data];
        if (q) { const s=q.toLowerCase(); arr=arr.filter(r=>r.collab.toLowerCase().includes(s)||r.cf.toLowerCase().includes(s)||r.resp.toLowerCase().includes(s)); }
        arr.sort((a,b) => {
          let va=a[sort], vb=b[sort];
          if (typeof va==="string") return asc?va.localeCompare(vb):vb.localeCompare(va);
          return asc?va-vb:vb-va;
        });
        return arr;
      }, [data,sort,asc,q]);

      const doSort = k => { if(sort===k) setAsc(!asc); else { setSort(k); setAsc(false); } };

      const TH = (key,label,right) => React.createElement("th", {
        onClick:()=>doSort(key),
        style: {
          padding:"10px 12px", textAlign:right?"right":"left", fontSize:11, color:P.txM,
          textTransform:"uppercase", letterSpacing:1, cursor:"pointer", userSelect:"none",
          borderBottom:`1px solid ${P.bdr}`, whiteSpace:"nowrap",
          background: sort===key?P.bdr+"44":"transparent",
        }
      }, label, sort===key ? (asc?" ↑":" ↓") : "");

      const td = (right) => ({
        padding:"10px 12px", fontSize:13, borderBottom:`1px solid ${P.bdr}22`,
        textAlign:right?"right":"left", fontVariantNumeric: right?"tabular-nums":"normal",
      });

      return React.createElement("div", { className:"fade-in" },
        React.createElement("div", { style:{marginBottom:12} },
          React.createElement("input", {
            type:"text", placeholder:"Rechercher consultant, client…", value:q,
            onChange: e=>setQ(e.target.value),
            style: { width:"100%", maxWidth:340, padding:"10px 14px", borderRadius:8, border:`1px solid ${P.bdr}`, background:P.card, color:P.tx, fontSize:13 },
            onFocus: e=>e.target.style.borderColor=P.acc, onBlur: e=>e.target.style.borderColor=P.bdr,
          })
        ),
        React.createElement("div", { style:{overflowX:"auto", borderRadius:10, border:`1px solid ${P.bdr}`} },
          React.createElement("table", { style:{width:"100%", borderCollapse:"collapse", minWidth:950} },
            React.createElement("thead", null,
              React.createElement("tr", { style:{background:P.card} },
                TH("resp","BM"), TH("collab","Consultant"), TH("cf","Client Final"),
                TH("tjm","TJM",1), TH("w","Jrs W",1), TH("totalProd","Prod.",1),
                TH("totalST","Coût ST",1), TH("mc1","MC1",1), TH("rex","REX",1),
                React.createElement("th", { style:{...td(true), fontSize:11, color:P.txM, textTransform:"uppercase", letterSpacing:1, borderBottom:`1px solid ${P.bdr}`} }, "Taux"),
              )
            ),
            React.createElement("tbody", null,
              sorted.map((r,i) => {
                const taux = jo>0 && r.tjm>0 ? r.w/jo : null;
                const isIC = r.cf==="IC"||r.cf==="MALADIE"||r.tjm===0;
                return React.createElement("tr", {
                  key:i,
                  style: { background: i%2===0?"transparent":P.card+"66", transition:"background .1s" },
                  onMouseEnter: e=>e.currentTarget.style.background=P.cardH,
                  onMouseLeave: e=>e.currentTarget.style.background=i%2===0?"transparent":P.card+"66",
                },
                  React.createElement("td", { style:td() },
                    React.createElement("span", { style:{display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:700, background:(TEAM[r.resp]?.color||"#666")+"22", color:TEAM[r.resp]?.color||"#999"} }, r.resp)
                  ),
                  React.createElement("td", { style:{...td(), fontWeight:600, color:isIC?P.txM:P.tx} }, r.collab),
                  React.createElement("td", { style:{...td(), color:isIC?P.red:P.tx} }, isIC ? React.createElement("em",null,r.cf||"IC") : r.cf),
                  React.createElement("td", { style:td(true) }, r.tjm>0?fmt(r.tjm)+"€":"–"),
                  React.createElement("td", { style:td(true) }, r.w>0?fmt(r.w,1):"–"),
                  React.createElement("td", { style:{...td(true), fontWeight:600, color:r.totalProd<0?P.red:P.tx} }, r.totalProd!==0?fmt(r.totalProd)+"€":"–"),
                  React.createElement("td", { style:{...td(true), color:P.txM} }, r.totalST>0?fmt(r.totalST)+"€":"–"),
                  React.createElement("td", { style:{...td(true), color:r.mc1<0?P.red:r.mc1>0?P.grn:P.txM} }, r.mc1!==0?fmt(r.mc1)+"€":"–"),
                  React.createElement("td", { style:{...td(true), fontWeight:600, color:r.rex<0?P.red:r.rex>0?P.grn:P.txM} }, r.rex!==0?fmt(r.rex)+"€":"–"),
                  React.createElement("td", { style:td(true) },
                    taux!=null ? React.createElement("span", { style:{padding:"2px 8px",borderRadius:4,fontSize:12,fontWeight:600, background:(taux>=.9?P.grn:taux>=.7?P.amb:P.red)+"22", color:taux>=.9?P.grn:taux>=.7?P.amb:P.red} }, fP(taux)) : "–"
                  ),
                );
              })
            )
          )
        ),
        React.createElement("div", { style:{marginTop:8,fontSize:11,color:P.txD} }, `${sorted.length} lignes`)
      );
    }

    // ─── MAIN APP ───────────────────────────────────────────
    function App() {
      const [months, setMonths] = useState(null);
      const [selM, setSelM] = useState(0);
      const [bm, setBm] = useState(ALL);
      const [view, setView] = useState("dash");
      const [drag, setDrag] = useState(false);
      const [fname, setFname] = useState("");
      const [loading, setLoading] = useState(false);

      const load = useCallback(async file => {
        setLoading(true);
        try {
          const buf = await file.arrayBuffer();
          const wb = XLSX.read(buf, { type:"array" });
          const parsed = parseWorkbook(wb);
          if (parsed.length) { setMonths(parsed); setSelM(parsed.length-1); setFname(file.name); }
        } catch(e) { console.error(e); }
        setLoading(false);
      }, []);

      const cur = months?.[selM];
      const k = cur ? kpi(cur.rows, cur.jo, bm) : null;

      // ─ Upload screen
      if (!months) {
        return React.createElement("div", {
          style: { minHeight:"100vh", background:P.bg, display:"flex", alignItems:"center", justifyContent:"center" }
        },
          React.createElement("div", {
            onDragOver: e=>{e.preventDefault();setDrag(true)},
            onDragLeave: ()=>setDrag(false),
            onDrop: e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer?.files?.[0];if(f)load(f)},
            style: {
              width:"90%", maxWidth:520, padding:48, borderRadius:20, textAlign:"center",
              background:P.card, border:`2px dashed ${drag?P.acc:P.bdr}`,
              transition:"all .3s", transform:drag?"scale(1.02)":"none",
            }
          },
            React.createElement("div", { style:{fontSize:56,marginBottom:16} }, "📊"),
            React.createElement("div", { style:{fontSize:24,fontWeight:700,marginBottom:8,letterSpacing:-.5} }, "INTM Finance Manager"),
            React.createElement("div", { style:{fontSize:14,color:P.txM,marginBottom:28,lineHeight:1.6} },
              "Importez votre fichier ", React.createElement("b",null,"COEF2"), " pour visualiser", React.createElement("br"),
              "les KPIs financiers de votre équipe"
            ),
            loading
              ? React.createElement("div", { className:"pulse", style:{color:P.acc,fontSize:14} }, "Chargement en cours…")
              : React.createElement(React.Fragment, null,
                  React.createElement("label", {
                    style: { display:"inline-flex", alignItems:"center", gap:8, padding:"14px 32px", borderRadius:10, background:P.acc, color:"#fff", cursor:"pointer", fontWeight:600, fontSize:14, transition:"opacity .2s" },
                    onMouseEnter: e=>e.currentTarget.style.opacity=.85, onMouseLeave: e=>e.currentTarget.style.opacity=1,
                  },
                    "📁 Choisir le fichier COEF2",
                    React.createElement("input", { type:"file", accept:".xlsx,.xls", hidden:true, onChange:e=>{const f=e.target.files?.[0];if(f)load(f)} })
                  ),
                  React.createElement("div", { style:{fontSize:12,color:P.txD,marginTop:16} }, "ou glissez-déposez le fichier ici")
                )
          )
        );
      }

      // ─ Dashboard
      return React.createElement("div", { style: { minHeight:"100vh", background:P.bg, color:P.tx } },
        // Header
        React.createElement("div", {
          style: {
            background:P.card+"ee", borderBottom:`1px solid ${P.bdr}`,
            padding:"12px 24px", display:"flex", alignItems:"center", gap:14, flexWrap:"wrap",
            position:"sticky", top:0, zIndex:100, backdropFilter:"blur(12px)",
          }
        },
          React.createElement("div", { style:{display:"flex",alignItems:"center",gap:10,marginRight:"auto"} },
            React.createElement("span", { style:{fontSize:20} }, "📊"),
            React.createElement("span", { style:{fontWeight:700,fontSize:16,letterSpacing:-.3} }, "INTM Finance"),
            React.createElement("span", { style:{fontSize:10,color:P.txD,background:P.bdr,padding:"2px 8px",borderRadius:4} },
              fname.length>35 ? fname.slice(0,35)+"…" : fname
            ),
          ),
          React.createElement(BmToggle, { sel:bm, onChange:setBm }),
          React.createElement("div", { style:{display:"flex",gap:4,background:P.bg,borderRadius:8,padding:3} },
            [["dash","Dashboard"],["table","Consultants"]].map(([k,l]) =>
              React.createElement("button", {
                key:k, onClick:()=>setView(k),
                style: {
                  padding:"6px 14px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,
                  background:view===k?P.acc+"22":"transparent", color:view===k?P.acc:P.txM,
                }
              }, l)
            )
          ),
          React.createElement("label", {
            style: { padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,border:`1px solid ${P.bdr}`,color:P.txM,transition:"all .15s" },
            onMouseEnter: e=>{e.currentTarget.style.borderColor=P.acc;e.currentTarget.style.color=P.acc},
            onMouseLeave: e=>{e.currentTarget.style.borderColor=P.bdr;e.currentTarget.style.color=P.txM},
          },
            "↻ Ré-importer",
            React.createElement("input", { type:"file",accept:".xlsx,.xls",hidden:true, onChange:e=>{const f=e.target.files?.[0];if(f)load(f)} })
          )
        ),

        React.createElement("div", { style:{padding:"20px 24px",maxWidth:1340,margin:"0 auto"} },
          // Month tabs
          React.createElement("div", { style:{marginBottom:20,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"} },
            React.createElement(MonthTabs, { months, sel:selM, onChange:setSelM }),
            React.createElement("div", { style:{fontSize:12,color:P.txD,marginLeft:"auto"} },
              `${cur.jo} jrs ouvrés · ${cur.simu?"Simulation":"Réel"}`
            ),
          ),

          // Dashboard view
          view==="dash" && k && React.createElement(React.Fragment, null,
            // KPI cards
            React.createElement("div", { style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(185px,1fr))",gap:14,marginBottom:20} },
              React.createElement(KCard, { label:"Production", value:fK(k.totalProd)+"€", sub:`TJM moy. ${fmt(k.tjmMoy)}€`, color:P.acc, delay:"0s" }),
              React.createElement(KCard, { label:"MC1 après RFA", value:fK(k.mc1)+"€", sub:`Taux MC1: ${fP(k.mc1R)}`, color:k.mc1>=0?P.grn:P.red, delay:".05s" }),
              React.createElement(KCard, { label:"REX", value:fK(k.rex)+"€", sub:`REX/CA: ${fP(k.rexR)}`, color:k.rex>=0?P.grn:P.red, delay:".1s" }),
              React.createElement(KCard, { label:"Consultants", value:k.collabs, sub:`${k.enMission} mission · ${k.icCount} IC`, color:P.pur, delay:".15s" }),
              React.createElement(KCard, { label:"Taux Occupation", value:fP(k.taux), color:k.taux>=.85?P.grn:P.amb, delay:".2s" }),
              React.createElement(KCard, { label:"Coût S/T", value:fK(k.totalST)+"€", color:P.txM, delay:".25s" }),
            ),
            // Charts row
            React.createElement("div", { style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20} },
              React.createElement(Trend, { months, bm }),
              React.createElement(TopClients, { data:k.data }),
            ),
            // BM + Alerts row
            React.createElement("div", { style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20} },
              React.createElement(BmCompare, { rows:cur.rows, jo:cur.jo }),
              React.createElement(Alerts, { data:k.data, jo:cur.jo }),
            ),
          ),

          // Table view
          view==="table" && k && React.createElement(Table, { data:k.data, jo:cur.jo }),
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
